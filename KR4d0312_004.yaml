body:
  text: 䝉齋集巻四宋袁甫撰奏疏戊戌風變擬應詔封事臣仰惟陛下祗畏天威益隆聖德因風雨震凌之變惕然恐懼以避殿減膳爲未足迺親灑宸翰布告中外俾大小臣僚咸以直言來上聖心篤切已足上格穹蒼矣臣昨厠從列兹叨祠廩目擊變異痛心疾首雖抱沈痼屏處衡茅其敢以是爲解而不思所以仰答清問是用披瀝肝膈粗陳管見惟陛下少垂聽焉臣聞聖帝明王之世天道順于上地道寜于下故無疾風苦雨之災無地震水涌之變此皆盛德感召之所致也而自今夏以來地震屢矣迺七月七日白虹夜見虹颶母也越二日而颶風挾雨大肆威虐人皆曰颶母之見此先兆也臣則曰先兆之見不在乎白虹垂象之時而已著于地震生且夫天氣下降地氣上騰于是乎風霆流形發生庶物斯其所謂神氣者歟夫何神氣之發育乃反爲人物之殃不爲祥風甘雨乃轉而爲災爲沴殆有甚可怪者焉土宇者所載之神氣也今則漂蕩室廬矣民人者所載之神氣也今則傷害民命矣物產者所載之神氣也今則垂成之稼掃地無餘一飽無期餓莩將見矣地震兆其端而颶風煽其毒是其咎果安在歟夫地載神氣而聖人之神氣實與之相爲流通納于大麓烈風雷雨弗迷作書者以爲舜之德卽舜之所以爲神氣也清明在躬氣志如神天降時雨山川出雲記禮者又引崧高之詩而繼之曰此文武之德卽文武之所以爲神氣也成王之神氣微有所昬故大風偃禾昭示譴告及夫啓金縢之書發悔過之語而反風起禾見于不旋踵之頃當是時成王之神氣其精明與舜同亦與天地同故一念感召如響斯答然則今日之變天道未順地道未寜震動漂搖災異交作無庶物露生之應而有蕩析摧敗之憂陛下盍亦反躬内省豈吾之神氣有歉于古之帝王而然歟臣竊謂天覆地載人物處于其中同此一神氣也惟天地萬物父母惟人萬物之靈亶聰明作元后實所以爲神氣之主也比歲以來兵戈滿目乖戾之氣上干陰陽西蜀破矣荆襄殘矣淮甸搶攘江湖撼搖民人死亡何可勝計今又先之以地震重之以風雨凡平時之林然而生蔚然而茂神氣之所發育者率皆憔悴蕭條觸目酸鼻而又物價翔踴日甚一日民將無所得食直立而須死耳夫民物之生皆地之所載而天之所覆也今天愛其道地愛其寶但見寖微寖衰之形莫覩寖明寖昌之象可不爲之寒心哉雖然亦豈無道以處此臣敢科别其條以告陛下夫天下譬猶一身身以神氣爲主神氣精明然後骨力堅强血脈流通吾身可以久安而無疾治天下亦然心源者神氣也人才者骨力也兵財者血脈也自一身而宮闈自宮闈而朝廷自朝廷而天下所以主張是者神氣也所以運動是者骨力也所以流行是者血脈也陛下一澄其心源則神氣充矣一振人才之綱領則骨力强矣一提兵財之體統則血脈通矣故天下之機括惟在陛下之一身而已且端平未更化之前姑置勿論自更化之後陛下所歴之艱險變故不爲不多而所以動心忍性者不爲不至矣不知陛下因災異而神氣遂爲之消沮乎抑因警懼而神氣愈爲之精明乎夫憂窘則怵惕安平則弛緩常人之情耳聖帝明王純一不二之德則固不當若是也臣願陛下悼念災變之可畏深思平日之過愆痛自懲艾以陛下之心對天地之心變異卒起之時固當飭躬自省變異漸息之後尤當兢業自持此心所存慄慄然常若盲風怪雨拔木發屋之變臨乎其前絶荒淫之嗜好戒宴安之鴆毒杜羣枉之邪徑伸忠賢之正氣燕居深處與治朝聽覽之際同一莊肅妃嬪進御與經帷講學之時同一敬畏勿以屋漏闇室而自肆當以天鑒孔昭爲可懼勿以借曰未知而自恕當以人見肺肝爲難欺視聽管攝乎天君而毋以外物汩精神幾務盡付于至公而毋以私昵寄心腹斥一時寛釋之邪說而惟思天下至大至重之責不可有一日之暇逸屏目前玩志之細娛而深念藝祖皇帝之金甌不可有纖毫之闕損如此則大臣不敢養驕以惰股肱小臣不敢養諛以惑耳目近臣不敢養安以稔蕭牆之禍遠臣不敢養寇以遺宗社之憂君臣上下置此身于岌岌至危至險之中天地神祇惻然感動將挈而還之于至安至固之域矣臣所謂陛下一澄其心源則神氣必充者此也人主無職事惟以進賢退不肖爲職史稱郭公之所以亡在善善而不能用惡惡而不能去以臣觀之郭公之罪固在乎無剛斷之勇而其受病之原則在乎未能識善惡之眞如使其眞知善善眞知惡惡則何遽至于亡惟其顚倒錯亂莫知適從當用者如轉石當去者如拔山卒之正不勝邪忠不敵佞佞邪滿朝則中正路塞是以終陷于亡耳陛下收攬威福凡所進退之人不勝其衆矣昔者所進今日不知其亡徃徃乍賢乍佞迄無一定之守人謂陛下剛斷之不足臣竊窺陛下近年以來未嘗不欲用剛也特在乎審而行之耳斷在必用者宜施之于君子而勿誤施之于小人斷在必去者宜施之于小人而勿誤施之于君子則得其所謂用剛之實而不蹈郭公之失矣今陛下未能別白賢否之眞但懲徃時議論紛紛異同之弊遂以安靜爲尙然所謂安靜者惟茍同而已爾君所謂可臣亦曰可君所謂否臣亦曰否以茍同爲賢其意將以求安靜也殊不知是是非非力爭明辯合天理當人心乃所以爲安靜阿意順指媚上附下無所救正蔑聞箴規則雖求爲安靜乃所以爲大不安靜耳今災異數見天怒未釋怪徵日新民情易搖尙得謂之安靜乎本朝慶歴嘉祐間羣臣可否相濟至熙豐而并爲一談元祐諸賢亦可否相濟至紹符而又并爲一談由今觀之孰得孰失人才之委靡至近年極矣臣之愚見竊謂勿以已意爲逆順而以義理爲逆順勿以同異定取舍而以是非定取舍庶乎陛下不受人之欺而國家享得賢之實今也不然脫遇有一任使有一除授則左顧右盼輒興乏才之歎正如風痺之人縱緩不收四肢百骸不爲我用謂之骨力之强可乎陛下赫然聖明照臨于上破茍同之說闢大公之途使天下人才踴躍奮迅乃可以固肌膚之會筋骸之束矣臣所謂陛下一振人才之綱領則骨力必強者此也今日急切之務兵財二事而已論者但知逐末忘本臣竊惑焉自古興王之始奮徒手而運掉一世無兵而立有兵無財而立有財蓋其精神志念沈深果斷幾未至不輕躁以先事勢可爲不遲疑而失時挫而愈厲弱而益壯則何事不可爲何功不可立兵財本一事血脈本相通今析而言之執政各主其一不識兵而非財兵何以養財而非楮財何以辦茍不通爲一體大作規模洗滌積弊而一新之臣未見其可也厥今中外所養之兵與凡屯戍沿邊者不爲少矣而猶苦于無兵楮弊布在天下者凡四十千萬有奇其數可謂至夥矣而猶窘于無財此豈拘泥常調者所能變而通之哉陛下必思夫興王之始奮徒手而運掉一世者何術而致此彼惟不以常調處之危中求安死中求生故能易禍爲福如反掌之易耳是故患兵之少而言增募者謬說也患楮之不行而言秤提者尤謬說也舉朝羣臣泛泛如河中木而陛下又未嘗毅然振刷有所改作又烏能救今日傷敗危亡之天下哉或者乃曰論事易行事難今欲振刷改作必思如之何而發端又如之何而布置又如之何而究竟可也臣應之曰今日非不可振刷改作也特患未肯振刷改作耳如陛下果肯振刷改作必有其道矣且陛下亦嘗以自昔人主處艱險危急之極者而思之乎彼口之所食者何食身之所服者何服宫嬪凡幾􅉏御凡幾内外有冗官冗吏否乎有濫恩横費否乎興土木否乎侈宴集否乎獻議者或及此則笑曰是不過節用耳所用如丘山而所節僅涓埃此迂談耳臣之所言奚止曰節而已哉直欲陛下如興王之始奮徒手而運掉一世則必思坐臥仰薪飲食嘗膽眞如越王句踐可也必思大布之衣大帛之冠眞如衞文公可也夫如是天下將曰萬乘帝王而所食如是所服如是是眞欲興邦矣是眞欲洗一世而更新矣妃嬪耶􅉏御耶土木耶宴集耶必能奮然大從減省天下傳誦曰今日汰某人矣明日又罷某事矣冗吏耶濫恩耶橫費耶必能確然痛加裁抑天下傳誦曰今日下某令矣明日又革某弊矣陛下立心務在必行決不朝作而暮止朝廷議論至當歸一寜有甲可而乙否萬一左右之臣逢迎陛下之意以爲方今事勢未至危殆之極何必先爲苦節窮慼之態是說也乃害陛下之儉德者也所宜深警而亟斥之或又以爲方今幸而人無橫議何必爲此紛更張皇之舉是說也乃沮陛下之從善者也尤宜明辨而力排之陛下胡不思夫夏少康之興僅有田一成有衆一旅可謂至狹至微矣尙能振作興起挽囘衰亂之邦復爲隆盛之勢陛下視少康之時豈不尙易于斡旋運用乎梁武帝爲侯景所逼自知必亡乃曰自我得之自我失之亦復何恨嗚呼代天作子撫有萬方危迫困辱至出此言書之史冊貽羞千古當其尙可救藥也怠而不奮及其不可支吾也猶不知悔自昔然矣可不懲乎今日之事不問智愚不拘中外同然一辭皆曰巧婦不能爲無麫餅甚者則曰國將與楮俱敝其慮固苦其言固切而論及于振刷改作則又皆曰陛下猶未之肯也不特陛下未之肯爲陛下左右之臣者皆未之肯也毋乃以爲妨已而不暇計國乎不思皮之不存毛將安附計國乃所以爲已計也陛下躬率于上將有管晏爲時而出如陛下猶欲以平時架漏之具文而施之于傷敗危亡之天下則雖有管晏猶不知爲陛下計而況未有管晏乎夫管晏孔門之所羞稱也今欲求其所羞稱者尙不可得陛下亦可反而思之矣人主天下之利勢也陛下操賞罰之利勢于掌握之内惟在乎善用之則天下何難治之有臣所謂陛下一提兵財之體統則血脈必通者此也抑臣復有獻焉上以言求下下以言應上勿謂言爲無益也臣竊思今日之事復有十條焉號令率多反汗取輕天下今當愼重其所發一也賞罰未行之始天下已生疑心今當示信而勿惑二也所在軍情不安敢于陵犯紀律今當厚恤而嚴法三也災變之後小民艱食皆將驅而爲盜今當招糴以彌姦四也秋高馬肥敵情叵測區處邊畫已爲後時豈容更復悠緩五也督府制閫體統相關所宜戒飭一心以國事而滅私情六也監司按行諸路楮劵徒致煩擾亟宜别行措置七也州縣體量田租務在實惠及下以固民志八也湖淮交子盡合易以銅楮通彼所以寛此儻是說可行亦當早有定論九也安邊所之積貯合議區畫毋致陰消潛耗十也此十條亦粗足以裨末議然臣不敢掇拾細微以溷聖聰者蓋以治天下必使神氣精明自然骨力強而血脈通凡此末節有不勞餘力而自舉者陛下毋以神氣之說爲迂稽諸天地驗諸人事今日之變非向時火災之比蓋火災僅在京城未爲廣也今之水災徧及外方矣不戒于火猶可諉曰居民弗謹遂至延燎水災非細故也我宋以火德王天下先朝河決爲災猶且上下恐懼況風雨肆虐至于此極陛下其可不奮志力行一反衰苶之光景而爲興隆之氣象哉詩曰惟昔之富不如時惟今之疚不如兹又曰我瞻四方蹙蹙靡所騁臣賤性朴愚懷不自已幸値陛下導之使言是以一吐狂僭惟陛下裁幸祕書少監上殿第一劄子臣仰惟陛下更化以來廣開獻言之路而羣臣交進互說大而朝廷之綱紀微而田野之纖悉遠而邊鄙之變故近而宮闈之奥密臣下言之可謂詳矣陛下聽之可謂熟矣而至于切陛下之身之心者間雖言及一二而未有懇懇惻惻竭盡忠愛不顧忌諱不避嫌疑爲陛下盡言無隱者臣一介疎遠去國一紀兹叨寵渥幸覲清光敢不一吐其愚以報陛下知遇哉臣嘗讀無逸一書蓋周公晚歲所作字字眞實吐自肺肝非徒紙上空言而已觀其論商周享國之脩短明示兩途若曰由此則金玉厥躬而養壽命之原由彼則斲喪戕賊而失性命之正故凡受病之根伏于隱微而萌蘖易生者周公皆一一先其未病而藥之蓋適情肆欲是之謂逸故此書戒以後王惟耽樂之從亦罔或克壽懼其心志内荒而縱伐德之斧也勞民動衆是之謂逸故此書戒以無淫于觀于逸于遊于田懼其窮極民力以快耳目之娛也輕改舊章是之謂逸故此書戒以變亂先王之正刑至于小人懼其驟更數易而無堅凝之守也不恤衆怨是之謂逸故此書戒以民否則厥心違怨否則厥口詛祝懼其怨懟繁興隄決而川潰也淫刑窮兵是之謂逸故此書戒以亂罰無罪殺無辜懼其輕視人命路熟而手滑也老臣忠愛先事豫防列此數條凜若金科茍犯其一害已可畏兼犯數者危乎殆哉嗚呼周公受文王武王付屬之任恐恐然惟懼成王不自愛重則于吾責爲有負故其勤拳眞切之意必欲始終保護成王全而歸我文武庶幾無慙于託孤云爾然則無逸一書固切于成王之身心尤萬世帝王之藥石也恭惟陛下勇智本乎天錫聰明冠乎羣倫猶且孜孜勉勉崇儒興學其于帝王之道蓋已脗合無間矣抑臣猶願以無逸爲陛下告耆蓋臣卽書以驗今日之事如印劵符鑰之相契殆若端爲陛下而發者不可不精思而深省也且陛下固知節情欲之流以保天和持儆戒之念以彌德性矣天下咸以是賀陛下臣則未敢以爲慶也譬彼蔓草暫爾芟薙春陽一轉芃然復生何則元有蔓草之根固與無宿根者不同也泛觀天壤之間嘉禾與蔓草同受一氣而不能兩立嘉禾茂則蔓草不殖蔓草榮則嘉禾必枯反此理以觀此身物欲之根不去則性命之基不牢性命之基欲牢則物欲之根當絶陰陽消長之理斷斷乎有不可誣者而況女德無極易以溺人剛制于酒克終實難尤陛下所宜兢兢戒謹也陛下固知體恤民情而不至積怨讟之釁存心仁厚而未嘗萌嗜殺之念矣天下咸以是賀陛下臣亦未敢以爲慶也數年以來江湖閩浙寇亂交作吾民死于征斂死于徭戍死于兵革否則死于饑荒者何可數計重以楮令日變物價日增民生無聊怨讟並起昨者中原可乘之會臣下獻規恢之策淮襄困于餽餉百姓踣于道塗偏師輕動棄甲而復然則陛下雖不疲民力以召怨而民力至今日而竭陛下雖無嗜殺人之念而民命至今日而殘孟軻有言殺人以挺與刃有以異乎無以異也以刃與政有以異乎無以異也陛下心甚仁于百姓而百姓怨乃歸于陛下凡無辜而死者雖非陛下殺之猶陛下殺之也無逸之終篇論哲王聞小人之怨詈則皇自敬德大哉敬乎敬心常存必不溺于情欲必不移于玩好必不勞民必不佳兵天下欣然戴之爲君而又何怨之有不然兢業一或少懈邪僻乘間而入侈心虐政捷出無端其極也民咨胥怨怨之不已至于詈詈之不已至于詛詛騰于萬口怨萃于一人故周公痛切而言曰怨有同是叢于厥身此怨不歸于他人而身實當之然則人怨乃移爲已怨禍人乃所以自禍也勢一至此雖欲長享天祿以綿無疆之休其可得乎且夫逸欲之極至于輕殺而原其根本則始于一念蓋一念喜功伏藏于中始若甚微炎炎不已易以滋熾及兵端一啓小不如意則遽斂而藏之夫斂之固是也然臥薪嘗膽果爲何事敵國外患所以進德又豈容信甘言而弛武備乎臣恐前日之輕舉與今日之宴安其爲逸一也抑臣又聞之勤者逸之對也人皆知勤之爲無逸而不知徒勤亦逸也秦皇之程書隋文之傳餐乃叢脞非無逸也正使日御經帷親近儒生若可以言勤矣然耳聽經訓而身不行焉則雖勤亦逸耳是故專心致志自强不息是謂無逸聽之必行行之必力是謂無逸出而與講讀相親是心也入而與妃嬪相處亦是心也無作輟無暴寒是謂無逸斯道也在大易謂之生生在魯論謂之仁壽斯須放逸則生理息一念間斷則仁壽虧甚可畏也甚可懼也周公所以保護成王至于壽考者正以元老大臣其責切已故耳陛下可不深念于此哉臣曩者將指江東因辛卯鬱攸之後嘗瀝忱悃力言逸欲之害時朝廷以言爲諱抱此孤忠無階得達今公道開明樂受忠言臣敢復以此說一悟聖聰惟陛下裁幸取進止秘書少監上殿第二劄子臣聞天地變化草木蕃天地閉賢人隱陛下新更大化正天地變化人物蕃盛之秋也臣竊怪比年以來百物日漸衰耗小民愁苦大不聊生臣濫叨麾節十有餘年其在江東也旣目擊凋殘窮悴之態易守富沙所見尤甚于江東旋被奏事之命道經三衢視臣七八年前假守之時氣象大異猶可諉曰寇實使然及歸抵四明則蕭條之狀與三衢同人人嗟咨家家歎息耄耋之人亦云前此未見臣心甚駭之天地生物何有終窮今物耗且貴氣象蕭條豈無所以然之故歴觀史冊所載大抵物貨衰少井邑荒凉徃徃不見于隆盛之時而多見于叔末之世當其隆盛也公道開明衆賢彚進布列在位蔚然輝光凡融結于宇宙之間者無非瑞氣之成象天不愛道地不愛寶物產蕃阜乃變化之餘效耳及夫叔末之世佞僞馳騁賢智抑鬱上下怠玩精采萎苶凡形見于天壤之内者景象迫促而不舒物產壅閼而不暢無寖明寖昌之勢而有日銷月鑠之形亦理之所必然耳多賢則潤澤豐腴乏財則膏液枯竭已事之驗昭哉可觀今日豈不多賢歟更化以來招徠耆艾登崇俊良一反天地閉塞賢才隱伏之徵則當有天地變化萬物繁阜之效今也賢才衆多而物意焦枯如前所陳者何歟豈氣數至此而微有非人力所可挽囘歟抑變衰爲盛必有旋轉造化之妙而非時賢之所能及歟否則衆雋雖聚本朝而分職授任未能各當其處坐觀者多而任責者少歟否則陛下雖有好賢樂善之念未免貌敬心疎彼之有所抱負者實未能展布歟是數者之中必有一二于此矣而臣又竊有隱憂者深恐悠悠歲月績用未應陛下亦見在朝之士所謂醇儒雅望者略無捄弊新奇之策必將漸起厭心且别求夫輕銳有才之人善言利而多心計者用之譬猶抱沈痼之疾風寒暑濕之所凌薄其受病固非一日積漸耗散生意纔一髪耳氣象蕭條則其病證也人材則醫也計畫則藥方也有善醫焉未及盡用其方乃遽更他醫雜試而輕攻焉則一髮生意所存幾何今日所用之人是也而所以用其方者未也陛下胡不集在朝之彥如慶歴間開天章給筆札俾各條陳當世之利病何以振朝廷之綱何以裕國家之計何以濟生民之急何以壯邊鄙之勢察脈觀證對病用藥鑿鑿精實勿使空談上之人擇其尤的切可行者使各竭力任責課功計效凡布列周行者不至虛度光陰粉飾觀美則事事振起物物精神昔日血氣之微弱未有不轉爲盛强茍徒慕賢人衆多之名而無庶明勵翼之實使賢者仰屋竊歎而憸人刻覈之說得以投隙而入則元氣先蹙而血氣隨之其銷鑠耗竭決不止如今日而已臣來自遠方不識忌諱盡吐肝膈惟願陛下力守更化以來求賢如不及之初意毋致少有轉移君臣上下苦心刻意是究是圖將見薰爲太和民物蘇醒享變化蕃盛之效消閉塞隱伏之機特一轉移之間耳惟陛下篤信而力行之宗社幸甚生靈幸甚取進止某口奏臣一介庸愚濫叨麾節于今一紀自陛下臨御大寶未獲一覲天顔誤䝉陛下記錄擢寘冊府兹有管見仰裨聖德之萬一聖語云卿久勞于外篤意愛民每覽卿所陳備見懇惻某奏臣奉陛下寛大不敢不竭盡此心讀第一劄至無逸一書非特切于成王之身心實萬世帝王之藥石聖語云此書周公說得切至眞可爲後世人主之法某奏臣得于道路咸言陛下聖德日新近日于逸欲之事戒之甚嚴更願終始如一則無媿此書矣讀至其極也民用胥怨怨之不已至于詈詈之不已至于詛詛騰于萬口怨萃于一人聖意竦然首肯再三讀畢某奏臣劄子中說未盡更容敷陳乞陛下垂聽陛下試思逸從何起豈不曰從念上起念從何處起但如此說便認作心若認念作心元有這逸底念心譬似月念譬似雲月本來光明皎潔雲起則掩月雲散則月之明如故心亦如是此念起則心昬念不起則心之澄明純一素來只如是又奏陛下何以使得這念不起上改容問如何某遂奏臣以爲陛下若欲念不起只看周公先知稼穡之艱難一句大抵人主不可頓放己身在富貴崇高中須是頓放已身在艱難辛苦上天下最辛苦莫如農夫陛下豈可萌宴安之念直須將吾身不作萬乘帝王看常把農夫相並看這艱難辛苦底滋味果不忘于心自然逸欲之念不起矣聖語云是某又奏陛下御經筵講致知格物誠意正心可謂詳熟今觀此書周公首言君子所其無逸先知稼穡之艱難此是致知格物最要者知艱難之事則妄念不作此之謂意誠妄念不作則本心之純明更無纖毫病痛此之謂心正天顔甚開納連云卿所言極當極當第二劄讀至今日豈不多賢歟更化以來招徠耆艾登崇俊良聖語云今日用賢區處得當否某奏陛下好賢樂善出于中心向來公道鬱塞賢者屏伏在外自陛下新更大化衆賢彚集目今氣象甚佳但當委任而責成功聖語云正緣無人肯任責某奏若不任責虛度歲月深爲可惜目今朝行間非不濟濟可觀然須眞實以國家爲心竭力盡瘁乃克有濟此在陛下興起振作使之趨事赴功可也聖語云此專在上之人率勵之耳讀至陛下見在朝之士所謂醇儒雅望者略無捄弊新奇之策必至于漸起厭心則將來别求夫輕銳有才善言利而多心計者用之口奏醇儒雅望者固是體國但恐陛下以爲遲鈍則厭斁之心生此斷斷不可陛下一有厭賢之心彼之巧伺旁睨者捷出而乘之陛下一入其言而不自覺利害不小聖語云是是讀畢上又問近日楮幣之價日益減削秤提無策如何則可某奏此事雖是監司郡守之責然其機括卻在朝廷若監司郡守不過小小術數行之一路一郡耳縱使秤提略起終無大益況一處價稍高則他處皆輻輳而至併這一處壊了聖語云正是如此某奏臣謂朝廷若要作規模只是減印造之數但目今百需皆要會子如何省得臣又反覆思慮只有節用一說雖是老生常談卻切實用只如陛下昨輕動師旅所幸收斂得速若不收斂兵費豈易支乎陛下省得這一大頭項是印多多少少會子如此等類每事節省自然見效此不可以立談盡也聖語云卿所奏皆當若有所見可奏來某奏聖意開納如此臣敢不竭其愚䝉齋集巻四
