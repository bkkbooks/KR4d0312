body:
  text: 䝉齊集卷十二宋袁甫撰記湖州嬰兒局增田記豫至官之始吏抱簿書來視之乃嬰兒之籍問其吏則學胥也豫曰舉子慈幼是有司存奚預于學吏對曰初建議起于校官而取米于常平常平米法曹實主之法曹謂米于我乎取奚事他屬白諸州請自豫始繇是嬰兒屬隸法曹後太守弗是也復收而隸諸學郡二總其綱校官專其職學之前廊生二人領其事有棄兒于道者人得之詰其所從來真棄兒也乃書于籍使乳母乳之月給之粟擇媼五人為衆母長衆乳各哺其兒又一人焉以待不時而來者來者衆則益募乳收之今八十人矣有田餘四百畝視入為出粗無乏事豫謂此仁政之端也施欲其厚必厚積乃可積薄而厚施焉無以繼其後所活兒殆無幾乃告于常平使者捐入官之田且核在局之隱沒者得百三十畝草蕩山田之數亦如之約可食八十人慮年饑而棄者多又請諸郡得米二百石嵗以新易陳謹勿移用積貯稍豐矣兒或病且夭不以時聞乳者誘于利取他人子代者有之無以為驗殆如戲耳于是嚴鄰保之法不告而易他兒知而庇焉者咸置諸罰齒及七齡粟勿復給舊規才給三四嵗今復其初有疾病者醫一人謹視焉今增為二如是而夭者亦希矣孟子曰乍見孺子入井皆有怵惕惻隱之心非內交非要譽非惡其聲是心何自發哉無所為而為之人之本心也推是而往仁不可勝用矣夫求仁學者事也遂書而刻于石明月亭記天地隂陽之氣混淪磅礴乎宇宙間垂日星竅山川播五行于四時和而后月生焉人者負陰抱陽並列而為三其純粹清明之氣同一初爾豫嘗中夜以興整襟危坐仰而顧俯而思意領神㑹欣然有感天壤之間凡可以供耳目之娛者久則必敝獨此清輝終古常新反而自照本心虛明更歷萬變迄不可磨亦何異于炯然寒光垂曜萬世乎豫官霅川廨舍居于城西舊有明月樓後廢勿存今更為亭因其名名之夫物有興而有廢與既廢而復興也皆非偶然而然豫獨愛夫今之亭非昔之故也而今之景則猶夫昔也人之睹斯景者雖遠近高下戚欣鬱舒有萬不同而所謂炯然寒光垂曜萬世者常自若爾兹豫所以有感也雖然或雲翳焉或薄蝕焉昭昭者俄而昧昧是其果無變耶雲翳去矣薄蝕還矣昧昧者俄而昭昭是其果有變耶嘻本無變也有時乎變者妄也非其初然也人能知變之為妄而不變者乃其初則登斯亭者得無慨于心乎餘干縣先賢祠堂記相天子與服勞州縣異乎職位崇庳不同盡忠于君則一也相天子與授徒里巷異乎事業顯晦不同以善淑人則一也干越邑令馬君合是邦先賢不以職位崇庳事業顯晦為間作新堂以祠之于以識邦人之思繪事訖功禮儀是飭蕆事之日觀聽竦然邑士求記于余余謂是舉也足以教人識義命之所安焉貴賤榮悴得喪禍福制命于天奚庸致力吾之所自力者有矣戴圜冠履方屨超然獨靈于羣物而謂之人顧不能求其所以為人者獨不足羞乎顧瞻新祠人心愛敬雖亡若存何為而得此貴而為宰相命也命可必乎命不可必則有義焉賤而為匹夫亦命也茍無愧心視列鼎重茵夫何羡吾惟守此義而已命義合乃得其所以為人者矣則夫覩斯祠也反諸吾身縱不如忠獻忠定殊勛茂績著在青史得如諸賢以職業自見以詩書授徒生雖不獲顯用歿乃與輔相並祠亦足矣顔閔未嘗仕也垂芳千古人到于今仰之又何必舍吾之良貴而盻盻焉以外物為重耶馬君夙有雋才為政明而不察有惠愛于邑慊慊焉常自以為不足事關風教知無不為志可嘉也已馬君欲得師乎視此前人邑士欲學政乎視此馬君祠者凡九人忠定趙公鄉之望强恕南溪䝉堂三柴君恕堂李君皆師友昆弟忠獻張公嘗攜南軒寓兹土沈趙二侯俱邑令也馬君名光祖金華人婺源縣思政堂記婺源朱令君幾仲既新縣廨以餘力築堂扁曰思政而屬豫為記余聞之良醫有年少患羸疾視其色曰此心恙也爾得無嗜書苦思乎曰然曰他醫勸爾省思慮乎曰然曰爾本以思受病又戒爾勿思思其說而不得是又添一思也爾第寬綽厥心勿勞爾神勿搖爾精志之所之勿廢爾思思而不已一日豁然心怡理融與病相忘則病去矣年少如吾言良愈余曰噫嘻此政論也豈但醫哉今夫俗吏之為政逐利祿希寵榮撤義理之藩垣破名論之扃鐍率意妄行毋庸致思可也有人焉依違乎公私之間兩者交戰莫之適從體國乎則撫字虧愛民乎則催科拙扶弱乎則巨室謗安大乎則小民咨守法乎則情誼乖行志乎則律令悖量力乎則人多忌好謀乎則聽言雜信已乎則下情壅求知乎則道必枉自晦乎則上不察凡此者朝夕計慮皆足以撓吾虛明之府也知思之為害而欲以不思處之是又庸醫救病者以省思慮不惟無益秖以為贅然則奈何曰吾嘗聞諸古矣思其難以圖其易難易本一機也思其始以圖其終終始本一理也方其未通往來憧憧及其既通四達皇皇仰而思之時行即行思不出位時止則止如是而思思之病其有弗瘳乎且夫喜怒哀樂之為患而禁其勿喜勿怒勿哀勿樂激而反甚焉者多矣孰若平吾心而毋起意焉當喜而喜當怒而怒當哀而哀當樂而樂蕩蕩平平奚所擬議無適無莫奚所較計終日思未嘗思終日不思未嘗不思斯理也余能形諸言而幾仲固已施諸政矣然則幾仲之政可得而聞歟曰請問諸邑人徽州秀錦閣記寶慶三年冬十月四明汪侯以直寶謨閣知徽州余與侯居同里余先公潔齊與侯先公適齊又相好也嘉定甲戌余與侯為同年進士已而同聯班著癸未余請外得徽踰年而先公歿丙戌承乏三衢而侯亦出為徽守越明年以書抵余曰新安本父母邦吾族祖嘗綰左符時人以晝錦榮之今集中所謂城郭重來交游半在蓋龍溪自序也吾獲嗣前躅顧瞻黃山南挹練溪之清北拱秀峰之翠慨然遐想忽若有感乃擇勝建閣扁以秀錦且云閣固無慊于秀吾則有愧于錦子其為我記之侯豈誠有愧哉閣之秀足以埒山之秀侯與此山此閣所謂三秀也秀既無慊則于衣錦也奚愧三代盛時命鄉論秀士升之司徒司徒論選士之秀升之學大樂正論造士之秀告之王異日綦貴而為公卿即始進之秀士爾貴人爵也秀天爵也不以貴易秀是不以人爵棄天爵也侯刮磨紈袴之習勤勤種績為秀士戰場屋躡世科躋膴仕詎肯一日忘秀士之味哉今夫世之華其外不華其內者多矣華其外者榮枯在物華其內者德輝在我周覽黃山之秀重衣龍溪之錦侯豈華其外者蓋秀錦已在侯胸中而人未知之爾夫窮居則修其身仕宦則推諸民同一秀錦也余竊有志焉曩假守時嘗奏蠲茶租築石梁二事于徽民最切端緒開矣而未竟也或者待侯以畢余志况侯之宏規又豈但此二事而止推廣而潤澤之其為秀錦不亦多乎將見黃山之民歌之曰理民之俗兮是爬是梳胸中之秀錦兮生意藹如導民以德兮是浸是灌胸中之秀錦兮其光有爛黃山可改兮秀錦有時而磨黃山不朽兮秀錦長與山而嵯峨此余所以期賢同年也此徽民所以祝賢太守也此適齊所以望賢子也侯勉之侯勉之侯名立中字强仲位于朝嘗升列卿云莫能名庵記余友項吉甫以莫能名名其庵余曰子奚所居曰吾朝夕惟庵之居余曰子莫得而名其庵又奚得而居其庵曰吾以莫能名名之則亦以莫能名居之余曰天地尚可得而名子豈大于天地耶子誠大于天地曷為囿于天地之內耶曰吾與世人周游于宇宙之間饑而食渴而飲晝而作夜而息吾無適而不自得天地又安得而囿我余曰子之築斯庵也天地固不能囿子矣其毋乃囿于莫能名之中耶吉甫未知所對余曰子不知也余亦不知也未嘗囿于莫能名之中也亦未嘗超于莫能名之外也子以為奚如吉甫曰本無可超亦無可囿余嘉其言之契余心也遂書以授吉甫衢州徐偃王廟記禮諸侯方祀山川之神能興雲為風雨在其地則祭之古也今之郡守視古諸侯衢邦靈山有徐偃王廟血食嵗久靈跡愈著邦人䖍奉如一日寶慶二年冬某假守于茲祀事惟謹越明年夏潦秋旱禱輒響答嵗獲中稔民用輯寧拜王賜為多邦人僉言王有大功德于民封爵宜極褒崇又王妃王子亦當隆品秩以侈報稱乃具以實聞于朝事下儀曹且施行矣是嵗十有二月旁地居民曲突勿謹延及王祠倏為灰燼守以事神治民為職廟燬神怒民失憑依某甚震懼焉方慨然有興復志邦人有言王功德在民民痛棟宇之壞智獻謀富輸財踴躍從事一反手間事濟矣于是協衆志捐郡帑端緒始開效財植之需給工程之役者輪運輻集乃廣規制乃拓基址前袪蔽障翠巘層出背起樓閣清溪環繞賈區之淆處者斥之祝史之根據者徙之翼以重垣周衛扈也映以方沼增勝概也四方之民聞廟載新炷香乞靈者肩相摩于道適㑹前所請封爵事儀曹關諸奉常奉常上之朝省朝省下之轉運使者轉運使者檄嚴婺官屬互核其事合辭以聞天子嘉王功德加封某王妻封某夫人子某封某侯某某侯如所請命下之日某躬率邦人郊迎鉦鼓嘈囋夾道聳觀戴白之老感動垂泣乃委官僚奉安告命于廟而禮于是成矣夫禮者其天理之謂乎人之事神者以此神之所以為神者亦以此貫幽顯之間未嘗一日磨滅也周穆連楚以伐徐王不忍鬬其民流離失國國可失也而萬有餘家之從王者不可遏棄玉几研于㑹稽之水几研可棄也而聞孫之世守王祠者不可絶自周迄唐更千有餘年廟宇陊剝黮昧屢矣屋可圮也而昌黎伯鑱石之辭不可泯自唐迄今又更數百年不知幾壞幾興矣世變可推也而人心之依戴信向者不可奪乃今鬱攸挻禍人謂不復有廟而祠宇之輪奐爵命之便蕃二美集于一朝光寵超于疇昔剝窮而復否極而泰功久彌振德久彌新非天理周流不息之妙行其間是孰使之然哉藐爾守臣非敢自謂不獲罪于王也求庶幾不獲罪于禮耳乃于奉安之日為之辭曰王之立國仁以為基施及百世仁聞昭垂昔誦王仁得于聞知今誦王仁見而知之龍丘之原有廟奕奕民曰宜哉競赴厥役帝曰休哉寵光有赫二美同時王仁愈白古也有志復禮為仁祀事孔修惟禮是循禮既無曠仁心純純願推此仁永芘生民徐偃王行宮記靈山重作偃王廟前鑿方沼曠如也後建傑閣屹如也廟貌顯嚴神人具喜而行祠之在城者前隘後庳規制弗稱余一日謁祠下徘徊顧瞻默若有啓豫者亟呼工指畫疏舊池之蕪穢設周垣焉拓故址之下窄增內寢焉于是前之曠如後之屹如略與靈山等嗚呼神無不在亦無在也豈計此區區哉顧念民覃王仁千古無極舍是則無以示昭報厥今奕奕新宇相望不越三舍竊意雲斾霓旌逍遙二者之間景物如一不移而具在城之適猶靈山也于是可以稱吾民依歸報事之心矣工既竣事酹酒告䖍乃作送神之詞遺邦人歌之其詞曰朱弓兮發祥玉几兮耿光國易仁兮寖昌緬行祠兮城一方儼血食兮閲幾霜屋老兮暗其弗章地褊兮威靈弗揚羌四顧兮倣徨拊豫心兮弗康靈龜告余兮十月孔良亟其改作兮廟貌堂堂碧沼邃宇兮匪王孰當紛祈氓兮炷薌羅酒肴兮芬芳我王兮來降容與兮相羊春遲遲兮日載陽淡微月兮秋夜長我民兮世世不忘王鎮茲土兮慶未央衢州光孝寺記光孝禪院在闤闠囂塵中㕓肆淆處棟甍聯續比鄰有警幾為延燎者數焉寺僧恃天幸可常滋玩弗飾乃寶慶丁亥冬十月鬱攸挻災寺果不免念此朝廷崇奉名剎也非他寺比興復可緩乎謹按梁天監中異僧卧雲結廬此地因寺焉號吉祥國初仍之錫以寺額至我徽皇更名天寧高廟南渡思念弗替令天下天寧悉名報恩廣孝旋又以光孝名臣某伏思我高皇之以孝名寺也豈徒若世人追悼其先徼福于佛而已哉中原赤子久苦烽燧版圖未歸讐恥未刷臥薪嘗膽亟思報復以慰祖宗在天之靈此志未嘗須臾忘也名不虛立緣志而生存斯名所以存斯志也天下後世徒見寺以孝名豈知志所不忘者乎不忘徽皇也不忘徽皇者不忘中原也皇上嗣服以孝治先天下推問安侍膳之心為繼志述事之心臣子仰體孝思宣明聖意兹事之不可緩也昭昭矣乃核圖籍乃諏故老則知曩時基址宏敞面勢穹嚴僧徒牟錙銖之利附益邸肆寖以隘狹欲勿更革乎則寺日廢廢寺非所以昭聖孝也欲大更革乎則民必擾擾民又適以纍聖孝也二者無一可然則奈何臣某又嘗伏讀國朝㑹要紹興七年肆頒明詔深戒工役之不可輒興而復繼之曰本寺有能修蓋者聽夫不禁其興寺而惟禁其擾民聖訓蓋可見矣今茲光孝之役不以民興寺而以寺興寺庶幾不負聖訓乎費莫廣于聖者閣西山乾明寺所移也工莫衆于廊廡諸剎協力所助也三門規制之恢拓復寺基非侵民地也上自佛殿下至庖湢出于官之所施者百姓不及知出于衆之所捨者官司未嘗强也然則于民奚擾而于聖孝奚纍也曽子曰斷一木殺一獸不以其時非孝也又曰夫孝置之而塞乎天地溥之而橫乎四海一梵宮之興初若未足深計而所以不擾吾民與所以祗承聖意者在是所以不忘中原者又在是是知塞天地橫四海之孝皆自其一念充之也茲記之作特表而出之使知關係之大若此世世修之永勿壞衢州重修靈順廟記牧民無他伎巧從其願而已靈順有廟為祈氓設也廟舊傅城西廡簷牙距城無幾雨溜相激射嵗齧其址余環視曰嘻廟為民祈福城亦為民捍患也今若此因之則廟病城革之則城病廟廟與城交為愈顧玩視之不以為病可乎既又念曰民之城神之城也雉堞將隳民失所衛神安乎哉爰體神心稍縮西廡視舊殺三之一簷與城離立不逼仄不剝蝕不因不革相依而不相病民咸謂宜則又泛觀締思圖報神渥乃創寢殿邃宇翬飛乃新級磚履道砥平乃闢廟門而勢顯敞乃揭巨扁金朱煒煌凡前日欲為而未遂者靡不殫舉從民願也工既竣事神棲載安驅袚沴孽嵗迄大和民又益喜乃相與請紀顛末以詔來者余將受代而行矣亦不敢違其願也遂復書而刻諸石衢州重修嶽帝殿記某治衢之次年天慶道士允升來言嶽帝殿圮甚將修之請佐其費越明年殿成又請記其事帝于五嶽最尊與天同大與道無極均福生民日用飲食凡我邦人得以仰父俯子秋毫皆帝力也修崇邃殿守臣之職爰詔後人託諸樂石石有時而泐帝之德千古而無息其以是為託衢州石塘橋院記石塘舊設梁壞不時葺病涉日甚余欲命僧掌其事僉言旁有二剎曰藥師曰能仁藥師嵗收田租可百石僅給一僧僧耄矣不為衆與疇其助之而能仁僧道融魁岸有才幹樂施者必衆莫若併藥師歸于能仁而專屬諸道融余遂招道融與語道融欣然願自力乃為置簿籍給官書上其事儀曹為永久慮從衆也傳曰與人同欲盡濟余固喜于從衆者方事之未定也道融觀衆所向今定矣衆將于道融觀焉勉之哉異時或有朵頤其旁欲敗乃事道融其執儀曹符以往必有明有司為公議津梁者道融其奚慮衢州續惠民藥局記局以惠民名官取贏焉則名與實背而馳矣官不取贏恣吏與工漁食焉利歸此曹非惠民也戢吏與工矣不培其本其惠易窮猶無實也局之本錢積纍嵗久核其數以緡計者可三千遂三分之以其一給費用以其二買膏腴田餘百畝嵗收其入益市良藥藥易售局日興錢羡則田增循環數載本愈厚藥愈精惠愈溥矣局之官僚請記以詔來者余曰此在人方寸地耳奚記焉雖然蔽一言可乎曰願有請余乃書曰上毋以利妨義下毋以僞亂真衢州聖者閣記金華聖者閣在三衢吉祥院蓋聖者真身也自國朝迄紹興院再經鬱攸之厄而聖者真身巋然獨存寶慶三年冬十月火復作而真身亦無恙此邦尊信聖者非一日遂亟營傑閣有加于舊以慰邦人之心寺僧請余記其事余謂混凡同聖靈異昭赫尚假記耶且土木工程纎悉亦何待余記為請試以鄙見問聖者凡人所以崇奉佛法為其福力廣大也使福力果廣大則火不作矣而顧不能止火豈定然之數佛亦不能逃歟火三作而真身三免是又超數之外何也且佛有無量不可思議之平等心則當有無量不可思議之平等功德普同救度是為平等今真身獨全真身之外一爇無餘是又何也世人不能解余則了然無疑佛無在無不在聖者之生也人異之其圓寂也人又異之火不能毁其真身也人又異之佛果在是耶有定在其謂之佛耶無定在其謂之佛耶聖者辭世頌曰古貌昻藏法中之王豬頭千箇不把片嘗陶吾真性吾是定光且陶吾真性非豬頭也亦非非豬頭也豬頭千箇非嘗也亦非非嘗也吾是定光非定光也亦非非定光也人謂之散聖非散聖也亦非非散聖也人見其圓寂非圓寂也亦非非圓寂也火作而真身不壞非真身也亦非非真身也無量不可思議之平等心豈較火不火哉無量不可思議之平等功德豈較真身在不在哉聖者以為然乎以為不然乎遂為之偈曰聖者示現本無示現聖者不示現亦無不示現慧智尚莫窺凡眼徒自眩神通大自在功德世界遍舊閣倏成空新閣儼當面乃知箇中意入火原不變無變無不變古佛定光現衢州平糶倉記衢為近畿望郡土多良田小民力穡寶慶丁亥余嘗假守矣年嵗屢豐公私有餘積俗益熙熙以樂去之三年劇盜起常山破江山開化閭井為墟聲撼旁邑余時持江東使者節壤地相接寇旋蕩平方為衢民慶端平初元余守建溪被旨奏事道衢見風俗與昔大異惟米價獨平即父老問故父老泣言自明府去吾老稚厄于災傷死于盜賊于今獨相保聚未填溝壑者吾别乘陳侯賜也侯縮浮費振餘財創平糶倉視時豐儉為斂藏法民方春夏艱食賴是以活一日侯以規式示余講畫條理粲如也余慨然曰凡記載語易浮于實今親歷其地耳父老言與規式無殊可以傳信不朽矣自儒道不振俗吏詬儒指為腐爛有國家者厭儒而思吏噫陳侯居官不嘯咏風月而刻意為民儒果腐耶余嘉其有志于是乎書其詳悉則有規式在不復録侯名瑢字端甫嘗學于慈湖楊氏䝉齊集卷十二
