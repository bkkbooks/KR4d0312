body:
  text: 䝉齋集巻九宋袁甫撰制陳韡除工部尙書依舊沿江制置制敕介長江而分閫式嚴留鑰之司掌邦土以命卿增峻中臺之重維時明牧顯有駿功庸就畀于邇聯示益彰于隆委具官某抱承家之學有濟世之才淮楚未寜已見出奇之畫江閩作孽居多靖難之勲寵司陪京往護諸將蠢兹介士擾我朱方倚鐵甕以倡謀棲金峯而假息布元戎之令誓不招攜讋羣叛之心期以贖過情辭眞切禍福著明且信且疑方自懷于猶豫不留不處遽盡掩于鯨鯢一掃姑息之風亟奏蕩平之捷爰陞常伯晉長繕曹如親九陛之前益煥中權之寵緬惟入覲語及籌邊觀其爲國深謀每以用兵爲戒度德量力朕不忘龜告之言禦侮折衝爾尙奮鷹揚之志趙希􅘊除將作簿制敕具官某記曰上酌民言則下天上施吏治之否臧朕每于民言酌取焉爾令于畿邑孳孳得民和民惟恐令之去也休聲旣鬯轉而上聞朕留汝以從民願行再朞矣俾有列于朝簿正匠監豈特旌爾之勞抑使字民而能得民者勸焉項博文除大理寺簿制敕具官某朕明愼庶獄增植國家好生之仁故于列院中察爾敏而近厚俾之簿領理寺如得其情哀矜勿喜聖門明訓也念之哉除大理寺簿制案此制原本闕姓名敕具官某獄重事也理寺列屬寄朕欽恤之意焉爾明愼不茍擢爲簿正民命攸繫周官五聽孰聽之心聽之也秋毫有累則天君昬而民受其寃矣可不敬歟王極除太府寺簿制敕具官某朕念不泄邇不忘遠之訓蜀士凡有所長搜羅惟恐後矧雋聲著聞者乎爾生有異質早掇巍科不自矜夸益加培養通達古今曉暢事宜非碌碌常才比簿正外府用由此階詩不云乎靖共爾位好是正直予以遠到期汝欽哉勿予負何處恬除宗正寺簿陳瑢除國子監簿制敕具官某等簿正之職聖人猶爲之有志于學者師聖人可也爾處恬昔爲太學諸生上書言事有挺挺風節爾瑢嘗貳政柯山愛民戢姦至今人思之一繇璧水升璇牒一自列院遷胄監俱以簿正爲職夫有令名固難永終譽尤難欽哉勿替初心益充所學則予汝嘉除司農寺簿制案此制原本闕姓名敕具官某儒者恥言理財食貨載在洪範儒者事也而可恥乎爾智識通明諳練庶務簿正農扈乃以才選其專精恪勤阜民裕國是爲稱職洪咨夔除吏部侍郎兼給事中制敕朕總攬大權宣明公道以敘正羣吏職重銓衡施命誥四方事嚴封駮顧瞻在廷之彥孰號兼人之才必得通儒始稱茲選具官某孤忠自許勁節不囘立臺端則不避權奸居掖垣則匪徒潤色誰云賢者無益人國藉爾輸誠固知明主可爲忠言助予更化積勞云久以病丐歸雅懷難徇于潔身大義合思于體國就正天官小宰之任更觀夕郎批敕之風職掌雖進于前詞頭則簡于舊比覽卿疏深契朕懷衆皆醉我獨醒信非立異昔者疾今日愈云胡不留矧當乏才之秋尤隆久任之典引領以望爾終爲元祐之正人矢心而言朕不負端平之初志尙殫忠藎式副簡知丁伯桂除權吏部侍郎制敕朕疇庸四禁分典三班王者之建六官莫重銓曹之寄小宰之正羣吏式高法從之聯兹得通儒肆頒襃命具官某受才膚敏臨事浚明自中外之洊更已聲華之藹著比更大化徑上要津抗白簡以觸邪每扶善類伏靑蒲而効直不事詭隨螭坳嚴言動之書鳳閣演坦明之制積兹衆望簡在朕心屬懷北顧之憂尤重西銓之選旣員多而闕少矧官弱而吏强昭示公平得赳赳武夫之用剗除姦蠧盡蹇蹇王臣之忠期爾力行副予明陟張實甫俞處約父各封承務郎制敕具官某等禮九十日有秩老老所以興孝也矧爾有子策名雋科宜均祭澤庸示襃榮服我命書永娛釡養李劉除禮部郎官制敕具官某郎選高矣南宮最清非夙負譽望者疇稱兹選爾蘊蓄甚富發爲菁華朕欲用之久矣屢更麾節少休琳宮今命爾躋省戸往欽哉黼黻王度將于爾取焉吳叔告補承事郎制敕具官某朕玩索中庸之旨常取要切之訓筆之于書洎䇿士大廷茂明正學隱然言意之表固有在也爾抱負所蘊來從遠方乃能若稽古訓舉發强密察之語敷暢厥義深契朕心爾其亦有味于中庸之書矣是用親擢褎然爲舉首懋之哉毋志温飽益充器業以其所以勉予者自勉焉庶乎無忝俞括轉承直郎制敕具官某朕篤親親之恩施及庶姓爾亦預焉其進選階尙思報効使天下毋謂朕私繆夢達特轉武德郎制敕具官某朕方以信賞厲將士爾有戰多雖久不廢懋哉服我襃寵思報効焉俞煒特補迪功郎制敕具官某選階雖卑朕不輕授爾及此妙年克力于學以稱朕恩則雖恩亦義也陳紀特換授迪功郎制敕具官某昔三輔吏士見漢官威儀猶感泣恩屬心爾久汙僞命今得身爲漢官又以左選初階易而勇爵可謂幸矣當何以報國乎耿耿忠義永肩一心尙勿替朕命杜幼節除著作郎制敕具官某著庭儲才之地爾毓秀挺奇聯中兩科當此國事多虞固應亟見于用奚以儲爲哉望實貴乎相副旣有實才復養資望朕意固有在也毋曰職淸事簡勉究遠猷嗣有襃擢應繇除著作郎制敕具官某朕誦豐芑之詩思爲培植人才計爾博學多聞屬辭知體繇中祕陞著庭衆咸曰宜抑朕所深取者以質美行修易所謂吉人之辭寡者蓋庶幾焉恢爾器業勵爾風節乃可副予儲才之意豈但與瀛洲學士相頡頏哉陶本除著作佐郎兼權右司制敕具官某朕觀前史有此官要而不清清而不要之說矣我朝設官莫要于宰掾莫清于儒館兼斯二者必惟其人爾寶婺之秀悃愊無華魁然其形班行之羽儀也裨贊廟謨亦旣光寵承明著作之庭復俾涉筆其間不其榮哉夫木天固儲才之地都司乃學爲宰相者也又奚但清要而已毋自菲薄益迓寵休家横除祕書郎制敕具官某祕館必用名流所以養器業也爾天賦英資自爲太學諸生已不肯碌碌洎歸蜀又冠春闈才刃恢然有餘矣乃不矜其能隆師尙友以致遠自期校讎未久茲復序遷以爾詞學之富顧何官不可爲其務潛心古訓益造平實則予汝嘉丘崈除直祕閣淮東轉運判官制敕具官某世爲淮人習知淮事試之儀眞以稱職聞召爲尙書郎纔閱月復俾司漕計朕每臨遣監司帥守旣戒茍同亦戒茍異何任職者心人人殊或依違其間甚非朕意爾尙一乃心力以濟國事憂顧其少寛乎天球河圖祕藏之府寓直其間以光爾行祗服寵榮嗣有襃擢曾用亮除江西轉運判官制敕具官某詩不云乎兼葭蒼蒼白露爲霜朕遴選監司郡守深其涉歴者所以老其才也爾天資英發所至有聲曩持江西憲節且攝章貢郡符矣平定寇攘從容不亂兹就畀漕事將益以觀爾之能夫元凱稱才以有德也爾一門世所鮮儷益懋乃德以昌家學奚獨衣冠盛事云乎哉唐璘除江東轉運判官制敕具官某昔慶歴中諫臣修以言事無所顧避出爲河北轉運是時保州未寜壓難折衝信不可無直諒骨鯁之士耶國家多事倚金陵爲重鎭置漕帥于兹要與制臣協規同力以奬王室今之金陵昔河北也朕頃聞爾名擢爲御史侃然正色凜如秋霜古稱寢淮南之謀者非斯人歟轉輸之事非所以累卿暫借威望以助北門之重抑嘗聞仁皇語臣修曰有事第言之修對以諫官乃得風聞在外越職罪也仁皇曰事茍有聞豈可以中外爲辭朕之望卿亦然張應運特轉一官制敕具官某江東頃荐饑爾竭力以佐其長民免捐瘠荒政第勞蔚爲稱首選階超進眂羣僚爲優尙思報稱勿懈爾勤何處信特轉一官制敕具官某歲㑹有殿最法也爾嘗通守嘉禾課以最聞法應得賞其進一階祗服休命喬幼聞特轉一官制敕具官某民困于役久矣江東常平使者以義勸分政莫良于此吏奉行類不䖍爾邑克成爾惟克勤乃事其增一秩用風勵字民者知隆慶府李艮孫轉一官再任制敕具官某劔閣天險也古稱一夫荷㦸千人莫當今非昔矣强寇橫犇毒流西土爾以孤墉首攖寇衝繫民人之心生將士之氣豈徒恃險而存哉朕不忍六十州之燬蕩思固門戸扃鐍之防無以易汝其陟一階勉爲朕留繕甲兵峙餱糧戒斥堠結聚落使險隘畢葺寇不可復犯蜀道載寜予其大介賚爾往欽哉文大淵特轉一官制敕具官某官賞所以勸有功朕不敢吝武都之捷受賞者三十三人爾亦預焉儒生而立武功未多得也勉出乃力嗣建茂勳豈但選階序升而已歸順肅均等轉官制敕具官某隗囂將殄馬援來歸武周就亡敬德爲用豪傑之士舍逆附順志烈顧不偉哉可無懋賞以勸來者爾等皆北土之豪沈鷙有識改轍歸命倒戈効忠蔡人則吾人耳橫班遙刺襃陟有差所以示功高之錄也勉立殊勳以對光寵宋明遠轉官制敕具官某朕念邊疆之臣輸力王室雖微必錄雖久不廢爾疇昔驅馳兵間給餉無乏今分符内郡一階例進朕不汝遺勉殫忠勤益圖報効陳一薦特轉一官制敕具官某昔人有言兼并易能也堅凝之難河南之役祖宗故疆復入版圖爾有勞焉戍守弗堅則匪汝咎勸功一秩朕不敢廢邊事之宜爾旣習知竭力以圖後效所以報也游震甲特轉一官制敕具官某昔漢宣帝尊寵刺史守相有治理效輒以璽書勉勵增秩賜金吏良民安號稱中興朕嘉慕之爾器質温潤心事粹夷暫輟禁從綏我閩部惠流威行姦宄消息而七聚乂寜儒者中和之政信可尚已内閣升華所以襃也而謙避弗居朕心未快姑用漢增秩故事進爾一階俾藩翰之臣勸焉尙服寵光嗣有明陟趙希儻特轉一官制敕具官某自常平義倉耗于移用惟置倉鄉社最爲便民泰昌僻在巴峽田賦不滿六百石脫有凶年孰捄民飢社倉之建遂爲一郡長利抑可以言民庸矣其增一秩俾牧民者勸焉胡元琰特轉兩官制敕具官某邊聲孔棘臨事選材不限資格往往多得其人爾頃以葭萌一令而攘戎執俘保民靖亂卓乎干城之勳非夫精華果銳躍躍有欲自見者哉一歲而遷三秩非常典也功多有厚賞庶聞者勸焉尙服寵榮益思報効顔耆仲特轉一官制敕具官某鹽筴之利博矣斡旋通變不專興利而美意行焉獨不在人乎爾將指東淮以鹺爲職懲俗吏之朘民膏也度越拘攣弛利予下而國課自豐誠有足大者進爾一秩豈徒以治辦見襃哉體國愛民之意固將風示四方以爲護養元氣者勸也懋哉對揚休命葉莫除吏部郎中制敕具官某尙書郎高選也而天官之屬尤重蓋將贊而長以衡鑑羣才顧可輕畀歟爾聲猷炳蔚踐歴寖深頃勤于審計爾三異韜養不露精于典校朕察其德心蓋能安于素守者或晉聯胄監或列屬奉常皆淸選也尚其懋勉以對休命黃宜除宗學博士黄濤除太學博士陳晉接除宗學教諭制敕具官某等太學賢士之關而天枝之秀又設宗學以教之師儒之選可輕畀之哉爾宜之雅澹爾濤之𢎞毅爾晉接之靖共皆一時選也其爲我端矩矱勤訓誘使辟廱流道德之富麟趾追信厚之風不其休歟刁起除太學博士文復之除宗學教諭制敕具官某等太學賢士之關而天枝之秀又别設宗庠以訓之爲師儒者傳道受業解惑則一也爾起南土之英爾復之西州之彥登之學校以爲表倡如家塾之誨子弟情親而道自尊業精而疑頓釋果能若是足以副朕親親賢賢之意矣劉炳除金部郎中李韶除都官郎中制敕具官某等尙書郎高選也非有資望不輕授爾炳愿而和爾韶淸而通嘗爲朕牧民且登諸朝矣青綾入直班序寖穹非徒爲爾榮尚其懋勉異時稱爲端平良吏惟乃之休趙汝遇除軍器監丞趙必愿除戸部郎官制敕具官某等除戎器戒不虞義著于萃不傷財不害民訓垂于節而吾聖門講明實學有勇知方子路能之治國足民冉求能之皆確然有可用之實爾汝遇之謹重職在繕戎爾必愿之明練職在理財一爲監長一爲郎曹其足食足兵之所深賴乎治兵而毋佳兵治財而毋蠧民此聖門之所尙而宗英之所以培植宗社者也懋哉服我休命趙崇暉除刑部郎官郭正已除大理正制敕具官某等朕讀虞書臯陶稱舜德凡十餘言皆寛仁忠厚之至而刑故無小止一語聖人尚德不尙刑于此見矣爾崇暉明而不苛爾正已通而有守踐敭中外藹著能聲朕甚嘉之或陟刑曹或正理寺爾其念一成不變之難體哀矜勿喜之意重民命者所以壽國脈也欽哉張涓除閤門宣贊舍人制敕具官某上閤清選也以勇爵登罕矣武都之戰爾有奇勳非此莫酬今敵人送死復蹈覆車正爾立功名之秋也勉哉美官顯賞朕不汝靳魏了翁除端明殿學士簽書樞密院事荆湖軍馬制敕計安諸夏圖任大儒荆楚國之西門最重上流之勢樞機天之北斗全提外閫之權峻端殿以陞班偉元戎之開府誕敷渙號式穆師虞具官某德粹而業閎氣全而節勁望爲萬夫之所屬砥柱中流學承百聖而不慙典刑大雅兒童知其姓字草木識其威名越有服于大僚將共熙于庶績屬兹邊境擾我南陲祖宗積累三百年思保艱難之業東南生聚億萬戸亟爲耆定之圖環顧在廷疇堪茲選不待靈龜之協卜盡推白鶴爲聞人然而任重者責惟艱用大者寵宜厚破拘攣牽制之積弊杜異同惎間之浮言兵財悉應其需寮宷自由爾辟朕志決矣惟汝予同卿往視之在師中吉增重本兵之寄式昭敵愾之威協熊羆之力以掎角戎師掃豺虎之迹以厎綏庶士併壯岷峨之聲援遂淸河洛之埃氛俾一人輯寜于爾邦兹爲長算用眞儒無敵于天下當驗斯言徯卿衮衣之歸翊我垂裳之治李埴除端明殿學士提舉萬壽觀兼侍讀兼修史制敕朕尊延耆俊嘉尚名儒偉祕殿以升華專付史權之重冠祠庭而命秩俾陪經幄之游時預議于昕朝爰眂儀于政路具官某爽邦由哲事君以忠品藻才高得十志八書之奥淵源學富參一翁二季之間更出入于累朝凜孤高于晚節粤新大化召長禁庭方資柄用之儲遽動浩歸之志諭以尺一至于再三何所聞而來心乎徇國不得職則去過實在予豈無體貎之隆曷以筋力爲禮是用付神京之眞館躐學士之穹班庸究業于金華肆垂光于汗簡嘉謀爾則入告尚賴箴規大事吾其與聞益殫忠藎崔與之除端明殿學士廣東經略制敕朕思用物望共濟時艱天下之達尊有三夙推鄉老王者之制爵凡五尤重帥權乃以符竹之榮就畀枌榆之寄具官某國之蓍蔡世之典刑論思著于立朝肯阿權貴鎭靜稱于治蜀歸臥丘樊粤從調瑟以來謂可彈冠而起班獨高于八座疏胡聞于再辭屬兹蜂坌之起戎欲保羊城而靖難俾宣上意式副民瞻見大夫誰可乎博稽公論踰老臣者無矣蔽自朕心峻茲端殿之除就建鄉邦之閫威聲遠寄姦宄潛消少需不旬月之間卽見一指麾而定朕知卿素履慕古良臣每熟覽于來章屢興懷于前席相見何晚雖暫煩牧御之才盍歸乎來行大展經綸之業曾三異除祕閣校勘制敕具官某蓬萊方丈之勝必老于詞學者婆娑其間亦邦之光也爾年德可敬神明不衰登之木天益飽觀未見之書懋哉嗣有襃擢許應龍除國子司業兼禮部郎官制敕具官某先朝選儒英爲成均長日延諸生切磨爲己之學不但勤課試謹繩墨故得人爲盛自風俗之頽人心斵喪士子皆波流風靡不復有先輩典刑朕甚憂之爾履行粹和不自表暴俾範多士譽處藹然正小司成之席豈徒爲爾榮哉昔閔子馬有言少而不學則茍而可茍之爲患大矣爾其率勵後進毋使學殖荒落國家將有賴焉懋哉何琮除知福州制敕具官某轉漕七閩事權雖重然特一職耳帥無所不統治軍則有訓治之法涖民則行綏輯之政非負宏才大略者莫稱兹選爾稟姿寛宏制行峻潔自班朝列躋言路不待更化禁戒而四方賂遺已不得其門而入矣出將使指餽餉宣勞適値多故之秋一指麾而旋定晉升延閣就畀帥閫正以爾之抱負不可限以一職故使總方伯連帥之權究詩書禮樂之蘊軍政旣飭民生咸綏皆于爾乎賴尚其懋哉嘉績轉而上聞行且召卿矣彭鉉除直祕閣知廣州兼廣東經略安撫制敕具官某五羊去天遠兵悍難制震驚一道朕起元老殿鄉邦亂然後定顧瞻中外之臣疇可繼者爾名父之子蔚有令聞我寜考最念舊學擢爾弟昆抑眷爾考也由詳刑攝帥閫委寄隆矣克稱厥職就命爲眞夫俗儒多懦健吏鮮仁欽哉仁而不懦戢姦靖民則予汝嘉鄭晝知瓊州制敕具官某瓊山懸隔瘴海中島夷錯居比歲嘗反覆不定思得良牧撫寜之爾關決㑹府習知南方事往爲朕綏彼黎元敷我懿化則予一人以懌䝉齋集巻九
