body:
  text: 蒙齋集卷十六宋袁甫撰針以厚針贈鄭肖翁厚天賦薄人作孰以之已力學毋外強而中弱先朴素後丹雘故曰禮于人猶酒糵君子厚小人薄聽之哉是心皓皓本純白秋陽暴之江漢濯何用智巧強穿鑿立志針為學如射立志為先志在命中鐵石可穿企彼聖哲萬夫莫前有志竟成古語信然奉行蠲租詔書民有言吏弗虔者針以誨之江東土瘠荐飢無食天子曰咨為我心惻田租亟蠲其仁如天十捐其半况也全捐窈窈深谷有詔未識吏愚爾民負租猶督民實不愚吏乃自誣澤壅弗流民病曷蘇民詞良苦吏勿瞋怒昭哉此心上帝臨汝愧針示清夷弟易言心亨書言心休浩浩融融熙熙愈愈吾何愧乎哉然人苦不自知虛食天地間粟焉可不知愧伊尹聖人后不堯舜愧若撻市矧常人乎余坐山中自省知過愧集心胸請略陳其槩天資正直急義勇為先君子講説諸經抄録傳後炳然有耀吾愧先長兄博學精識克紹前聞居考妣喪各茹素終三年仕而見黜屹無附麗吾愧今次兄此平生之愧也而他過更多晝則間暇夜則惰肆暑則袒裼意闊而多漏才疏而欲速言輕而易忤檢點此身恐愧不止此詩云有卷者阿飄風自南虛而能受之謂也余虛心以佇罔敢自是人稱清夷不事諂語勤針吾愧是所望也觀省針贈桂伯順過何從生不觀省故提起精神靡間朝暮精神者何靈明天賦惟是觀省弗得弗措一日得之本來素具不以力索無物可付徹上徹下綽乎有裕敬止針為張伯常作古聖有訓人心惟危所貴安止夙夜自祇因止而敬差之毫釐敬其所止猶為遠而曰止曰敬本不相離吾止在斯而敬在斯思為不作寂無所知豈曰無思豈曰無為思以無思為以無為屋漏暗室上帝鑒之欽哉欽哉慎勿自欺懲忿針忿從何起反觀諸已寂然本無何怒何喜波浪平息湛若止水懲忿之要如斯而已忿似乎剛而非真剛真剛光明忿自然懲心本無忿因物乃形剛德在我不懲之懲窒欲針贈留靜翁欲從何生一念之萌凝神靜觀勿與欲爭雲翳既散日月自明窒欲之要不動亭亭曷為有欲剛德不足真剛不屈欲自然窒剛本心也天德也人人固有何勞外假忽然猛省欲從何起不窒之窒在我而已士針士如之何自賤自貴訊之靈龜昭兹涇渭謂爾鳳兮胡囅而喜嫓彼梟兮曷云其恚爾荃爾蘭疇不服媚匪薋伊葹曷遐有棄黃中則通純白則賁爾寶在躬貴哉斯士天之牖之取攜孔易歌以玉汝毋委厥美後生可畏針并序或問曰聖人曰後生可畏何謂也吾應之曰子知夫人之生乎曰知之子知夫生之倍數乎曰未解也吾語汝夫七千二百日較之一日則為七千一百九十九倍其相去可謂遼絶甚矣吾以為七千一百九十九倍可斂而僅為一倍問者駭曰談何容易吾曉之曰再積七千二百日我所歷之日如是彼所歷之日亦如是彼我對觀則我加于彼非僅一倍乎吾復語之曰子以一倍為少乎不知積而久之其少也不足以倍問者益駭吾曉之曰又積七千二百我所歷之日如是彼所歷之日亦如是彼我對觀我得其三而彼得其二我何足以倍彼又積之則我四而彼三又積之則我五而彼四我于是嵗盈百矣又積之則我六而彼五于是嵗過百矣嗚呼始也以一日而較其為倍也七千一百九十九已而我視彼僅倍又已而不及倍又已而五四焉六五焉久之而嵗俱盈百焉回視七千一百九十九之倍于一日也果如何耶問者若有遺失吾曰子勿異也請為子述後生可畏針其詞曰我孶孶汲汲兮遡萬里之修程懼後來之見迫兮揚余鞭未嘗暫停使我而微怠微息兮其迫愈不皇寧矧夫我怠而彼奮我息而彼興將不止迫我又將陵駕我兮而莫之與京我瞪乎其在後兮彼將摩青雲而上征嗚呼勿謂彼脆乃敵之勍光隂何迅中夜以驚忽然深省如醉得醒老而知畏何異後生本無老少日光月明萬古一息無虧無成何以用力業業兢兢銘鉛山縣石梁銘鉛之山兮蒼蒼鉛之水兮泱泱劚山骨兮為梁臥洪波兮康莊題巨扁兮彌章萬目具瞻兮萬古之光竹坡銘贈饒生竹兮中虛而節不改是謂剛中心為之宰虛則能應剛則不屈雪霜摧之蔥蔥鬱鬱竹乎竹乎與吾心通坐對蕭然不記春冬江東憲司又新亭銘新植花竹生意津津雖則尋丈四時皆春新更軒窗和氣熏熏才可容膝淨几無塵又新命名豈是之云勇于進德用力于仁日改月化通體精神外觀物妙內驗吾身客來遠方問余乂新不知所對何新何陳達源齋銘泉始達流涓涓泉有自道孰先滿宇宙無非源日用間井井然問禮樂吾何言縠水柯山之勝聞天下作知樂仁夀二銘動無非妙試觀諸水日夜周流莫見終始此不可見寂然而已知者何樂蓋樂乎是右知樂銘瞻彼山矣形若塊然振古青青發育無邊靜乃如此妙不可傳仁者默識以永天年右仁壽銘彝訓堂銘大哉彝乎天地之先人處彝倫日用粲然是為大訓倚衡參前彝則不變易則易遷是遷不遷乾元坤元元即彞訓發育無邊乾坤不言皇極敷言言何所言極即坤乾自得堂銘自得之訓昉于帝堯子思孟子陳義愈昭得何所得匪深匪高洞然太空大無不包萬物皆備不增秋毫無喪無得得之靡勞此學不傳嗟哉揠苖師友講明樂也陶陶徐録參求座右銘人命至重上帝臨之德貴好生察辭于疑如得其情胡可喜而本心靈明慎勿自欺默識銘贈饒生子之從師亦既努力識云多矣然匪默識默識如何誦詩讀書此讀此誦與世人殊人皆不然而我樂此大道坦坦君臣父子是中何言是中可言終日默默有不默存立志銘志不可奪可奪非志聖人與我厥本無二一朝內省發大羞愧此志既立對越天地勵志銘贈朱冠之維古之人蚤夜憤悱維今之人甘心委靡頑痺不仁偷安無恥至其極也醉生夢死胡不反思道只在邇欲藥痼疾勵志而已志果自勵其勇無比當為即為有何疑似我德我崇我義我徙如盲還明如痿復起敢以斯銘用告志士尚志銘志不可奪可奪非志厥志惟何大道無二我志聖同清明精粹不自尊尚乃甘暴棄君子尚之發大羞愧不矜窺觀不梏小器善必亟為惡必亟避手持足履耳聽目視貫通昭融範圍天地所志在此朝夕從事蔽以一言居仁由義五常銘并序仁義禮智信曰五常乾四德配四時五行無土五常無信非無也行其間也四時五行常還相為本舉一猶可况四乎作五常銘仁仁即人尊無倫是為元天德純純乃生萬物春春何在在天君剝初復復下仁仁指初妙乾坤動靜具人我均非二本親吾親義義方外外即內羞惡心從何至本正直無偏陂利欲中生死際差毫釐終身恥健乃決剛能制精入神一無二忠事君事上帝禮禮之實本太一洋洋乎貫三極邃古初自質朴後聖作從其朔是本心清且直曲亦禮皆天秩品節明愛敬立禮乎禮無放逸知知非見無不見見在物為物眩不格物失對面物皆我一以貫達天常常適變變即常疑斯冸無知也知自遍誠如神蓍龜見信信是主四德聚非繩約何其固嗟面朋豫與汝因物遷棄弗顧惟誠身戒妄語語而信孰豫侮默已孚神是與天何言四時序五事銘并序貌言視聽思曰五事孔子告顔子視聽言動非不及思在其中也九思一章可見矣思為四事本五事亦還相為本作五事銘貌貌曰恭君子容瞻視尊衣冠中匪色厲內美充足恭者貌似同載偽拙滅德凶人肖貌天地通玉溫溫春融融恭而安乃聖功言言有好言有莠口溺人招悔咎言曰從匪從口接以道發不茍滿天下垂永久多言吝中是守雷風行萬竅吼雷風息一何有視視何蔽月之翳翳不去月不麗目本明視為纍可去乎非翳比翳外來視匪外外亦視何外內自神明自靜止止乎禮非勿視聽聽是非耳司之聲自物來無時耳亦物物交迷忽深省聽者誰心太空物不遺孰為物吾何知虛能受聰在茲兢兢乎道心微思思無斁深莫測雖莫測有限閾不出位介如石鏡中象應無迹心在思妙天則鬼神通精之極是曰睿入聖域易無思思亦易易有太極銘并序太極者何本不容言既不容言曷名太極極訓為中中無不包極亦訓盡盡無所盡又加以太字何也不可得而形容擬議也太極非空空即不空太極至實至實而通未開闢前冥冥濛濛一氣既判昭昭融融昭昭即冥冥融融即濛濛此易之有也何有于易哉何有于易是故能有執有求易乃無易矣不執有則奈何曰生處觀之生兩儀生四象生八卦大哉生乎生生之謂易生生之謂兩儀生生之謂四象生生之謂八卦生生之謂萬物生生之謂中無不包生生之謂盡無所盡可執有哉何所不有哉此非實哉此非通哉此非即空不空哉此非冥冥濛濛昭昭融融哉名曰易有易不自有人人有易人人有太極不在乎紙上之易亦不離乎紙上之易銘曰妙矣太極易何以有于生處觀天長地久生生不窮春夏秋冬彼云無極何勞深闢我有幾何斯昭昭之多乾坤易之門銘并序闔戶謂之坤闢戶謂之乾闔闢一隂陽也隂陽一門戶也非門戶則無以見易滿宇宙間莫匪隂陽莫匪闔闢日昱晝月昱夜闔闢也春而生秋而殺闔闢也其在人也開目見明瞑目見暗噓而息出吸而息入闔闢也其在物也舒而為華斂而為實飛走而鳴蟄藏而息闔闢也皆易也或曰易者變易之謂然則不易之義奈何曰千變萬化孰為變化是變化者即非變化是故易之中有不易者存易即不易不易即易吾何知乎易吾又何知乎不易之易銘曰日月為易為乾為坤乾陽坤隂是易之門一闔一闢闔闢皆易于此乎入于此乎出出入有二乎一亦本來無中庸銘滿宇宙間中庸化生端的不差日用普平莫見莫顯無臭無聲是謂天命守以一誠贊先師鄒國公贊顔子如愚不以言宣賴有先師琅琅七篇夫何末章歷敘古昔之聖賢見而知聞而知者其所知卒不容言然先師雖不言而其不可隱者太空澄明而日月高懸人謂先師之好辨某也獲傳其所不傳由仁義行大舜之天始終條理夫子之全此先師所以高出諸子之上者蓋其道不倚于一偏願學孔子千古巋然四賢堂贊即心是道勿助勿忘愛親敬長易簡平常煌煌昭揭神用無方再拜象山萬古芬芳道若大路曲折萬端辨析毫釐用力甚難上續伊洛昭哉可觀考亭遺規世世不刋偉歟東萊氣象春融相門事業元祐申公益閎以大問學磨礱其學伊何萬折必東復齋之德碩大以寬其儀如鳳其臭如蘭弟兄琢磨惟義所安此意寂寥令我心酸某既贊四先生之盛德矣復有謏聞願畢其説以與同志共之世謂鵝湖之集諸老先生論議未能悉同以是妄加揣摩其失遠矣夫子嘗云君子和而不同不同乃所以為和不蘄于合乃所以為一致也天生英賢扶植斯道忠君愛親敬長一性靈明與天地並亘萬古不可磨滅者或入之也漸或為之也勇勇非無漸而漸非不勇也顧其所由之門然耳鵝湖之集誰得而議其異哉君子講學既切之又磋之既琢之又磨之反覆辨明惟求一是若慮其不相合心非而口然之此乃淺丈夫之所為耳何足以窺諸老先生之門牆耶真西山贊謂為和耶剛正之節光明不磨謂為介耶慈惠之政載諸咏歌謂為虛耶萬卷蟠胸武庫之多謂為實耶靈襟洞然古井無波匪實匪虛匪介匪和高臥西山如蒼生何蒙齋集卷十六
