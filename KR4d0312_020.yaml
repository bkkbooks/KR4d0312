body:
  text: 䝉齊集卷二十宋袁甫撰五言律詩詠丹桂贈周純甫馮德厚一種自然色如吾方寸丹天教傳信到人莫作花看骨氣超凡俗聲名徹廣寒留君良為此憶别鼻休酸原注時純甫求歸復用前韻孤卻團圓月今朝桂子丹莫教疏雨打留向晚秋看色借幽巖秀香通古壑寒癡兒被花笑世味只辛酸七言律詩和韓履善韻談經說史謾支離大道寧容小智窺山峙川流俱是妙鳶飛魚躍兩忘機識天乃樂天之樂非我安知我不知細讀新詩消息好桃花見後更無疑和王伯友韻三春强半麥青青是處田家只望晴雪壓霜欺愁正極日融雲淨眼增明紛紛民瘼關吾念得得天公相此行更問老農官與吏幾人貪濁幾人清和毛中書勸農韻三首曲奏梅花促曉更更聲方斷又鳴鉦籃輿咿軋親巡野櫪馬喧填看勉耕酒酌田翁添醉色澤均牧叟助歡聲天公也欲催佳句特放晴光分外明歷遍田疇問我農都言杼柚久虛空吏胥祇是工椎剝倉廩何曾識腐紅願得家家歌樂歲直須日日扇和風如今拙手徒餐粟慚見天民四者窮勞農因得步河橋仰視前賢隔九霄凡骨難仙安素履腐儒學吏守邦條荷公美意鞭駑質惠我名篇勝翠翹痛飲春醪那可强胸中磊塊把詩澆和越帥汪仲宗韻稽山窟宅盡神仙多少棠隂屬巨賢萬壑千巖長似舊一翁二季美無前風流自昔遺芳在衣鉢于今盛事傳行見直聲追軌躅豈徒慶禮侈賓筵和南康守韻結亭故事重拈出領略匡廬高更高身在山中迷面目心遊局外見分毫平湖雪意漫天急古木風聲捲地號此地徐徐鼛鼓節知公一念在民勞和履善遊三洞天韻長空萬里普光明此地緣何獨著靈不是天晴窺白日愛他月黑滿疏星石松有子能呈巧金囤無沙似遁形驀地回頭千萬㸃諦觀頓使我心醒和令君嵗寒亭韻老幹森森當翠屏壁間詩句有留名昔逢利口擠之死今伴蒼髯凛若生雪壓枝擎猶有力月高林靜更雙清撫松似共黃門語况聽蕭蕭枕上聲䝉程伯寓知府給事以僕生祠妙唱見寄輒次韻奉酬聞道邦人尚去思栽松植竹繞叢祠要知獨立無言處正似危邦援絶時平世功名付圖畫暮年活計在鉤絲謝公旌斾巡山後千里殷勤寄好詞新安鄉會紫陽自是神仙窟誰泛仙槎競問津二妙先傳聯璧喜九人齊著賜袍新自憐十載龍門客來領三科燕席賓酌頌年家無浪語原注季弟獲忝榜末黃山高節兩嶙峋送池陽張倅奉祠歸清江二首題輿名滿大江東忽憶家山閣皂中孤棹賦歸猶帶雪深衣養浩直摩空從教風月分多少獨抱春秋究始終籍湜近來知叛否只君不負紫陽翁自憐凡骨未能仙每對仙都輒爽然序齒十年兄弟行論交一日友朋緣干戈滿地心憂國事業彌天世急賢已把封章排紫闥未容問舍與求田魏鴻禧敘別二首世間萬事盡筌蹄塵外工夫好者希大道精通元自在旁門淺陋謾多岐六年鐵冶勞經畫九轉金丹默受持歸去小溪溪上坐要求消息在嬰兒别有金丹簡且真不煩火候不勞神自知自信融融樂無慮無營盎盎春天地遊心元廣大風雲入句更精神我將歸去償兹願溪上相逢只幅巾釣臺朔風吹我到嚴灘擁被掀篷一破顔寒色侵凌欺白髮雪花撩亂失青山未消據案千塵積且愛哦詩一餉閒慚愧釣臺風韻在他年歸隱許躋攀晦庵文公祠堂用令君韻當年獨抱伯牙名身後祠堂列佩衾官職平生安義命詩書終老惜光隂一椽古歙溪山窟千古長松風月林彭令經營真有趣箇中應契老師心嶽忠武祠三首當年老檜肆欺謾忠武哀哉抱寸丹賴有皇天為吐氣豈無青史更誅姦字留陳迹何年泯烟鎖空山盡日閒世事關心眠不得今朝下涕為澘澘兒時曾住練江頭長老頻頻說嶽侯手握天戈能決勝心輕人爵祇尋幽堪嗟爝火當時滅誰信長川萬古流機會莫言今到手卻愁無飯飽貔貅背嵬軍馬戰無儔壓盡當年幾列侯先輩有聞多散軼後生誰識發潛幽傷心咄咄權臣事滿眼滔滔債帥流槌剝到今渾似鬼向人休說是貔貅詠東松庵作意東松訪舊聞山巖窟裏梵宮存矮樓蛙井身如蟄峭壁魚鱗手可捫草草反成多景致慳慳别是一乾坤輸他飽飯安眠處朝暮烟霞看吐吞褒三湯孝行誰道田家不讀書一門孝行與人殊直將自己通天地豈是無心惜體膚人願生兒皆似此神如祐善肯忘吾勉哉一念勤推廣已辦嘉名里巷呼讀朱冠之詩有作三首孔孟宗師心中的回由評品手持衡至剛大勇本來有由義居仁熟處行說到孤忠推自孝輒判一死肯偷生此篇此語令人醒夜半青燈看到明浮雲擘破月華明怎得浮雲不再生幾度月明雲幾擘全無雲翳月全清後生欲解慿誰問先覺雖知肯盡明苦硬工夫須徹底秋雲漠漠一輪橫多言外好中何有有德之言春意融惟一性天真洞徹許多事理盡流通句新悅耳源先涸思苦雕肝味易窮自古才人皆患此就中崛强是揚雄題趙氏連理木圖連理呈祥炳寸丹巽齊高致拂雲端須知念念通冥漠不見聲聲說急難義槩莫如生死際家風要使子孫看城南我祖嘉名似從此心期共不刋五言絶句留無邪字名天駿此駿産渥窪神竒莫浪誇相期千里志贈子字無邪遊敬亭山用謫仙韻二首黃檗道場古裴公心事閒白詩三絶併那似敬亭山事從塵世去心共白雲間不作遊山計朝朝飽看山七言絶句衢學講堂更名時習和二車韻五首道心無壞亦無成只怕微雲㸃太清重坎之亨人不識一輪素月本來明原注言習坎之心亨也意味澄然未動初綱常大道本同趨直須麗澤工夫熟便是當年詠舞雩原注言兌澤之講習也終身不察是凡人一日三回省此身參也親傳端的處品題宜亞不違仁原注言曽子之傳習也緬懷周道意悠長事業姬公念不忘宗廟百官誰識者仲由也只許升堂原注言孔子之習周公也莫道今人不古如分明氣象魯之洙坤爻六二知何義試叩膠庠學易徒原注言坤六二之不習無不利也再用前韻瑚璉區區只小成休言果藝與忠清聖師忘食兼忘老地久天長日月明修慝之餘德復初更須辨白舍并趨善哉三語當年問直到于今想從雩兩地參天命曰人靈龜端合取諸身笑渠到處閒尋覓直信人言井有仁逝者如斯晝夜長會心能使百憂忘生前身後渾如此絲竹之音孔子堂小時所學老何如自詫西河不記洙曾子斯言譏背本祇今猶足警吾徒原注事見檀弓時習學也借以論政政與學豈有二哉再用前韻逾年政化一無成敢道民和獄訟清不以旁人評得失箇中一㸃自知明心事如何忍負初官居每憶過庭趨勤勤撫字今微驗雨足春疇不待雩誠心諭俗淑斯人莫寶金珠寶此身昨日偶拈鄉記看幾家孝養漸興仁吾儒政事話頭長步步詩書可暫忘齊相未知真不擾無端遜與蓋公堂蒲盧喻政意何如此語源流亦自洙若願小民皆類我須知類我始生徒時習堂記言五典也載賡前韻以歌之事親盡孝自天成鑑本無塵水本清相彼禽兮猶學習靈烏反哺更分明習容齊戒適朝初佩玉鏘鳴謹進趨原注玉藻將適公所宿齊戒習容觀玉聲大分凛然冠屨判一誠不散若郊雩原注左氏啓蟄而郊龍見而雩齊家斷勿責他人須信儀型只在身習習谷風譏義薄交相愛也是為仁徐行後長味深長此道誰能篤不忘我欲講行鄉飲酒大明上齒習斯堂原注王制習鄉上齒切偲取義思怡如兌習工夫憶泗洙泮水朋來方衮衮三千攀附聖門徒再和時習五章章取禮記一句復禮工夫本易成此心對越只寅清居鄉上齒家常飯此道于今晦不明右王制習鄉上齒蓬矢桑弧男子初澤宮試事翼如趨采蘩盈耳皆音節原注凡射士以采蘩為節盛樂何消待大雩原注月今大雩帝用盛樂右射義習射于澤鷹猶知學况於人羽翮沖霄具此身須信數飛方解熟熟之又熟即為仁右月令鷹乃學習佩玉之聲清越長此身無故詎容忘原注君子無故玉不去身挈渠方屨圜冠士登我光風霽月堂右玉藻習容觀玉聲聖道洋洋滄海如不流天下只流洙上丁釋菜今非古喚起遺風屬我徒右月令上丁習舞釋菜壽趙處仁母夫人有序甫將江東使指詣學講孝經作勸孝之詩訓里巷屬部民有高年者旌異之惟恐後番陽法曹趙處仁入憲幕清介敏於事堂有九袠慈母而未加禮敬寧非大闕甫敢述小詩介薄儀以為夫人壽有子見知真西山有孫又把桂枝攀堂前萱草年年緑慶事天公定不慳壽張亨之祖母夫人有序張亨之雙親皆康寧祖母夫人今年慶九袠闔門怡愈士林羡慕亨之壯年掇儒科以東流簿入幕敏而好修助荒政有勞名聞於朝矣慈顔應少慰乎甫敢歌小詩將薄禮亨之其持以壽夫人為問蟠桃熟幾番見兒髮白著衣斑孫枝又作紅蕖客更願雲礽捧壽山壽馮德厚三首人生汩汩逐風波祝子長年要若何一日洞然無障礙元來佛法也無多麟經咀嚼造深微攀取秋風第一枝便把斯言為子壽嵩高不用更吟詩朱絃疏越淡徽音身在塵中只古心祝子長年仍健飯好書讀到夜沈沈賡周純甫求歸三首秋風一夜簸清波我自思親奈客何遠地少書消息好書多愁悶轉添多苦過重陽賦式微黃花賸插兩三枝對花酬酒堅盟約依舊黃山唱和詩人生何處是知音契合端由一片心瞥見先生清苦貌吾兒且喜不埋沈再用前韻山未烟雲水未波試參妙處定如何黃花未見應難會見了黃花會意多本是塵中詩興微秋風偶折最高枝詩壇方築那言去為我留連百首詩百首詩成遇賞音云何容易動歸心少陵不肯為輕薄笑殺王楊井底沈送别再用前韻歙江歸艇棹晴波同去同來日幾何不怕黃花負人約只愁人意負花多鳳凰翔集肯卑微獨向梧桐揀一枝乍别故棲知未忍臨行更賦白圭詩殷勤寄信勝郵音合把君心印我心老老及人仁者事祝君毋得任浮沈和晉齊兄韻三首不愛金章紫綬紆欣然玉局自安居近來作計誰云拙六六之年創一廬不羡勳名逐日新課孫種績及青春試將圓鏡當空照始識廬山面目真家孰提綱屬晉齊潔齊氣脈遠乎哉何時升講開聾瞶襟佩蹌蹌濟濟來送番陽程令出鄉行古問百年禮黃柏岡前百嵗翁婆娑終日酒杯中此行得得煩君問荒政如今愜老農題半霄亭今朝帶月上山頭面面晴嵐翠欲流此處青霄才是半半霄以上許登不龍女泉靈泉何事迸幽巖龍女分從萬丈潭一勺之多龍在否煩君試向此中參崇聖寺瀑布泉二首古來翠瀑僅涓涓戛玉新亭卻沛然世事廢興皆若此醉眠何用問青天半山飛瀑元如雪况是今朝雪裏來界破青山休謾詫神光妙用亦竒哉九華山天河秀出九芙蓉白也詩詞信是工我欲依然名九子人情山意兩融融和趙克家三洞天二首洞外老天非不大洞中天小卻竒哉此竒端的由天造不枉攜朋得得來自昔堯湯水旱年祇緣先備國無捐我今皭火區區甚慚見容光照洞天九芙蓉峯眼底山光半有無芙蓉面目定何如忽然皓月當空掛始信山靈不負豫莫能名庵二首說道空空元不空太空何物不能容世人枉被虛名幻到底還須識正宗青山突兀倚長空不作人間兒女容幾載無名茅處士一朝識破有林宗東松菴六月山泉定易枯枕流洗耳事何如幽人高臥渾無惱好把靈源日日疏詠裴休捨宅為寺我憐裴相愛參禪石上蓮花幾刻鐫捨宅何如休起宅酇侯師儉是名言題象山先生帖誼重姻聯語甚真典型滿紙墨猶新中間多少針規意須信親親即是仁索新進詩君傳祕訣解觀人瞥見雙眸識破真收拾後生知幾許為豫喚取儻相親趣諸友觀牡丹天工不管國香竒流落民家識者希特地邀賓賓不至國香也是少人知和魏都大牡丹二首初放姚黃一兩枝旋看魏紫格尤竒天公似欲留連住伴我酴醿滿架時費盡工夫始盛開一時賞玩四時培東君摧折飄零後猶帶天香溪上來映山紅山花無數笑春風臨水精神迥不同喚作映山風味短看來恰似映溪紅蟠梅二首籬外橫斜只任真無端束縛損花神孤標自是為人妒一笑春風不用嗔幸自塵埃不許侵千盤萬結戲相尋只緣漏泄春消息惹動旁人機巧心見梅半月山行不識梅近城才見一枝開呼童截竹敲冰水盛取數枝隨轎來元夕留城外三市香塵隘綺羅遊人無奈月明何吾儂分得寬閒處地闊天高得月多憩折山市折山山下簇人煙一似吳兒笑語喧始信胭脂溪水媚木瓜分得也嫣然耕樂詩四首優游無事只耕田顧我歸耕子已先可但千倉良足樂不收一粒亦欣然一犁春雨趁農耕歌咏康衢了此生若有可憂方有樂本無虧處亦無成一片靈明自有田當仁那肯遜儒先歸來不說溪山好只說癯仙氣浩然少時操筆代躬耕老鶴如今太瘦生已識箇中真樂地誰云骨相費生成䝉齊集卷二十
