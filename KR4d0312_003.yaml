body:
  text: 蒙齋集卷三宋袁甫撰奏疏知衢州事奏便民五事狀臣準令監司守臣到任及半年以上具民間的實利病及邊防事件以聞臣一介疏庸蒙恩假守寸長蔑有下考將書仰遵成憲合陳五事臣不敢泛舉不切之務亦不敢冒貢出位之言謹以本州實事條畫具奏伏望聖慈特賜睿覽如或可採即乞頒降指揮施行須至奏聞者一臣近者恭覩陛下親灑奎畫以興教化新士風為急以涵養未充薰陶或闕為憂申飭中外俾加訓迪猗歟休哉可謂深明治道之先務矣臣所領此州本號多士年來教官失職學無宗師廉恥道喪士習日卑夫上有緝熙問學之君而下無明師碩儒以推廣德意將恐訓辭雖切教化弗興天理民彞益就湮晦臣甚懼焉深惟挽回風俗之趨莫若尊禮譽望之士乃招致鄉曲名流賴其表倡遴選前廊職事助其訓誘朔講之外立為旬講擇通經者敷繹義訓臣躬率郡寮入學以聽又以廩給素薄襟佩蕭疏遂那撥郡帑及議歲捐緡錢一千補助贍養以至先聖廟貌諸生齋室稍復加葺煥然一新由是學舍之教養稍備會新教授葉汝明之來臣力告以教導之方且勉其辰入酉歸不離直舍躬率以正則觀感易孚講論無倦則義理日新以至研究訓詁之纖悉考驗誦習之勤惰孳孳勉勉不敢曠廢又念固窮之難所當深體其有假館于外者既俾入學則每月致餽以代束修之資其有課業精進者欲示激勵則不時旌賞以為衆士之勸凡此所費皆自郡出不為學舍之纍其區處可謂備矣而臣區區之志則不以是為足蓋興教化者不當僅止于革面善士習者必當開明其本心降衷之良秉彝之懿凡民莫不皆然況名之為士乃不知孝弟本良能忠信非外鑠甘于習俗之卑陋蔽其道心之光明縱由科舉以進身莫識事君之大義國家果何賴于若人哉臣雖迂愚頗自信其本心每造學宮與諸生講明此道庶幾士心興起道化流行不負聖朝作成之意如陛下以臣言為可採欲乞朝廷行下諸路提舉司俾風示諸郡凡職在訓導者勿以聖訓為空言必求興學之實政將見四方士風翕然丕變所有本州每歲助養士千緡乞朝省劄下以憑遵守不但一時之利可為永久之規臣不勝幸甚一臣竊謂保甲之法所以聨屬鄉井親比人民深得古者比閭族黨相助之遺意近年以來有保甲之名而無綱維之實居雖比鄰心實胡越是無怪民心之渙散習俗之澆漓也臣考之此郡保甲素具案牘並存姑以州城之內言之分為十寨統以寨官立法非不詳盡然而上下之間視為虛名不究事實歲月既久多復弛廢臣近因講行火政嘗會僚屬集于公所相與商訂咸謂若欲聯比有法豈可統率無人遂稽鄉評擇衆所推服者請充鄉官俾之領袖每寨或三四人或五六人視鄉界之廣狹以為人數之多寡區畫既定衆論皆以為允但糾率鄉井本是難事有整齊法制之術當有激勵人心之具譬猶善養身者欲肢體之強于外則必有精神以運于內整齊法制之術猶人之有肢體也激勵人心之具猶身之有精神也考諸周官所載月吉則屬民讀法或書其德行道藝或書其孝弟睦姻任恤今略倣是意置簿一而名曰鄉記閭里之內凡為善之實卓然有可稱者鄰保推舉鄉官保明直書其事聞之于州本州驗實書之于記凡不美之事如賭博鬬毆殺傷盜賊之類官司隨時參照見得界內戒謹寧謐並無違犯亦書之記每遇月終通考所書以觀鄉官勸率之實有善而無惡者為上雖無善而亦無不善者次之凡此二等真可褒嘉本州別行措置官錢另項樁管名曰厚俗庫于內支錢益以公醖旌賞為善之家仍致鄉官之餽庶使人心觀感轉相勸勉風俗可以漸化臣冒昧試郡愧無善狀以淑是邦每于聽訟之際見有好貨忘義恃勇輕生違法悖理之事未嘗不為之惕然恐懼早夜以思何以風動斯人惟有旌善可使不善者知恥人心本無惡天理不終泯感發轉移之機至不可忽也臣愚不敢妄為臆説蓋受教于先臣參論于師友皆謂撫字當以風化為先而風化當以書善為急故篤信其舊聞而欲見于行事如蒙聖慈以臣言為可採不徒可行之一邦亦可施諸他郡乞從朝廷行下監司推廣奉行其于聖化不為無補一臣聞州縣本一體利害不兩立必存損上益下之公心乃有興利除害之實政臣契勘本州管下諸縣內西安龍遊常山遞年二稅多行豫借積纍寖深遂成痼疾臣始聞之為之大懼亟加詢究乃知前此縣道催科無方迫于期會不剗追挂欠之戶惟告急富強之家此曹非有所利何肯與官交涉全楮收受而坐折見鏹錢入吏手而復多侵漁虧損非一不可枚舉展轉失陷職此之由臣檢核簿籍考究源委見得此三邑遞年拖下本州諸色官錢為數甚多而又積壓豫借如此雖有妙手實無所施臣謂不大有所更張不可為也于是立為二説斷在必行一日蠲欠二日代解何謂蠲欠證得諸邑自嘉定十七年至寶慶二年凡此三年之內皆有拖違但歲有淺深故數有多寡逐節行刷具盡見數目十七年之欠人知其斷不可催蠲之易爾元年之欠猶覬其或可催理蠲之已為難矣乃至二年見欠二稅今舉天下皆以為當催孰肯輕議蠲減哉臣謂救宿弊者不顧目前之計懷永圖者當為度外之舉蠲所易蠲不足以蘇民瘼蠲所難蠲乃可以紓民氣于是將二年逋欠亦行斟酌倚閣然在諸縣既被惠利之實則在本州當節非泛之支節之于此而寬之于彼川實谷虛理勢然也臣素無能解惟有朴忠既不飾厨傳以悅過客之心又粗謹廉隅以守自律之戒故所入比之常歲雖大為虧少然亦勉自支吾不見其甚費臣所謂蠲欠者此也何謂代解證得本州雖與諸邑減免舊欠然而蠲除之後諸邑合解上供諸色官錢尚數萬緡無從措辦今本州既欲其勿借之民則亦豈可復催之縣然而上項官錢皆係起解朝廷諸色窠名分毫不可違欠本州上不敢控告朝廷乞行蠲減下又不敢督促諸縣復行豫借反覆紬繹束手無策意者必得別項官錢在經常之外與之代解然後可革豫借之弊本州適有歲賣江山酒息錢前政舊管一萬緡益以臣到任之後今歲新收可得二萬五千緡臣不免盡捐之三邑以充代解之數鏤之板榜揭之通衢闔郡之民歡聲四起臣所謂代解者此也既與蠲閣舊欠又與代解官錢即此兩項合八萬二千餘緡凡前日積纍豫借皆可整行銷豁宿弊一洗而盡目今悉是正催但所慮者病端易開實政難保繼此為邑令者必深知豫借之為害常如疾病之在身已蠲欠者勿再催已代解者勿更取杜絶蠧根乃可為悠久之利臣愚欲望朝廷劄下本州證應庶幾明白洞逹行下三邑常切遵守勿復開豫借之門以貽後日之患一臣前既陳江山煮酒息錢盡捐以充代解之數矣然猶有未盡愚悃不可不為陛下索言之契勘本州創取此酒歲有增數其初止因入夏之後官醖將竭無以接續則取此酒以佐之在官有倍稱之息在民無闕沽之患不可謂非權宜之策也一二年來所取至三萬錣數益多弊益甚其收買也吏緣為姦錢不時支于是有酒戶患苦之弊其搬運也舟陸有費破損責償于是有人夫怨嗟之弊其發賣也官督吏胥強以高價于是有出賣不行之弊其收息也輕空滲漏一切代還于是有笞箠監繫之弊嗚呼始欲謀利而終至繁刑仁人君子亦何忍為此易窮則變變則通弊既極矣可不思所以變通之乎臣酌取中制于舊例三萬錣之內三分殺一止取二萬以新收息錢併舊管盡以代三縣起解上供諸色官錢此今歲之數然也來歲以後此酒可以勿取縱如今歲費用之多亦可如臣所減之數行之以漸此酒斷可住罷臣愚欲望朝廷劄下本州證今來所申限以二年務要免行取賣江山煮酒是亦寬民力之一端也一臣伏覩乾道中廷紳奏請處州行義役一事謂隨役戶之多寡量事力之厚薄輸金買田永為衆産遇當役者以田助之從公評議推排役次以名聞官有協比輯睦之風無乖爭圖訟之俗當時皆稱為利民朝廷即從而俞允自時厥後州縣推廣而奉行之者蓋相望也然而義役之在州縣間能保守于悠久者不一二而廢壞于不旋踵者常十百其故安在蓋差役之利在吏而不在民義役之利在民而不在吏差役如舊則請囑之門開義役一成則漁取之路絶非得仁守廉令出力以維持之其不乘間伺隙沮其謀而敗其成者鮮矣臣自領郡符首訪此邦義役之利病知諸邑間有已結集去處歷歲寖深或多廢弛有上戶併吞義役之田而至于壞者有都內貧富改易不常而至于壞者有逃絶稅賦官司強抑保長而至于壞者有重難科配官司困苦保正而至于壞者有役首不公額外敷率衆戶交怨收取元産而至于壞者縣道方將以差役為利源豈復問義役之成否法日以弊民不聊生環千里而為守者忍坐視之乎臣知其然深欲講明而經理之以諸邑版籍不明病于豫借茍持心欲速輕易舉行則考核之無據推排之不精利未必形而害已先見矣故臣志雖立而事未舉勢雖可而謀未堅職思其憂反覆紬繹靜言尸素亦既周星方將控忱請以丐間奚敢任斯責而集事然而揆之于理或可講行縱不能玩愒歲月效尺寸之微勞豈不能開創其端決此邦之大計況豫借之弊已遂蕩滌失陷之稅可以推尋經界料量之事固未易言結集義役之圖不妨漸舉惟是人心難一公論易搖自非稟廊廟之明謨何以杜豪家之異議臣敢冒昧有請欲望聖慈俯賜睿斷如許本州講行義役一事即乞劄下特從所申卻容逐一條畫規模續次申聞朝省遴選強明之官分任勸率之責不茍目前期為經久實千里生民大幸江東上封事案本傳由知衢州移提舉江東常平後提點本路刑獄時所上臣將指外服不當出位言朝廷事傳聞今月三日京城火災延及宗廟三省臺部百司庶府以至民居大半灰燼奔避而死者數亦不少此殆皇天震怒之極國家殊常之災四方聞者莫不駭懼臣子茍懷愛君之念正當度越拘攣披瀝肝膽感悟上心挽回天意今朝廷若止將失火之人梟首示衆而陛下又不過避殿減膳僅舉一二典故止作常事施行乃欲轉災為福此必無之理也且乖氣致異蓋有積漸敬天之怒當謹幾微陛下胡不思連年荒歉民窮無告流離餓莩填委溝壑天意怒矣而陛下未悟星行示變莫非兵象今夏水溢三月不退天意怒矣而陛下未悟閩中江右寇暴相挻章貢盱江叛卒繼擾敵兵犯蜀搖我襄漢草寇起衢迫我畿甸天意怒矣而陛下又未悟董仲舒有言天出災害以譴告之又出怪異以警懼之尚不知變而傷敗乃至陛下歷觀數年以來災害譴告有之矣怪異警懼有之矣天之于陛下其仁愛切至如此而陛下猶未之悟今京城火災可謂傷敗之證天意震怒至此已極陛下不于此時深念致災之繇亟思銷變之道翻然悔悟痛自刻責臣恐天怒益烈甚可憂也甚可畏也臣聞變不虛生緣事乃起臣請言所由起者宮壼既正嬪御復增耽樂是從虧損聖德果天意耶臨御以來羣心顒望未聞總攬惟事仰成果天意耶國有忠賢實為元氣摧敗困沮生意幾絶果天意耶上下不交以言為諱鉗口結舌相習成風果天意耶其他如姦贓之吏充斥州縣椎剝膏血苞苴肆行私家之積過于公家怨讟交興災變遂作天意人心實同一機産禍之胎端在于此昨者禁扈之火中外固已驚異今乃災及太廟陛下念到祖宗寧不哀痛況迫近君門是欲使陛下反躬修德也延及三省是欲使人臣戒懼悔過也又及御史臺諫院是欲使風憲之地昭明公論也又次及六部寺監庫務是欲使舉朝之士洗心滌慮也上天震怒如是猶未忍遽忘仁愛之意故令陛下目擊心解改弦易轍儻尚謂鎮靜可以應變毋乃愈重天怒乎今日下詔罪已陛下必所不憚但應天當有實事空言何足動人卻恐詔令之出稍涉泛常施行之間無所聳動四方百姓必謂陛下當如是之災而實未嘗知懼上天之仁愛陛下者于是有大觖望矣事幾所在間不容髮上關宗社臣實寒心是用不量疏遠罄竭愚衷臣願陛下下哀痛之詔盡革往愆清心寡欲躬親庶政減嬪御以肅宮壼進忠賢以重朝廷排斥憸諛奬扶讜直誅鋤貪虐之吏丕變苞苴之風日與二三大臣開示大公屏絶私意如此而天怒不回災變復見則雖碎臣之首以懲謬妄臣不悔也國家安危之機正在今日惟陛下亟圖之取進止應詔封事案本傳此封事亦提點江東本路刑獄時所上臣仰惟陛下肆頒手札繼發德音以回祿挻災近在京邑側身引咎博求直言深見陛下祗畏天威悔過修德之心臣未奉詔之前嘗于九月十九日首騰奏疏上徹天閽謂答謝明譴莫若下詔罪已今求言之詔果下矣臣茍愛身忘國不復盡吐肝膈少效懇款忠愛之義以仰裨聖明之萬一是臣大負陛下也陛下縱不誅臣天亦將誅臣矣謹上封事惟陛下垂聽焉臣捧讀明詔至所謂痛哭流涕何以贖愆不覺仰天泣下知陛下真有此心是以真有此言決非緣飾于辭令者所能為也且夫災起都城天意何在蓋欲陛下因其所可見察其所不可見耳陛下深居九重四方雖有危急之事君門萬里烏得盡知左右之臣雖知而不言疏逖之臣欲言而無路所賴以丁寧告戒一悟聖心者惟天而已矣天謂寇盜縱橫民罹殘虐室廬丘墓往往為墟大傷孝子慈孫之心此陛下所不見故使陛下親見延燎太室驚動神靈俄頃之間化為灰燼雖欲不痛哭流涕不可得也天謂所在州縣水溢為災江湖城市莽為巨浸生生之具漂沒幾盡此陛下所不見故使陛下親見公宇焚蕩居民荒燬衆大之區變為瓦礫雖欲不痛哭流涕不可得也天又謂頻年以來干戈滿眼老稚轉徙溝壑壯者流散四方亦陛下所不見故使陛下親見都人避逃號呼道路上及朝士廨舍為灰骨肉奔迸雖欲不痛哭流涕不可得也天又謂歲屢不登餓殍盈野公私之力耗于賑荒迄今飢民氣息尚存狀如鬼質此陛下所不見故使陛下親見都城被焚之家悉仰贍給錢粟易竭民飢無窮其間死傷之人卒致銜寃于地下雖欲不痛哭流涕不可得也夫內之形徵即外之形徵外之氣象即內之氣象姦邪導諛之人競欲以甘言佞辭蔽陛下之耳目而天心仁愛特以氣象形徵之彰彰者開陛下之聰明使陛下雖不日接四方萬里之事而天威赫然曾不越乎咫尺之間嗚呼何其眷陛下之深而愛陛下之切也然則陛下思所以悔已過答天心者可無以踐痛哭流涕之言乎且臣聞之憤切之言激于事變修省之實決于力行凡人一語之發尚當表裏相符大哉王言誕告萬方不特人聞之天亦聞之而可不求所以實其言耶陛下所謂痛哭流涕者蓋一時憤激之辭已而怠久而忘之矣今日求言之本旨正欲以昭示修省之實共圖銷弭之道陛下對越上蒼而發斯言臣亦對越上蒼而為陛下盡吐之且陛下為宗廟社稷生靈之主必當以宗廟社稷生靈為心自臨御以迄于今凡八祀矣陛下所恃以乂安海內者蓋曰宰臣輔翼于下真魚水相得之歡也而宰臣所恃以鎮服人心者蓋亦曰陛下臨照于上真風雲際會之辰也然而中外多事國步孔艱宰臣之勤勞亦已至矣三數年來積勞成疾猶不避事陛下正當深加體恤以全君臣之誼可也何為高拱無營自暇自逸而獨使宰輔以有限之筋力當無窮之憂責歟夫君相之間其合也甚難而其全也尤難書曰自周有終相亦惟終釋者曰忠信為周忠信云者不事形迹純全無偽之謂也陛下以忠信待宰臣宰臣以忠信事陛下向也謙沖退托而未遑親政今也國事明習而總攬萬幾在我初無私意而天下信其當然是之謂忠信是之謂全君臣之交若夫臣有所願而不得以自遂君有所為而不果于自奮君臣茍避嫌疑不用其情而舉天下國家安危存亡之故泛泛焉付之無可奈何固已不能上當天心矣及其患生于所忽災起于非常僅欲以區區之空言掩天下之觀聽吾誰欺欺天乎且陛下先以習安玩常之見入乎胸中而或者從而附和之曰今日之災乃天數非人事也又曰直言不得不求非必盡聽也又曰他事不必改更惟汲汲于營繕可也暨乎土木畢興輪奐復舊陛下晏然處之不思改絃易轍今日素服避殿之心復轉而為荒耽酒色之心今日減膳徹樂之心復轉而為平日般樂怠傲之心今日求言修政之心復轉而為平日不親庶務之心陛下既自處于無為乃朝夕督責大臣以有為而又適遭乎搶攘多故之秋𤇺煙之未息羽書之旁午東淮尚煩區畫西蜀更費隄防敵人求和意猶叵測使命輕遣或貽後悔叢此責任憂慮萬端陛下盡欲以委宰輔耶臣恐非元首起股肱喜之義也天下之命寄于陛下陛下之命資于宰輔宰輔又資于執政臺諫待從百執事之人等級相承血脈相貫必也陛下以奮厲興起之意率先于上然後精神之所運用風采之所振發機括一轉羣聽咸新雷動風行捷若影響又何患人心之不悅天意之不解乎陛下若徒謂一時憤切之言形于紙上者足以回天心不知修省之實關于政事者乃所以消天譴則所謂痛哭流涕亦空言而已虞書曰后克艱厥后孔子曰為君難蓋謂夫尊居九五事繁責巨非可以易心處也若如陛下盡諉其事于人而憂懼不切于已則為君者何其甚易而不難耶臣願陛下澄心定志深思痛省今日之天下乃祖宗之天下立政當以天下而立用人當以天下而用行至公無私之大道全保護宰相之大體率勵羣工大明黜陟變委靡衰弱之陋習為滌蕩振刷之宏規斷自聖意灑然與天下更新如此則宗廟社稷可使久安天下人心可使咸悅而皇天威怒庶其可回矣不然乾綱不振政事不親國勢朝綱日就萎苶天意謂陛下為如何謂宰臣為如何日監在茲凜凜乎甚可懼也陛下以直言求臣臣發于忠愛不容緘默位卑言高罪當誅殛惟陛下裁擇取進止蒙齋集卷三
