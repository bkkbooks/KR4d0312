body:
  text: 䝉齋集卷十一宋袁甫撰序送林德甫赴京學教授序三山林君德甫受知真西山結交湯同年仲能及其弟伯紀西山於人無不容其敬德甫也獨異衆人仲能伯紀繩尺甚嚴非言與行副知恥自重之士不深交也余以是知德甫必有以取重於師友者矣天地生才不間今古每歎前輩銷落後生不接聞源流風俗淪胥曷有紀極泛觀宇宙間不但人才寂寥而物亦凋耗衰少推數循理必有其故矣土敝則草木不長水煩則魚鼈不大其信然耶余既雅聞德甫賢譽今茲親接耳其言叩其所藴則包絡事物貫穿古今守經達權之道皆瞭然於德甫之胸中異時所到浩未易量殆不必重歎典型之淪墜而謂吾道于是窮也雖然昔者先君子嘗訓學者曰立志貴乎恢張保德莫如兢業今世之士往往卑近者乏恢張之志而俊邁者鮮兢業之誠有能立大志奮大勇傑然立乎千萬人之上而檢㸃此身雖亳釐之間微有過差亦不茍恕則恢張兢業蓋兩得之矣德甫分教京庠異日將推所有以淑後學固余之所深期者也倣古人贈言之意於其别聊為德甫發之送潛子言趨朝序陸先生金谿人也而書堂實在貴溪之象山同官安仁宰潛君子言家溪上余興崇象山書院子言大喜蓋先生之學大要以辨志為主舉世沈酣於利欲之中而不知本心之大義此固先生之所哀也晦庵朱先生延先生講書於白鹿特取論語喻義喻利一章指示迷途厥旨蓋可見矣子言所以喜余興崇書院得非喜斯道之久鬱復明乎今子言入朝仕胄監風化之所自出子言以其心之所喜者上告明天子下淑諸生平居果有徇義忘利之志則臨難必有盡忠致命之節將見先生之道復光明于時而國家元氣綿綿長存矣或曰時方多事而以興學為急毋乃迂乎曰不然無禮則賊民將興無學則上陵下僭載在經傳昭昭乎不可誣也奚其迂子言知余心者于其行也遂書此以贈之送魏監丞赴䕫帥序紹定改元將作監丞魏侯以直祕閣帥䕫䕫固重地也側聞明天子屬侯意殆不止䕫侯識通而機敏博聞而知變治䕫有餘矣儻加重任焉俾全制西蜀其亦可哉但蜀近日多故敵人去来不常我兵單財寡備不素具蜀人心摇搖然侯其奚以處此獲乎上不獲乎蜀人不可也獲乎蜀人不獲乎上不可也官之辟置歟財之調度歟兵事之分合歟制敵之緩急歟務通下情不肯阿意求合獲乎蜀人矣而未必獲乎上若一切稟命於朝廷以取上之知獲乎上矣而未必獲乎蜀人然則奈何曰決諸心槩諸道心之所可即道之所安蜀人與之上亦與之未有獲乎下不獲乎上者也侯之先聲蜀人屬耳目焉循是而行夫何患且余聞蜀人性亮直毁譽不亂真見有潔㢘畏義者交口譽之其反是者則顯攻之介乎是非之間者始譏而改則終是之而卒不改者終非之前事殆可鑒也侯行飭於身而望積於䕫譽滿四屬而聲達於天朝繼是領全蜀之寄為國家萬里長城者必侯也侯到蜀試從鉅人長者而叩焉寧考朝從臣抗疏力論西事者誰歟乃余先人絜齋也蜀人誦之至今不肖孤敢忘先志哉侯衢人也余承乏典州與侯有夙好於其行敬書以贈送張伯常赴吳尉序張伯常負其才氣能力於學通知古今論議亹亹可聴不得志場屋辟尉吳江豈伯常本志哉于其行贈以言曰尉職警捕者也得盜孰若無盜魯常患多盜矣季孫使臧武仲詰之武仲不可其言曰在上位者洗濯其心壹以待人軌度其信可明徵也而後可以治人余每愛斯言可謂知去盜之本矣夫盜何自作亦效上之所為耳上不欲則雖賞不竊上先利則不奪不厭伯常既自飭厥躬又遇明監司是能軌度而明徵矣民忍為盜耶雖然嵗惡不入餓殍盈野民不忍為盜而嵗實驅之吁念之哉敬之哉毋罪嵗毋罪民益加内省告諸明監司不以得盜為喜而以無盜自期是之謂不負所學送趙從道名隆孫赴福倅序天地與我同斯言贅矣我與天地同斯言亦贅矣此至言也而謂之贅何耶噫知者知其為贅不知者不知其為贅也三山别乗趙君之官將為風月主人矣訪余山中且别而求一言余病矣又何言試問風月與我同耶我與風月同耶萬籟俱息湛然清明當此時風月且與我相忘矣烏覩其為異躬簿書役期㑹當此時風月與我判然矣烏覩其為同欲仕乎惟恐上之不我知而吾職之不得盡也風月同耶異耶欲息乎思泉石之清致望故鄉而懷歸風月同耶異耶在閙而能友風月者吾見亦罕矣閙既與風月隔而閒乃欲與風月親是二物也烏乎其可親然則無閒閙動静則可語風月之真趣矣而此豈易到耶而豈終不可到耶别乗負超軼之才志于古而敏于學其進未易量也聞余言拱而唯乃書此以贈送趙庶可秩滿言歸序用舍難全通介難兼其来尚矣喜動一于用喜静一于舎徇已一于介徇人一于通孰有可用可舍能介能通者乎稽山趙君庶可銳意職掌用矣語及出處愀然有欲舍之色確守界限介矣稽諸輿論翕然有通才之稱世人能如庶可者蓋寡雖然事會方来舍不必言也才如庶可通又奚足道哉姑置之敢問知之如何其用世乎其為世用乎若曰為世用則庶可猶夫人耳吾期庶可用世而庶可未肯以用世自期吾惑焉又問介也如何其無所往而不介乎抑有時而介乎若曰有時而介則未為難能也吾期庶可以無所往而不介庶可其果聴吾言否乎余毎懐此而未吐庶可告别余適抱病杜門未有見日此而不吐是終不吐也則于庶可乎有負故卒吐之夫有用有舍有介有通人自為此名耳道固無是也果得道矣溥博淵泉而時出之豈有用舍通介之迹哉凡涉用舎通介之迹皆較計安排而為之者也去道遠矣吾將進庶可于道盡捐世俗之見而卓然有志於古忘爵禄乃能用世忘宮室妻妾所識窮乏乃能用世忘身乃能用世必如是則可以言用矣易曰介于石不終日貞吉夫子又發明之曰介如石焉寧用終日㫁可識矣果能是将無所往而不介又豈獨為目前硜硜小丈夫之為哉一節之㢘是一節而已也一事之敏是一事而已也道若大路坦然正直六通四闢無有拘閡然則求道有方乎曰有其方若何曰在明心請以是勉庶可徐逸平集序學有淵源人有傳授逸平徐公自言其學得於蕭先生蕭先生得于龜山楊先生蓋出於伊洛之學者也觀逸平所著書淵源傳授槩可知矣而余所深敬逸平者非徒以其言也以行足以副其言也記曰天下有道則行有枝葉天下無道則辭有枝葉夫言辭豈君子所貴哉枝葉之盛本根之衰平日躬行果無愧怍發而為言斯足貴矣逸平信其素學恬然不以仕進為意行孚於鄉咸師尊之五峯胡公一時之傑往復書辭亦以先生稱則其行卓矣豈徒言而已哉余既為逸平書其墓江山王令裒其遺藁又以序見屬余遂得寓目焉中庸曰言顧行行顧言其逸平之謂乎許主簿大梁集序端平初天台許君以舒城簿領部兵糧自淮達汴凡經游之地感宗周之舊事睹黍離而興嗟作為詩章以寫其徬徨悽愴之意題曰大梁經歴集朝士遺之書曰東西道進師所向無前天府已入版圖闗洛在目宜發為鐃歌鼔吹之曲以鳴太平之盛噫今閲斯集所謂鐃歌鼔吹者乃一轉而為是耶但見周旋亳汴之間慄慄焉懼糧草愆期辠在不測何暇鳴太平之盛然士以職自見會計當牛羊茁壯長此吾之職分也又豈必擇不勞且宂者始可以盡吾職耶已以不勞且宂者而自處則勞宂將使誰當耶若夫譎諫之體固詩人之常而此編非譎也君自謂曲而有直體且以玉川月蝕之作自况此其發於忠義豈非天性然耶以職則不辭勞以詩則不導諛君信可人矣抑又觀其論淮西便宜五事得于親歴最為詳備至力言守江清野之失且以精間諜安淮民為急務惜其不得上達爾噫世之抱孤忠懷隠憂而不獲上徹如君者蓋多矣使有能表而出之雖未暇鳴國家之盛要亦伸草茅之氣下言之上行之瘳民瘼而回生意是其鳴國家之盛也又奚必鐃歌鼔吹之為耶君訪我于里舍今告歸遂書此以贈無倦序示江東幕屬以期會不報為大故賈誼嗤之其務在于期會簿書王吉鄙之識者皆以是為格言雖然簿書期會非可廢也顧所謂簿書期會者如何耳周禮曰以參互攷日成以月要攷月成以嵗會攷嵗成而特著于司會之職是則參互要會乃周人之簿書而日月嵗即周人之期㑹也彼其官僚之講習渺然為治體深長之思朝夕之所圖維隠然為民生悠遠之計不以虚名事誕謾而書于載籍者皆實事不以光隂付等閒而攷其日月者皆實迹此周家所以勵臣工修庶政非若漢世崇尚刀筆吏之比也由是言之如漢刀筆吏之簿書期會則不可如周日月嵗之簿書期會獨不可乎某非才將指揮幸與諸兄日相周旋名雖寮寀實則友朋凡本司所以行于郡邑與郡邑所以復于有司者莫非鑿鑿惠利之實政而世之所謂趣辦椎剝等事咸無之近以郵置往復多有稽違分委賢僚以疏壅滯且置簿立期而加縝密焉若可已矣然某以為渺然治體深長之思隠然民生悠遠之計豈惟周人能行之尤吾儒所當孶孶講求而不可蹔倦焉者是用重置此帙畧具其事如左一賑荒之政自去冬迄今散財發粟為數浩博取會既闊類聚孔艱曰常平曰勸分曰獻助曰濟曰糶覈其數目稽其欺弊綜理微密而後一局之事庶無罅漏自是以後民有囏厄官有施予又豈容以結局辭凡此等類上闗朝省下達州縣劄狀行移不付吏手非賴賢僚誰為我助一西成所望豐稔四十三縣之内産米之有無糶本之多寡皆須審會得實斟酌合宜其招商也稽公憑之往復其和糴也察吏卒之姦蠧然後米舟輻湊而倉廩可充一救荒除盜理實相通豫備不虞古有明訓無事尚不可弛况多難之時乎鍛乃戈矛備乃弓矢一事一物皆不可闕器既具矣尤貴閱習合本司所管衙兵教以射藝厲以旌賞可使人人精熟又市井間有所謂良家子近日軍兵習射此徒欣然來集隆暑之月蹔令少休今凉飇䬃然可以尋故轍矣一江西福建之寇退近鉛山貴溪安仁餘干諸邑賊徒動息所當周知官軍利鈍所當盡究報狀盈篋彚輯未齊宜將各郡邑名色以類區分勿相淆雜繼是旋報者亦隨即歸類使血脈源流瞭然在目誠近日急務也一天下萬事非財不辦本司無生財之路惟有節財之政拘𣙜檢柅責任必專外此則告命之樁留者勸富民以争鬻僧牒之給降者多委人以轉售此皆所以厚足食之本為足兵之基一兵荒之禍固為甚慘而差役之苦亦如兵荒兵荒之殺人也猶有時而止差役之殺人也則無時而休今總册䑕尾帳之置差似詳整然亦未足深靠也恪意奉行最貴州縣得人專心討論尤在幕僚任責使役戸脫妄差之擾田里免破家之憂豈非仁政之大者歟一古者先成民而後致力於神昭明靈祠多歴年所雨暘有禱靡不響答兹議更新廟宇鳩工度材豈容無提其綱者人謂神祠似非甚急殊不知為政之道順民心而已闔城之人莫不尊敬信嚮正當因人心而為之况祭山川之在其地者古之禮也今之監司即古方伯連帥而可曠事神之禮哉舉兹數條無非切務分委幕屬各司其事但其間有脈絡相聯者又宜更相協一分中有合合中有分倣周官日成月要嵗會之意相與共惜寸隂戮力同心期底成績今以三日為率某就此簿批問某事見作如何區處某事合作如何施行諸兄其各疏于簿始若煩細然積日而月而嵗功緒著見終始貫通此為政也亦為學也行之在盡心而已故名之曰無倦贈錢融堂詩序融堂自淳安来歙某延入郡庠講書首論立志乃講顔子問仁一章敷繹斯義最為的切夫志非他志于仁而已大哉仁乎充宇宙滿六合接于耳目著于日用何往非仁之本心渾全通貫此心即仁不勞外索人患志不立耳某不敏請融堂入學講書志于仁也融堂為學者闡明大旨志于仁也某帥官僚詣學以聴教授帥諸友咸聴志于仁也諸邑宰各勉邑之士子融堂之賢弟子自遠方来聴濟濟洋洋有風雩氣象志于仁也某乂欲帥邑士之繼至者與同僚之子若弟屈融堂入學再講志於仁也融堂訓誘不勌復留以從茲請志於仁也融堂不但以言啓發之又將與諸友磨礱以求輝光日新之實言行相副無歉昔賢志于仁也他郡之聞風者將曰校官作成士類又能求廣其學問郡僚不以此事為迂闊又能助成其教化遂使淳安之師友相從以至于歙歙之官若士相與慕而問辨講貫焉二邦人士藹然以道義為樂異時人才由此而盛志于仁也某違離膝下假守于茲自是以往孶孶勤求一念在民益勉其所未至庶以不辱朝廷之命而少慰老親之懐志于仁也同僚自是修乃事敬乃職内不欺心外不虐民上不負君志於仁也士習既善推以化民凡爾父兄子弟鄉黨鄰里轉相講授更相勸勉俾歙之民自是知學道之為急孝悌之當先頓革舊習還其本心禮義可興風俗可美志于仁也故曰大哉仁乎充宇宙滿六合接于耳目著于日用何往非仁學者勉之本心虚明常如講書諦聴之時則庶幾有志矣不動于意不累于欲兢兢以守之時時以習之無終食之間有違則仁常在我矣某嘉融堂善于發明聖人之旨于是詩以歌之贈徐通甫名士龍序三衢徐君為惠州校官將行四明袁某酌别而言曰君氣貌粹夷威儀閒雅意其胸中必愉愉怡怡有自得者非余所及也其何以贈君雖然焉可以無贈昔吾夫子之言曰多聞擇其善者而從之又曰回之為人也擇乎中庸得一善則拳拳服膺而弗失之矣盈天地之間皆善也皆中庸也若之何而擇之曰擇之以心心即善也即中庸也以是擇之以是得之以是拳拳服膺而弗失之顔子亞聖也尚謹所擇况後學乎余與君論學猶未究精微也而竊窺一二矣聖經昭白真若日星傳註之學愈多愈晦君其謹所擇焉贈東嘉劉君序學者貴有受道之質甘受和白受采以其有美質也非甘非白則雖有五味五色亦弗能受矣色味尚不可無美質矧學者之于道乎質者何曰忠信而已矣忠信即人之本心外忠信而求本心者皆妄也東嘉劉君自婺過衢謂余曰吾就正于校書徐先生望其容貌未言而敬心自生旨哉斯言劉君觀省此心常如侍校書時可以言忠信矣贈王伯友名塤序中庸援詩妻子好合如鼓瑟琴兄弟既翕和樂且耽宜爾室家樂爾妻孥子曰父母其順矣乎嗚呼好合之好豈世俗之好和樂之樂豈世俗之樂皆道也兄弟妻子順道則父母無不順斯可以言孝兄弟妻子一不順道則不足為有道之好不足為有道之樂不好不樂則父母不順非孝也事亡如事存父母無存亡之間豈可以為既亡而不思罔極之報哉子曰射有似乎君子失諸正鵠反求諸其身為人兄為人夫者亦可以反求矣風自火出家人反求之義也余讀中庸有感于伯友之行也書此以贈亦因以自警焉贈新昌俞君序余卧疴里中新昌俞君惠然来訪袖出長箋道所以来見者非他有為也援孟子反經一章其有志于正學歟七篇之終論自古賢聖見而知之聞而知之動經五百餘嵗由孔子而来百有餘嵗耳知者誰歟非孟子自許歟所見何見所聞何聞所知何知此難以言語形容盡也通前章反經之論觀之同乎異乎孟子引而不發後學蔽而弗悟嗚呼道其終晦也耶俞君歸而求之有餘師贈王志叔序志叔為齊安錄事漫堂劉公既畀之箴難兄去非又為之跋矣某復何言然漫堂謂志叔㢘明不患不及惟慮迎長官意向耳志叔過秋浦為余言佩服是箴究心犴獄視勘㕔如家平心定氣引囚親問不施箠楚吏不得出一語由是囚莫不盡吐實情兹不亦明乎居官三年律己如一日洎秩滿棹空舟歸兹不亦亷乎嘗有廵檢司執盜聞之縣縣上之州及臬司志叔以贓不獲疑之詰盜贓何在盜謂棄之水矣志叔愈疑白憲置盜三獄分鞫之憲如其言俱以非真盜告遂得釋使志叔無特操決不能為此則其不阿長官不違斯箴信有證矣余每病世人誦善言而不修實事如志叔之不負漫堂及難兄之訓幾何人哉問學無窮志叔勉之繼此聞一善皆能躬行以實其言古人可庶幾也遂書以贈之贈嚴坦叔名粲序坦叔抱負才業有志當世以余耳目所睹記才如坦叔蓋寡坦叔有詩名寓意推敲細入毫髮似非磊落度越繩墨者及遇事挺身直前勇無與抗喜接雄豪士握手吐心肝相期功名人亦樂與共事余每與語深知其志向必不虚為一世人善謀能㫁密而通敏而耐坦叔之才其細麄易劇無施不宜者歟士固以有用為貴雖然遇不遇時也奚可有固必意余老矣同寮三年坦叔之助不可縷數一日别余去求書恱心二字語余曰吾未為參選計歸而繹故書求吾心之真悅請大書將揭諸所居之室余曰是得之矣乃書而序之贈趙君是名韙夫序余與君是俱甲戌進士紹定己丑余持庾節江東君是實在幕中屬嵗饑議賑貸政君是有助焉庚寅冬余領臬事仍司庾與君是偕来君是敏于事善斟酌三年之内發廩勸分地勢濶而事情多實惠難下究選屬檢覈必先君是隆暑祁寒漕憲倉分郡縣慮囚君是代余行雪寃寛繫輒中理余始至畨則留君是于池余行部又以臬事留屬君是彌縫罅漏勞矣哉會秩滿將去因語及齊年今要官者若而人外庸者若而人已顯而中折軸者若而人久躓而漸亨者若而人未通籍者又若而人得喪升沈天地賦分一定毫髮不爽顧求其不喪不沈者在我而已君是奉板輿為禄養計安恬夷猶厥味甚長素守弗移聴其在天使後之觀者曰甲戌科所得人如是茲其為顯親揚名也大矣敢以此言為君是贈贈王次㸃名與之序高山仰止景行行止士各有所志或志事功或志名節或志詞學而上焉者志于道其所以景行前哲各隨其分量規模之淺狹大小而至于景慕聖門之高弟必志于道者也當曽㸃鏗爾舍瑟之時雍容數語真如在春風和氣中今天台王君之有志于是也以與之名而字以次㸃則豈特事功名節詞學而已哉道即本心天地同體虛明洞徹不可名狀曽㸃蓋有契于斯矣夫子思中行而不得故思狂者又不得而思狷者狂狷皆近道而狂尤勇于進道次㸃勉之哉東巖沂水也生徒童冠也詠歸之樂即當時氣象也夫何遠之有又有關雎麟趾之意而後可以行周官之法度其先儒之確論乎王君次㸃作周禮訂義予猶不獲盡覩全書且未見次㸃所述詩說噫說關雎麟趾之詩易耳關雎麟趾之化惟三代聖王能之後世之漢高皇唐太宗尚不足進此然則周官將何時而可行乎曰聖經與天地並世有否泰道無終極有王者作克己以正本齊家以範物宮府一體朝廷邦國為一人左右􅉏御皆良士后妃嬪婦無私謁廢置誅賞盡出于一人而竒衺不正之習無纖介奸乎其間此關雎麟趾之化而即周官法度之所由行也余雖未見詩說固可以心㑹矣孟子談井地爵禄之制而大本在格君心聞次㸃著經說甚富格心之要儻在乎是其許我盡觀否乎贈真仁夫名志道序物生而華華而實其生生也不窮秋冬歛藏萬物歸根春陽載熙生意沃若生不待春也當歛藏之時生意在其中矣詩之美稼穡曰實函斯活函云者所以形容生意之妙也世人不達此理往往趨華而棄實孔子傷之曰苖而不秀者有矣夫秀而不實者有矣夫非特車服宮室之繁飾于外者是華也詞藻之麗聲譽之赫亦華也朝夕馳騖而不反其家于實乎何有陽處父張茂先皆以華而不實致敗邢顒為魏曹植家丞而劉楨為庶子顒守禮楨善屬辭植疎顒而親楨楨諫曰君侯采庶子之春華忘家丞之秋實世以為名言是故才勝德謂之不實辭勝行謂之不實實茍不足雖堂堂之子張屢中之子貢去道尚遠况其他乎仁夫西山家蘭玉也一日請益于余余曰子盍以已之名若字日省觀焉道惡在仁是也仁惡在事親是也西山為今天下端人子娛侍親側委已于學收歛膏液以暢内美則人之見之容貌辭色之間固有不可揜焉者矣始余見子猶懼其驕今之見子驕氣鋤矣退而質諸人咸稱子為佳公子然余猶為子歉然也孟子論仁之實既曰事親又推之于義于智于禮于樂曰樂則生矣生則惡可已嗚呼此生生不窮之妙也此所謂仁也此所謂實也子而果有志于是深耕易耨勿忘勿助雖適千里常如過庭戰兢自持若寶金玉今之稱子為佳公子者他日又將曰真學者也夫必使人稱子為學者則西山翁之心始慰矣始可以言實矣始可以無愧于斯名斯字矣請以小字字仁夫曰實之而因為之說子之歸也呈于西山翁及余友湯伯紀其必曰然贈沈智甫名省曽序言心聲也發策之語直犯時忌惟先有輕利祿心故耳使所重在利祿尚不敢略有忤拂况敢從其蠧根病髓而攻之耶若端憲沈先生之宏致淵識可謂達于重輕之分矣先正獻公嘗言先生少年在鄉校刻志問學齋前有竹甚茂每于竹叢中讀書音韻洪暢聴者悚然祁寒襪無絮則小籃貯故紙用以温足前輩所謂士大夫必先咬得菜根乃可有為者其先生之謂歟嗚呼惟其如是故能尚氣節篤道誼視官爵如外物曽何足以動吾之毫芒哉方其仕上虞也一尉之卑發為問目深嗟理學不明風俗頹靡于是以扶植公議為主及為學官謂立朝而道不行赧然動于中者今可謂無其人蓋將以啓宰相而下愧恥之心耳且夫壞天下國家者私意也而惟一公字足以藥之壞士大夫節義者無羞惡之心也而惟一恥字足以藥之此二良劑切中膏肓人徒嘆其善藥病耳孰知胸中耿耿不以得喪利害為念而後能發此二問不然豈不能隨世俯仰雷同媕阿為尋常場屋發策之語而乃明目張膽慷慨深切如是也前一問尚為世所容後一問不得安于朝列矣先生何加損哉高山仰止景行行止愚于是敬服先生之心嘉熙二年十有一月己亥敬書以授先生之子智甫别駕云贈祝君泌序康節觀物篇其學自老氏乎致虚極守静篤萬物並作吾以觀其復斯道也豈獨老氏易繫辭曰設卦觀象物皆象也又曰聖人見天下之動而觀其會通物皆動也老氏守静觀復乃動也易觀其動乃静也何動非静何靜非動隂陽剛柔互為其根知此者可以觀矣祝君好康節書余大書觀物二字遺之非觀物也自觀也觀我生觀民也大觀在上何物何我祝君識之贈包進士序唐人作字或取墨妙或不擇墨二者不同而同于以字名世蓋胸中有字字不在墨墨誠佳固足助逸茍胸中有自得之趣雖不擇墨焉可也雖然學擇墨易學不擇墨難予未善書敢犯難乎請姑從其易包君所示頗足起予且豫藏之久須更佳噫人以久乃見豈特墨也哉贈項吉甫序余既為耕樂說端平丙申余被罪去國果遂歸志吉甫貽書錄前記見示余忻然曰吉甫與余俱老矣筋力日衰欲耕不可雖然昔陶靖節歎富貴之非願委去留于無心因暮春之將至感西疇之農人作為歸去来之辭而斷之曰樂夫天命復奚疑是吾志也遂書以遺吉甫云贈京口富春子孫君名高榮序人言數學與理學異吾謂不通于理非深于數者孫君占天數學也而乃通于理以已之瞽念人之瞽求膏腴創義學萃羣兒之瞽者教焉非通于理而能如是乎推孫君之用心不特可以救世之盲于目者抑可以警世之盲于心者矣絜齋家塾書鈔後序甫自幼洎長侍先君子側平旦集諸生及諸子危坐說書夜再講率至二鼓無倦容謂學問大旨在明本心吾之本心即古聖之心即天地之心即天下萬世之心彼昏不知如醉如夢一日豁然清明洞徹聖人即我我即聖人舜號泣旻天負罪引慝祗見瞽瞍禹荒度土功三過家門􅈱􅈱弗子道心精一曽何間斷自古大聖同此一心箕子論皇極無偏黨自蕩蕩無黨偏自平平無反側自正直是之謂極是之謂本心太甲顛覆典型痛自怨艾克終允德成王遭家多難執書感泣天雨反風本心一昬迷惑如彼本心一復光明如此先君子諷誦再三聞者流涕又言見象山先生讀康誥有所感悟反已切責若無所容讀呂刑嘆曰從肺腑中流出嗚呼至哉先君子之學源自象山明白光粹無一瑕疵可謂不失本心矣是編也伯兄手鈔雖非全書然發揮本心大旨具在伯兄名喬天資純正用志勤篤嘗宰溧陽視民猶子邑人德之惜未盡行所學耳甫悼先君子之沒幸伯兄之有傳今又云亡痛曷有已遂刻是編名曰絜齋家塾書鈔而納諸象山書院以與世世學者共之紹定四年辛夘良月己未男甫謹書䝉齋集卷十一
