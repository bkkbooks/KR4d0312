body:
  text: 䝉齋集巻七宋袁甫撰奏疏中書舍人内引第一劄子臣猥以疎庸誤䝉收召寵光狎至感深涕零自惟蒲柳弱質早衰多病洊布忱悃竟閟俞音然葵藿傾陽寸心炯炯儻終于辭避非陛下負臣而臣實負陛下矣是以勉策疲駑祗服明命幸借玉階方寸地輒攄管見少裨萬分願賜垂聽臣仰惟陛下聰明天縱勇智天錫心源昭徹時幾洞見亦嘗深思而默省乎夫莫尊乎天矣其喜悅其威怒陛下所以知之者非心歟莫幽乎鬼神矣其肸蠁其怨恫陛下所以知之者非心歟莫嚴乎祖廟矣其安樂其憂悲陛下所以知之者非心歟方此心之未與物交也湛然清明寂然靜止及其旣交于是喜怒哀樂生焉然而時値乎艱危事遭乎變故喜樂未見而哀怒先形繼天爲子而天心未契也主祭百神而神心未格也受列聖之付託而列聖之心未慰也則爲之戚焉赧焉慄慄焉而加以羽檄交馳邊塵暗矣士馬物故喪師聞矣孤人之子寡人之婦哭聲震野矣仰籲蒼穹邈焉弗聞禱爾于上下神祇渺不可測率前人有指疆土又岌岌乎不可保也而法家拂士方且日以危急痛切之辭交進于吾前則愈爲之震惕震惕未已消沮繼之當是之時此心之清明靜止者亂矣于是乎柔媚之人乘其機而入之曰是適然爾且將按堵也否則曰天數有定非人力可預也又否則曰責在臣下不必過憂也夫以前日法家拂士之言如彼而今也柔媚之言乃如此于是乎疑慮頓釋憂懷遽紓邊塵若不見喪師若不知哭聲若不聞嗚呼外境固迷也内心之炳炳者其可欺哉惟其不可欺烏知不翻然悔悟躍然奮發耶孔子曰操則存舍則亡出入無時莫知其鄉惟心之謂與噫是正操舍存亡之幾也此念一囘宜深懲旣往之咎親鯁直而斥柔佞可也未幾而處逆境爲甚艱反思順境之可喜而又適會夫敵騎暫退羽書暫稀果以爲天助神佑也雖明知秋高馬肥指期非遠而敵去則務偷安目前又將曰今者不樂日月其除矣于是震惕轉而爲喜幸消沮易而爲縱肆何翻覆之甚耶夫始之震惕消沮今之喜幸縱肆不過隨勢急緩而爲之變遷皆非本心之樂也陛下何不奮乾剛之勇充離照之明自覺悟于心曰嗜欲之娛何能解憂宴安之懷何足爲樂徒使我獲戾于天于神于宗廟而不得一日暫安今將淸其天君盡更前轍則必屏嗜欲懲晏安而吾身始立于無過之地則必察民瘼決壅蔽而天下無異乎戸庭之間然後命股肱大臣曰國勢蹙矣危機迫矣凡可以拯救生靈迓續天命者汝其開誠布公汲汲圖之又命諫臣曰朕躬有過汝其盡規臣有邪佞汝其極言此何如時而尙可有所避諱乎又命將帥邊臣曰凡兵之失利者汝其察夷傷勞呻吟慰安其父母妻子不幸而歿于陳者告于上而厚矜恤之其忠烈之彰彰者朝廷亟官其子若孫而旌異之大信昭布決不食言如此則天地宗廟必能察陛下之心豈不陰相默佑轉災爲祥乎四方忠臣義士必能信陛下之心豈不感激奮勵捐軀報國乎理亂安危之機特在陛下方寸間耳臣不敢毛舉庶事而獨論心源者蓋以陛下之心淸明靜止則必知疾痛疴癢必通關節脈理悼邊甿之塗炭憤國歩之多艱自能惡旨酒如大禹自能不邇聲色如成湯自能衣大布冠大帛如興衞之文公自能坐臥仰薪飲食甞膽如報吳之勾踐轉危爲安易亡爲存有不難者不然中外之事可爲痛哭流涕者豈易枚數哉詩云我瞻四方蹙蹙靡所騁陛下之憂臣之憂也陛下之辱臣之辱也主憂臣辱主辱臣死臣固不惜一死而不以一疏悟陛下乎臣學淺識闇所言樸直然區區忠赤粗得吐露陛下儻恕其狂直而加采擇焉豈惟微臣之幸實宗廟生靈之幸取進止中書舍人内引第二劄子臣竊惟前歲之夏猥以淺學獲侍經帷玉音下問漢元帝親近儒生乃優游不斷孝宣之業衰焉用儒何爲若此特不得眞儒用之耳臣是時仰贊王言之大且力陳元帝之時如蕭望之劉向之徒雖未足爲眞儒然亦忠愛懇惻赤心爲國惟元帝聽信不專惑于讒間此所以優游不斷漢業寖衰陛下旣俞臣之言矣臣竊見端平更化之始魁壘耆艾俊傑之彥濟濟在列陛下銳意望治衆賢交進嘉謨曰敬天愛民曰講學納諫言制敵則曰勿和言救楮則曰節用此皆究極根源之地而陛下日聞衆君子之說以爲如此可以坐致昇平矣而算計見效茫如捕風内阻外訌楮輕物貴人情惶惑國勢阽危以爲端平君子未能有過于嘉紹而反不及焉于是心疑君子之無益于人國矣噫其果無益于人國耶抑名曰用君子而實未嘗盡其用耶夫所貴乎眞君子者如精金良玉一心事君決無他念專意爲國決不營私似迂闊也而實懇切似高亢也而實敬畏似爭辯也而實和平果盡其用則有益于國大矣今陛下先懷無益之疑于是興拊髀之嘆而窺陛下之意向者眞以君子爲誤國而微動陛下之悔矣夫誤而且悔則當不誤者用之無使至于復悔可也奈何旁蹊曲徑趨者如市淫朋比德習以成風邊事繹騷一時憂窘及其暫退動色相賀心志一驕靡所不至前日私意之不敢逞者今則逞矣前日倖門之不敢啓者今則啓矣至于治國之要務禦敵之至計實政未嘗講實備未嘗修秋風一起憂窘又如初矣臣恐嘉熙之誤未必不如端平之誤而嘉熙之悔又未必不似端平之悔也然則其咎果安在歟臣嘗反覆深思竊謂上有堅凝之定力則下有堅凝之實效今泛泛悠悠如舟流之靡屆昬昬憒憒如醉夢之未醒用君子矣而又使小人間之朝而進一說焉陛下以爲可暮而進一說焉陛下復以爲然是可謂之堅凝乎是可謂之定力乎臣以爲莫若封植君子之根本使無纖罅微隙之可投專意責成勿搖浮議則必不至于誤且悔矣天下大物也陛下不能自治專命一相一相不能獨任而博資衆賢此大公至正無偏無黨之道也惟在聖君賢相力持堅凝之志破君子無益之說勿疑其誤而易至于悔則爲君子者乃可展布四體畢智竭忠而責其堅凝之效矣如使倏用驟變乍佞乍賢則羣臣且將狐疑莫有固志而陛下左顧右盼無足以稱任使者則臣恐陛下孤立于上矣昔仁宗朝張昪爲中丞彈劾無所避上曰卿孤特乃能如是昪曰臣仰託睿聖是爲不孤今陛下之臣持祿養交者多而赤心謀國者少陛下似孤立也信哉是言衆賢聚在本朝更相儆戒互相輔翼非獨賢者之勢不孤而人主之勢亦不孤舉朝皆持禄養交之臣其徒實繁其根彌固小人不孤而人主則孤立矣臣願陛下察否泰之機辨君子小人之實無使積成孤立之勢可也大凡君子無近功小人無遠慮小人以爲可安可樂者鴆毒也一中其毒身且危矣君子以爲可安可樂者藥石也磨以歳月疾必瘳矣臣追憶陛下發漢元帝用儒之問有感于心是以罄竭愚衷干冒天聽惟冀陛下勿至于屢誤屢悔而終收君子有益之功此實宗社無疆之休不勝惓惓取進止某奏臣至愚極陋屏居田里豈意陛下記錄收召近入修門卽拜掖垣之命控辭未允間又䝉許以入奏仰見陛下虛懷盡下之意原註此下有闕文天變迭見敵國肆暴朕甚憂惶與前年大不相同某奏陛下因此恐懼臣雖在田野知陛下之心如此此心操舍存亡全在陛下自用力讀至隨勢急緩而爲之變遷某奏方事變之來則陛下憂懼及變故稍平則陛下安肆陛下處心豈可因外境而有所轉移目下敵騎暫退羽書稍稀趁此時正當愛惜寸陰不可因彼稍寬我遂縱肆竊恐秋風一起又將臨時慌窘上曰誠是如此秋且不遠朕深以爲慮讀至命股肱大臣曰云云某奏陛下當朴實做工夫不可只靠議和上問邊事當如何做工夫某奏今當急以上流爲重江陵不固則襄州不可復不復襄州何以爲國今邊備無一可恃陛下急急作措置可也若只靠議和以偷安竊恐誤事上曰極是以議和之歲月爲自治之工夫朕意正如此某奏目今事勢緊急陛下切不可悠悠泛泛等閒過了讀至惡旨酒如大禹不邇聲色如成湯某奏羣臣進言者每慮陛下于此未能無過當處上曰也無某奏若不如人言豈非宗社生靈之幸臣所以懇懇切切力論心源者正願陛下常著精神勿爲外境所移勿爲左右之言所惑臥薪嘗膽夙夜磨厲嗜慾不作天君清明中國乂安外敵自服願陛下警省畏懼勿使此心變遷上曰是當常常畏謹臣奏陛下此言可通天地鬼神矣讀第二劄某奏乞陛下保護愛惜君子不可輕易動搖上曰端平更化之初賢者布在朝廷不曾做得一事衆弊轇轕愈不可爲某奏臣劄子正是極論此事以臣所見非是端平君子無益于人國乃是朝廷任用不篤未能使君子展盡所長耳陛下先疑君子無益于人國乘間者卽謂君子誤國今日陛下能不悔用君子此則大計利害讀至旁蹊曲徑淫朋比德與夫私意倖門等語某奏陛下當于此警省若欲杜絶此弊須是有堅凝之志乃可且如去年天變陛下赫然奮發進退輔相大臣天下歌詠陛下聰明剛斷今專任一相圖濟艱難勿爲小人轉移方可謂之堅凝讀至人主孤立等語某奏仁廟可謂堯舜之主張昪尙謂之孤立蓋左右前後赤心爲國者少而持祿養交者多此所謂孤立也陛下若終疑君子無益于人國則將屢誤屢悔迄成孤立之勢矣可不懼哉上甚開納讀畢上又論及楮劵事問秤提如何某奏楮劵到今已是築底别無良策朝廷且欲一時扛得價起不得已行此策昨日見邸報閩浙四郡守皆以價高遷秩猶恐受賞者不能自保其往若萬一更欲行罰則斷斷不可何則天下長吏未必盡賢如朝廷責其不能奉行繩以峻罰爲郡守者思欲逃責免禍暴酷之政一切施行民無所措手足矣故臣區區懇告陛下切勿用罰召怨以傷邦本上曰是奏乞團結民兵劄子臣聞方今西邊之患在乎兵少而力分蓋兵少則備疎力分則膽薄敵攻其虛如蹈無人之境不待兵刃相接而渙然散矣可爲寒心可爲太息今欲備之疎者密膽之薄者壯處處有守次第相承敵攻一重而又有一重以爲隄障其惟亟行團結民兵之策乎或謂此策行于平居無事之時則可今勢旣孔棘將有緩不及事之慮殊不知善作事者當識人情大凡人情安平而使之結集則怨咨易起事急而行之彼各保鄉井戀室廬顧墳墓此正民情之所甚欲何怨之有本朝康定初契丹擾比元昊叛西可謂甚急矣始詔河北河東路强壯陜西京東西路新置弓手皆以二十五人爲團置押官四團爲都置正副都頭各一人五都爲指揮置使年二十係籍各置弓弩分番教習官日給糧二升河北在籍者二十九萬三千河東四十萬四千陜西亦十五萬而卒以此制西北兩敵未聞事勢急遽之時而不可以行團結之策也今者坐視所在兵少力分之弊不亟起而圖之敵騎之來勢若風雨乃欲以疎漏單薄之備當飄忽剽悍之敵一處失守則諸處盡瓦解矣譬猶奕棊急有急著死中求生此國棊也若憚彼之衆怯我之寡遽謂縛手無策待其敗亡可乎臣之愚計謂宜作急行下應沿邊州郡日下舉行團結民兵之政其間或有規模已成者更須精加整葺務令縝密如其未曾結集去處宜及今嚴行約束亟作措置處處有保甲人人知固守無枵虛疎薄之患有周衞捍禦之功此實當今至大至急之務也朝廷每舉一事未嘗不曰專委監司郡守其所以鼔舞監司郡守者未嘗不曰有賞罰奈之何能言而不能行歟當勢之急也則曰倉卒何暇爲及羽檄稍稀敵騎稍退又諉之于無事矣如此則是終無可爲之時也今者團結民兵一事願陛下宣諭宰執務在速行如救焚拯溺不容少緩仍責在監司郡守以能否爲賞罰郡守不勝任則監司按劾監司不稱職則臺諫抨彈毋事空言專行實政則備密而膽壯又何敵騎衝突之足慮哉臣一得之愚冒昩控陳惟陛下採擇取進止論流民劄子臣聞今日之患至危至急關于理亂存亡之大者流民是也臣竊迹往事未暇枚舉姑以晉事言之永寜間李特雄輩其始不過挾流民爲亂耳特雄單人窶子尙能因流民蟻附結大營于綿竹以處之旬月之間有衆二萬遂據全蜀自古惟有已亂之方者乃能折倡亂之萌西晉不知已亂而縱特雄之倡亂故蔓延以及東晉雍州流民多在南陽王如因之爲亂巴蜀流民布在荆湘杜弢又因之以作亂逮其後也江西流民執長吏降姚襄建業震駭謝尙自歴陽還衞京師固江備守此皆倡亂之始不思亟加安輯故其流毒寖盛寖烈以至此極耳況今歲荒歉米價騰踊餓莩滿目在在皆然以外之流民煽内之飢民等死之念一萌喜亂之徒羣起國將奈何哉夫不恤内地之飢民則凡轉徙于道途者皆流民也又加以在外源源方來之流民吾倉皇無策必將固拒且淮民皆吾赤子今不加拯捄反從而拒之是讎之也以子爲讎稍有人心何忍爲此臣之愚慮謂宜亟加區畫如救頭目然然有當行而未易行者凡數條焉今州縣間流民入境未知數目多寡宜責之長吏廣爲措置或分寺觀而暫爲居止之計或隨力贍養而亟救垂絶之命其說固當行矣然諸郡赤立經常莫繼一旦重以此費官帑空竭計將安出雖有巧智于何取辦此其未易行者一也淮民勁悍材武與江浙不同轉塡溝壑殊可恨惜宜取其尤强壯者籍以爲兵如近日新招拱衞一軍亦可充數仍覈所在諸軍多有虛籍與其募市井之游手曷若收淮民之壯丁其說固當行矣然養兵猥衆爲今大弊不能汰而又益之來者無窮反致激變此其未易行者二也兩淮清野伐敵因糧之謀室廬田產無尺椽寸草之留獨有山水寨阻險爲固者如故也因而葺理增立堡塞以處復業之民其說亦當行矣然民多寨少何足以容葺理之費官給之乎抑聽民自爲而官助之乎俱非空言之所可辦況此又在强敵盡退之後耳談河止渴奚救目前此其未易行者三也借曰其後復業官司爲之主盟還其自有之田勸以力農之務其說亦當行矣然自經敵人蹂躪之餘種盡矣牛盡矣耕具又皆盡矣小民積絫歲久尙不能集一朝還鄉決難措辦是亦驅而就死地耳矧敵情叵測去來無常民未知復業之獲利反不如寄寓之暫寛此其未易行者四也矧今近甸間有剽掠之衆輦下已有攫拏之風凡此亦足以鼓雄心而長聲勢甿隸遷徒皆勍敵也斬木揭竿皆勁兵也羣起附和如水赴壑流民之禍豈不甚可畏哉陛下盍亦懷愚夫愚婦一能勝予之念軫燕巢幕上魚遊釡中之憂凡前四條利害相形有非獨見單慮之所可臆決宜誕布集議之詔俾侍從臺諫兩省官以及在廷之臣參酌事宜竭盡忠計各上議狀不許聯名庶幾人人得盡已見免至雷同塞責陛下與二三大臣合衆謀而斷之至當歸一無有疑貳于以安近懷遠保邦固本實宗社生靈大幸臣不勝惓惓論㑹子劄子臣仰惟聖上宵旰勤政尤以㑹子極弊爲憂廟堂大臣鑒前事之誤悉意經畫自去歲遣官置局隨所在州軍任責撩紙今端緖已見豈容輕易施行而至于再誤乎前此朝廷措置㑹子其說屢變矣然每變每失而迄無成效何若下樸實工夫庶無屢變之悔朝廷因㑹子給降黄牓亦屢矣然牓愈多人愈玩何若勿復紛紛出令庶可以消玩侮之心大抵朝廷行事患在事未舉而人先疑近者因有更張之說猶未見諸施行而中外之人已自惶惑兩月之間物價驟增㑹價頓削城市荒索氣象蕭條臣區區愚慮以爲在我工夫須是靠實縱無全利之策然亦利多害少較之變法易令乍行乍改徒啟人心之疑畏者蓋不侔矣臣請先將白劄子所言一一别白言之然後臣之所謂靠實工夫者乃可得而畢陳焉曰今十六十七兩界㑹子五十千萬數日夥價日低其術可謂窮矣救弊之策幸有十八界新㑹一著又幸有已撩到紙數此正運轉斡旋之機四方人心傾耳以聽若善用之猶可以救弊若不善用之則適所以滋弊今白劄子遽欲以十八界㑹子旋印旋支其說謂一新之直可當舊之五六故欲停舊造新然新者當造而不當遽用機括所繫殆不可輕白劄子之說蓋謂不貴重新㑹則無以扶持舊㑹故欲暗收舊㑹而旋出新㑹舊因新而價增新因舊而價定其思慮亦甚勞剖析亦甚明奈何事理之未盡然也蓋十八界之未出也則天下之人所仰望朝廷之區處者惟兩界舊㑹耳十八界之旣出也則新舊三界雜然並行而區處愈費力矣據白劄子雖云以新㑹照時價買舊㑹而暗毁之然當此用度窘迫旣曰不必頓造新㑹則安能每月以三分之一而買舊㑹必致三界並行愈多愈賤此事理之當審者一也見錢㑹子子母相權白劄子云不必措置見錢又云宜使都城㑹價與城外相等意欲以重楮輕錢之術神之而人心實未易愚終有輕楮重錢之心官司雖嚴刑重罰勒令新㑹從官價舊㑹從民價然三界並行民聽易惑新舊㑹之價不一新必爲舊所牽而倒用于軍則軍以此售之民必欲作官陌行用民或不受必致交爭用于民則甲信乙疑官司强以官陌必致商旅不通店肆停閉此事理之當審者二也向無新㑹則兵劵請給與之以舊㑹彼自無辭今旣旋旋頒行新㑹萬一羣起願得新㑹而不欲舊㑹朝廷于新㑹旣未嘗有蓄積外而三總所内而版曹設或告急其將何以應之此事理之當審者三也目今舊㑹散在民間者爲數五十千萬就如白劄子所云三總所歲支見錢不過二百萬貫姑卽其言爲諸州入納見錢之數且以見錢一貫紐時價折納舊㑹不過一千萬貫而已假使朝廷果能盡將上件一千萬貫截鑿則所銷舊㑹未及五十分之一白劄子雖言許民間應干稅賦盡將舊會照時價入納及其他官錢收納解發并許用舊會搪折然入納解發之數有限又未免隨收隨支果何足以消此四十九千萬之數深恐舊會必且益賤物價必將愈貴此事理之當審者四也方民間初納夏稅折帛錢照時價紐算舊會之時則舊㑹之價自必略增及至州郡以舊㑹發解到三總所及戸部之時則舊㑹之價必大減何者蓋因白劄子明言欲待年歲間稅賦徑令用新㑹入納此聲一播則舊㑹之價驟削也固宜白劄子乃謂諸軍所請一半之錢紐支舊㑹不知三總所及戸部將依民間入納時價折支以給兵劵耶抑將别有一項㑹子準備貼賠以給兵券耶不貼賠則諸軍豈無諠譁之憂貼賠則三總所戸部寜無不繼之慮此事理之當審者五也三總所戸部歲支見錢白劄子指擬于朝廷樁積錢内支撥照得端平初年因換㑹子遂出累朝所積金銀棄之輕于泥沙至今帑藏枵虛言之可爲哀痛僅有昇潤所積見鏹六七百萬及行都所積見鏹三四百萬視爲根本若又掃而空之犯端平之大失豈不重可惜哉況樁積之錢其數有限三總所若不願得樁積有限之錢自願依舊錢會中半朝廷縱欲强總所之聽命而總所以軍情有請于朝廷輾轉紛紜恐終不能奪總所之說此事理之當審者六也總所餉諸軍及殿歩兩司合支見錢白劄子旣指射于樁積錢内支撥諸州廂禁軍春冬衣賜係是見錢不知從何處得見錢以給之白劄子雖令于諸郡且以樁管見錢兌與軍人卻以所兌之㑹依舊樁管初無折閱殊不思諸郡之有見錢者能幾縱有見錢使之以實錢而博虛㑹㑹價不及官陌安得不謂之折閱白劄子又云無慮軍人不願受㑹蓋今來朝廷旣許以純㑹納稅民間必皆出錢以買㑹軍人執券于市便以易錢何不樂之有詳味此言亦可見期望新㑹之意甚切但談河止渴何救目前入納純㑹之害先見而隨手便可易錢之效難必此事理之當審者七也今朝廷尙欠諸閫及總所科撥錢不下一千數百餘萬況諸閫三總所薄歴見管不無舊㑹自新指揮旣頒之後不知便當如入納之例照時價每貫作五貫折支耶抑每貫自作一貫行使耶若每貫作五貫折支則在官之數未免平白折陷若每貫作一貫行使則在上之令自行背馳此事理之當審者八也白劄子云諸郡應干稅賦一半見錢並許折納純㑹如用十六十七界舊㑹則照各處民價如用十八界新㑹則照官價蓋新㑹之價旣定錢卽㑹也㑹卽錢也所以斬然罷一半見錢而純用㑹臣竊惑焉且新㑹作七百七十陌行使姑以意逆之耳非已有此實事也萬一黃牓頒行之後新㑹果爲舊㑹牽倒不作七百七十陌行使朝廷業已棄見錢而重新㑹軍民卻恐輕新㑹而願見錢綱解旣無見錢不知從何趣辨白劄子云稅賦許用全㑹則無㑹者必皆蓄㑹而捨錢而㑹價爲之頓重此言似亦近情然臣則以爲人情亦不盡然也吾意其捨錢而民于錢終不肯捨吾意其蓄㑹而民于㑹終不肯蓄終不肯捨則錢不得不重終不肯蓄則㑹不得不輕此事理之當審者九也㑹子立界分立年限其法始于蜀中當換界時差内外兩場官吏辨驗眞僞互相攷覈方與交收外場辨驗到一貫僞㑹追賞至七十貫内場辨驗到一貫僞㑹所追賞錢視外場又倍之凡賞錢皆置歴拘𣙜專以激犒官吏斷斷不敢侵移他用民間知將來換㑹之時僞㑹必不逃兩場辨驗自然僞㑹不至通行今白劄子乃欲新㑹不立界限是蓋未知立法防姦之深意彼僞㑹何其幸耶又謂間有年深損壊許民間用此入納諸郡用此解發朝廷自從而暗毁之夫一片之楮久而損壊此乃必然之理上下相示貴于明白洞達使其不毁何名爲毁毁則當明何名爲暗端平所行正緣有截鑿之名無截鑿之實徒滋民之疑惑非所以昭大信于天下此事理之當審者十也臣旣以十條疏列于右若夫區處之策亦非有新奇驚人之論大抵成大事者不可爲煩碎之舉致大利者必當有堅忍之謀立定規模善用新撩之紙爲一頓換易之計則庶乎其可矣臣請索言之厥今民間皆知朝廷紐舊㑹之陌換易新㑹大率以五舊易一新舊㑹計五十千萬必得十千萬新㑹則舊㑹可以盡易今諸州撩到新㑹紙已及二千六百萬尙欠七千餘萬以一歲計之每州撩一千萬合七州則來年之夏可及十千萬之數但日印舊㑹自目下積至來夏又増十千萬通計舊㑹六十千萬矣若然則以六舊易一新可也而臣則謂約其大數或者五舊自足以易一新何者如湖南江西等處舊㑹價極低如京城及京口等處舊㑹價稍高稍高處一新雖不可得五舊然極低處一新又不止得五舊合諸郡而論價稍高僅一二處價極低乃徧天下絶長補短通而計之則十千萬㑹略亦足用今其要惟在作急辦紙而已雖曰都司提綱諸郡協力然更須磨厲精神申嚴號令能以國事爲意而奉行如期者旌以厚賞不以國事爲懷而慢令不䖍者加以重罰賞罰旣明官吏競勸則紙必辦集矣辦紙固不可緩印造尤所當急舊㑹日印以應支遣今旣未可遽然住造新楮十千萬之數尤當作急措置併力趲趣務在速辦然後一朝盡行換易舉五六十千萬之舊㑹悉易以十千萬之新㑹工夫靠實效驗可立致矣白劄子所言三界㑹價混雜並用舊㑹一價也新㑹又一價也價旣二三則新㑹之價爲舊㑹所牽恐不可以守七百七十陌之數若從臣之言一頓換易自來夏以後更無舊㑹一券行于世間獨有一色新㑹則民間自然貴重安得不盡從官陌乎此非獨臣之說也白劄子固云頓造新㑹其說徑捷但事力有所不逮又云縱使極力爲之亦須二三年可辦是初不以頓造新㑹爲非時憂其課效稍遲耳然如白劄子所獻之說亦云行之三四年間則舊㑹可以盡毁是亦非責目前之效也今臣采取白劄子不欲速之說而行之于頓造新㑹恐未爲失理臣每見前此朝廷行事往往獨運自私而無博盡下情之心輕易多誤而無審計謹重之意今陛下洞然與天下爲公定而後發發而必中此豈非憂深慮遠之至者哉臣區區管見願陛下力持四戒一曰戒新舊三界並用二曰戒輕變錢㑹中半三曰戒空竭昇潤樁積四曰戒新㑹不立界限此四戒者決不可犯若夫臣之愚說則更乞陛下斷以聖意與二三大臣熟究而審圖之務在簡而易知要而易行勿以來夏爲賒勿以頓造爲憚愛惜寸陰力捄積弊實天下生靈幸甚貼黃臣竊詳白劄子所陳不欲明換而欲暗銷者蓋恐一新易五舊非民所樂故只令紐價輸賦神而化之耳意非不善也然日來物値翔踴正緣舊㑹數多之故民方苦之如能五分銷取其四使新㑹頓復官陌則凡物十千之價者只兩千可得米石絹匹色色如之豈非衆所願欲慮其不樂者過也況旣以時値准㑹而輸賦民間折閱與以一易五則同雖避其名民不可愚也與其暗銷恐不若明白收換之爲愈又照得紹興間四川錢引價低固嘗以一易四人無異論亦非今日創行伏乞睿照又貼黃臣又竊思撩紙一事須使朝廷州郡通爲一體所有給降本錢應期發下勿復稽遲庶幾收買楮皮不至闕乏又其間有以楮皮不足來告者須當體恤此意使有餘不足彼此通濟如印造舊㑹之紙曩時責辦于徽嚴等處者尤當從長區處使新㑹時無相妨不致受害偏重如此則朝廷得以責成州郡無以藉口兼印造新㑹屋宇器具雖已素備其當時所放散造㑹工匠並宜盡行拘上廩給加厚勿憚小費務在集事此專在都司主張維持之耳併乞睿照兵部侍郎内引劄子臣愚疎樸野投迹山林自知無補于當世陛下洊加趣召臣前後控免屢矣而陛下迄不俞所請者豈以微忠麤有可采耶今兹勉策羸軀復覲清光亦願一吐眞忱圖報陛下于萬一耳臣聞激烈而言天下事固臣子愛君之忠涕泣而言天下事尤臣子忠愛之切何則居安而思危處存而懼亡慨然爲激烈之論以聳動人主之聽是固可以言忠矣乃若危中求安亡中圖存當事勢蹙迫之際而祈哀請命于君父惟有涕泣而道之耳又何止激烈言之而已哉厥今江潮暴涌蕩陵我都邑旱魃爲虐勦絶我民命内則楮幣蝕其心腹外則强敵剥其四肢危亡之禍近在旦夕陛下何爲不省悟乎夫憂慮切而後戒懼深警策至而後悔艾力臣敢涕泣以二語爲陛下獻一曰秉一德二曰塞邪徑而究其所以行此二語者則在陛下眞知省悟而已何謂秉一德臣聞終始不變之謂一表裏無貳之謂一當昕朝臨莅之時雖儼乎其齋莊及内廷邃密之地或弛然而縱肆則不可以言一德矣陛下靜觀黙察内隱諸心吾之德一乎否乎聽治朝而百辟聳瞻御經幄而儒生款接當此之時求一言之誤一動之愆無有也及退而自便其私敬心一懈純德或虧陛下曷爲至于此哉蓋所以潛移陛下之心者多矣何則燕處之際娛悅耳目者聲色爾犇走後先者便嬖爾是皆順我者也皆求媚乎我者也四方有敗彼則掩覆天顔未懌彼則寛譬誘于易入動于可喜湛溺其中迷不自覺視治朝經幄夐然不侔矣陛下博覽古昔洞見成敗戒謹恐懼者國未有不治荒淫逸豫者國未有不亂獨奈何不審所決擇而反至于與亂同事乎陛下豈以禁嚴之地設有過言過行人莫予知耶潛雖伏矣亦孔之昭鼓鐘于宮聲聞于外是烏可欺哉陛下縱自欺奈蒼蒼在上林林在下者何臣所以涕泣妄言陛下未能消天變孚民聽服遠人者皆秉德不一之所致也何謂塞邪徑臣聞以義交者爲正路以利合者爲邪徑正路迂而易壅邪徑捷而易趨爲人主者躬帥以正誰敢不正其有稍趨于邪者痛懲而力遏之天下悚然知邪徑之不可由其背邪向正也決矣今陛下不謹幾微邪正雜糅旁蹊曲徑其隙漸開宮掖之祕近習之䙝稍有一隙則寡廉鮮恥者羣起而赴之紛紛多門不可悉數大凡公則必正私則必邪當今之時自上及下由中及外習以成風牢不可解一言以蔽之曰私而已請託以私而行賄賂以私而成黨與以私而固恩怨以私而報官爵以私而獲權勢以私而傾私意之萌陛下旣有以啓之私意之極陛下又從而養成之臣來自草野側聞邇日邪徑之開難以枚舉其甚不忍聞者且至于累陛下之聖德矣夫私意勝則利心動利心熾則邪徑多邪多而正少則導諛迎合者日至而忠言讜論落落乎難合矣其極也不止于難合將反爲邪所勝而正論愈榛蕪矣其何以爲國乎將見寖微寖滅蒼蒼者愈怒林林者愈怨而陛下孤立于上其爲憂懼又不止如今日矣臣所以涕泣妄言陛下未能消天變孚民聽服遠人者又皆邪徑未塞之所致也夫此二說其實一原果能秉一德則邪徑有可窒之漸茍不窒邪徑則反至于累吾之一德故曰惟在陛下眞知省悟而已臣曩侍經帷屢陳懇款嘗進心本不動之說而陛下欣然嘉納且有學者之襃今復以省悟之說啓陛下陛下試思省悟者誰歟不知省悟者又誰歟豁然明白了無凝滯此正陛下之本心也卽此本心坐照是非的然知夫晏安之心爲鴆毒美疢之不如藥石凡以甘言蠱我以逸樂投我者彼皆自爲富貴地耳一中其計于彼則利于我何益及乎危亡之迫乎其後自詒伊戚誰復分憂陛下省悟及此則知一德果不可以不秉邪徑果不可以不塞也昭昭矣雖然今當拯溺捄焚之時他無良策而獨持省悟之說毋乃迂乎曰人之未省悟也猶醉之未醒也夢之未覺也雖有良策亦安所施一省悟則醒矣覺矣良策乃可得而施矣然則目前之事姑聽其自敗自壊必待省悟而後救之乎曰隨事而救之不過一事而止耳今日衆弊膠轕禍亂方興何可以一事盡借使一害僅去一害又生源源方來夫豈智力之所能勝故莫若大正其本盡悟前非而今而後奮乾剛之勇毅然不屈于物欲開衆正之門確乎不牽于私意勿置其身于安平逸樂之地而常納其身于憂危恐懼之中念祖宗凜凜在天之靈則爲之長慮而卻顧懼國家岌岌不可保之業則爲之痛心而疾首覩萬姓有淪胥阽亡之憂則爲之食不下咽寢不安席罪已有眞切之意格天非虛僞之爲薄海内外皆知陛下昭然此心對越上帝然後大勢可囘大業可固非獨可以處暇也雖急而無以異乎暇之整非獨可以履常也雖變而無以異乎常之安此豈非一日省悟之機乎不然天下之事殆未可知而臣之涕泣恐未有已也披瀝忠肝不敢累牘惟陛下留神取進止䝉齋集巻七
