body:
  text: 䝉齋集巻一宋袁甫撰經筵講義易發題臣聞日月為易案此語本虞翻參同契注先儒黄澤嘗辨其字體之訛袁甫猶仍舊說有日則有月而日月不相離也日為陽月為陰有陽則有陰而陰陽不相離也陽為剛陰為柔有剛則有柔而剛柔不相離也何也為物不貳也惟其不貳故包犧氏畫為一一畫之義人以為陽而不知其非偏陽也人以為剛而不知其非偏剛也有一則有二自二而八自八而六十有四千變萬化周流不居故名之曰易陰陽剛柔悉該乎一畫之中大哉至哉故易三畫而成卦有天道焉有地道焉有人道焉畫雖三而道則一兼三才而為之主宰者其君乎而世之論君道者乃曰日為君象陽剛不撓常伸乎萬物之表所謂君道者如此而已然未足以知易之妙也何謂易之妙陰陽剛柔本不相離陽非偏陽也而有陰焉剛非偏剛也而有柔焉日昱乎晝而收斂歸宿在乎夜陽剛皆動而涵蓄潛藏在乎靜不睹不聞之地有黙觀密察之功則隨所發用自然陽明自然剛健故聖人善用陽剛上配天道萬古周流而無一息間斷在吾身則為喜怒哀樂未發之中而聲色玩好之娛自不能惑在宮庭則為閑有家之初而險詖私謁之心自不敢萌在天下則非獨君子登用而小人亦無失所之憂非獨中國乂安而蠻夷亦在化育之内是乃至陽眞剛而非偏陽偏剛之所能為也陰陽剛柔動靜之妙還相為本不見其始孰知其終不見其迹孰知其窮嗚呼夫是之謂眞剛夫是之謂一夫是之謂易臣得於父師者大旨如此敢為陛下誦之惟聖明采擇棘子成曰君子質而已矣何以文為子貢曰惜乎夫子之說君子也駟不及舌文猶質也質猶文也虎豹之鞟猶犬羊之鞟臣觀棘子成之言蓋見當時文弊之極矯枉過直之論欲盡棄文而純用質子貢以為君子之道則不如是蓋深病棘子成之言為太野故謂失言之不可悔猶駟馬之不可追也於是又從而發明之曰文猶質之不可廢質亦猶文之不可廢也若曰質而已矣何以文為則是虎豹之皮與犬羊之皮相似而無別耶聖人於禮樂則從先進答林放問禮則以為寧儉寧戚然至於論文質則取彬彬之君子而野與史無取焉蓋救弊則不得已而取其彼善於此論道則非全美盡善未可以為至也或曰處後世極弊大壞之時則如之何曰今之所謂質者非古之所謂質也茍且而已矣今之所謂文者非古之所謂文也虚偽而已矣茍且虛偽之弊合而世道日至陵夷不可收拾甚可悲也必欲復古之道其惟先尚質實而後加品節焉一掃茍且虚偽之弊而後君子之道幾矣子曰君子成人之美不成人之惡臣聞欲善惡惡人人所同此上帝降衷之良心也今語人曰汝為天下之善人則莫不躍然而喜推已欲善之心人之有善則必喜談而樂道之又從而左右羽翼之惟恐其美之不成也又語人曰汝為天下之惡人則莫不拂然而怒推已惡惡之心人之有惡則必哀矜而憫念之又從而訓誨正救之惟恐其惡之終成也此其用心洞洞乎其公也休休乎其大也是眞可以為君子人也乃若小人則反是人之有美惟恐其成也嫉之壞之而已耳人之有惡惟恐其不成也誤之陷之而已耳此其用心知有已而不知有人知有私而不知有公是眞可以謂之小人也嗚呼人主每病於君子小人之難察也豈知觀人之道不必觀諸他而當觀諸心人孰無欲善惡惡之心哉能視人猶已者則為君子不能視人如已者則為小人此觀人之法也季康子問政於孔子曰如殺無道以就有道何如孔子對曰子為政焉用殺子欲善而民善矣君子之德風小人之德草草上之風必偃臣觀季康子之發問而首以殺為言蓋謂無道為有道之害不加誅殺則害不除政不肅是固然也然良心善性人人固有導之以仁義齊之以禮樂自可使之遷善遠罪而又何以殺為易曰天地之大德曰生聖人體天地好生之大德以父母斯民欲善而民善以德而感德眞如風行草偃之易茍至於是則吾與斯人並生並育於覆載之間此乾道變化各正性命之功也而無所事乎殺矣雖然春夏之長養生也秋冬之肅殺亦生乎曰雪霜之威仁莫甚焉萬物歸根復命遇春夏復榮生莫大焉皋陶之告舜自帝德罔愆而下十四句皆生之謂也而獨有刑故無小一語則亦未嘗廢夫刑蓋生固德也而刑亦德也孟子所謂以生道殺民雖死不怨殺者季康子識不足以及此乃先萌一殺心其與天地好生之德大悖矣此孔子所以深排而力戒之曾子曰君子以文會友以友輔仁臣聞聖門所謂文者非詞華之謂也夫子曰文王旣沒文不在茲乎顔淵曰博我以文所謂文者卽道也彝倫之懿粲然相接者皆文也三千三百待人以行者皆文也孔子振木鐸於衰周正將以續斯文之將墜耳一時以文會友莫盛於洙泗麗澤之兌何往而非斯文之講習哉旣曰文而又曰仁同乎異乎曰文者其所著見而仁者其根本名異而實同也會之以文蓋所以輔吾之仁也聖人切切於求仁造次顚沛未嘗暫舍終食之間未嘗或違孔子告顔淵曰為仁由已而由人乎哉蓋言為仁專在乎反己巳不自力他人奚預焉今曾子取友以為仁亦曰輔之而已雖用力在已而又得良輔則切磋琢磨之益日增而克己復禮之功亦多助矣噫後世師友之道不明學者但知雕蟲篆刻破碎經旨以是為文所謂輔仁者漠然不知為何事平居旣無講貫之素一旦出而事君不仁而在高位斵喪國脈戕賊民命皆不仁者之為也為國家者果何賴於若人哉然則修明師友講習之學豈非人主之急務乎顔淵問仁子曰克己復禮為仁一日克己復禮天下歸仁焉為仁由已而由人乎哉顔淵曰請問其目子曰非禮勿視非禮勿聽非禮勿言非禮勿動顔淵曰囘雖不敏請事斯語矣臣按顔淵問仁孔子告以克己復禮夫具耳目口鼻四肢百骸而有此身此身本與天地相似與萬物一體如之何而克己曰己與天地萬物本無隔也而認八尺之軀為已則與天地萬物始隔矣故惟克己則洞然大公不見有已矣何謂克曰以艮卦所謂艮其背不獲其身行其庭不見其人觀之則是内不見已外不見物而克已之義瞭然矣克己何以能復禮曰禮者周流貫通乎天地萬物之間無體無方無不周徧人惟認八尺之軀為已於是去禮始遠茍不認已為已則天高地下萬物散殊皆禮也吾亦天地萬物中一物耳無往非禮而何有於已哉故不克己則禮失旣克己則禮復又發明之曰一日克己復禮天下歸仁焉玩一日字正所謂朝聞道也正所謂我欲仁斯仁至矣凡人昬昬於物欲之中如醉如夢一日勇決無牽制無拘滯無二三此身與天地萬物了無阻隔人卽已也已卽人也天地萬物皆非形軀之所能間也故曰天下歸仁焉言天下皆在吾仁之内也禮之復也非是外復仁之歸也非是外歸本一而非二也又發明之曰為仁由已而由人乎哉前之已而曰克此之已而曰由豈有二已哉曰非有二己也塵去鑑明而即此鑑也雲消月皎而即此月也未克己之前雲也塵也皆蔽我累我者也烏可以不克既克己之後月也鑑也本如是光明本如是瑩潔動靜闔闢變化運用何所不可故曰由言為仁在我而已豈由他人哉顔淵旣領會夫子之大旨而猶問其目者蓋聖門師弟子之間學聚問辨不造其極不止也克己復禮特大綱耳又有餘目焉所以再叩夫子夫子舉視聽言動四者告之蓋四者即已内事也已視已聽已言已動皆已也然微有非禮則是為已所蔽也為已所累也夫惟非禮則勿視非禮則勿聽非禮則勿言非禮則勿動無斯須頃刻不在禮中則是耳目鼻口心知百體皆由順正以行至此尚何已之足累哉顔淵即慨然承當此任曰請事斯語事云者言從事於此也聞聖言而不能行者不足以言事矣嗚呼顔淵陋巷匹夫耳聖師勤勤啓發猶有天下歸仁之言況人主奄有四海必欲人人皆歸吾仁可不奮一日克己之勇置此身於禮度之中哉如曰此事由人而不由已則雖聖人亦無所用其力矣仲弓問仁子曰出門如見大賓使民如承大祭已所不欲勿施於人在邦無怨在家無怨仲弓曰雍雖不敏請事斯語矣臣觀夫子答仲弓問仁與答顔子之意一也說者但知夫子告顔子以克己復禮而不知告仲弓者亦克己復禮而初無異旨也禮器曰一獻之禮不足以大饗大饗之禮不足以大旅大旅具矣不足以饗帝夫大祭之禮至於饗帝則無以復加此可以觀禮矣仲尼燕居曰兩君相見揖讓而入門入門而縣興揖讓而升堂升堂而樂闋下管象武夏籥序興陳其薦俎序其禮樂備其百官如此而後君子知仁焉夫大賓之禮至於兩君相見則無以復加此又可以觀禮矣此章所謂大祭大賓者皆禮之盛也一出門之間而儼然如見大賓一使民之際而肅然如承大祭當是之時此心之清明靜瑩為何如哉故曰如此而後君子知仁焉而春秋左氏傳載臼季之言亦曰出門如賓承事如祭仁之則也由是言之仁禮本一源禮在是仁即在是矣而人之所以不能動合乎禮者何也有我之私累之也人有不欲而施於我我必有所不平我有不欲而可施於人乎通人已為一則已之所不欲人亦不欲也非人之所欲者斷斷乎不可施於人如是則此心洞然大公了無間隔施之於家邦人人在春風和氣之内而又何怨之有然則勿施不欲即克之謂大祭大賓即復禮之謂而邦家無怨即所謂天下歸仁夫子之告仲弓即其告顔子之旨也囘雍皆在德行之科足以傳夫子之道故雍也請事斯語亦奮然承當與顔淵一同熟誦此章深味厥旨於無怨一語尤當玩索蓋怨不在大亦不在小小人怨汝詈汝則皇自敬德為國家而使一夫有怨心則足以感傷和氣矣欲人之無怨惟仁者能之而為仁之要不外乎克己復禮聖人垂訓萬世其明白的切如此經筵進講故事周威烈王六年齊威王召卽墨大夫語之曰自子之居卽墨也毁言日至然吾使人視卽墨田野辟人民給官無廢事東方以寧是子不事吾左右以求助也封之萬家召阿大夫語之曰自子守阿譽言日至吾使人視阿田野不辟人民貧餒昔日趙攻鄄子不救衛取薛陵子不知是子厚幣事吾左右以求譽也是日烹阿大夫及左右嘗譽者於是羣臣聳懼莫敢飾詐務盡其情齊國大治彊於天下臣謂齊威王烹阿封即墨之事人特見一時威權之奮發耳不知平日密察之功蓋有素也於即墨則曰吾使人視即墨於阿則曰吾使人視阿威王不輕信毁譽之說而必謹擇夫寄耳目之人其人果可信也吾然後使之是故賢否一定而賞罰不差近者朝廷有計田收券之令臣奏疏凡三四甚為陛下惜此一舉何則科斂無名搖動人心非美事也況今日任牧民之寄者大而郡守小而縣令誰懷視民如子之心緣傍此令朘削脂膏姦胥黠吏又縱尋斧焉本根之傷多矣臣嘗於經筵舉威王之事為陛下反覆言之以為任陛下之耳目者在内則臺諫在外則監司陛下所使為臺諫監司者誠如威王之使人視阿即墨瞭然如見之目前而赫然加賞罰焉則封者無愧而烹者亦甘心矣如陛下一出此令之後聽諸路之守令肆其欺誕任其推剝惟求取辦於一時不顧元氣之日耗臣竊為寒心焉强敵攻支體於外而陛下又自戕腹心於内厥今論者俱知敵人之可畏而不知履畝之令自生一敵可畏尤甚若陛下寄耳目之人蚤夜密察吏不得肆其姦尚庶幾焉不然殆哉太祖高宗創業中興艱難甚矣陛下其無忽漢元帝永光五年太子少傅匡衡上疏曰臣聞治亂安危之機在乎審所用心傳曰審好惡理情性而王道畢矣治性之道必審已之所有餘而强其所不足蓋聰明疏通者戒於太察寡聞少見者戒於壅蔽勇猛剛强者戒於太暴仁愛温良者戒於無斷湛靜安舒者戒於後時廣心浩大者戒於遺忘必審已之所當戒而齊之以義然後中和之化應而巧偽之徒不敢比周而望進惟陛下戒所以崇聖德臣觀匡衡所陳其戒雖有六而切於漢元帝之身者二條而已一曰無斷二曰後時蓋元帝之天資仁愛温良者也湛靜安舒者也仁愛温良者乏剛明果斷之操湛靜安舒者無奮迅振作之風遂將賢否混淆邪正雜糅漢業之衰端由於此衡不能挈此二戒懇切言之使元帝豁然感悟改過遷善而乃混六條之中以聽人主自擇衡亦不善於格君矣當是時貢禹之徒不力救優柔之失而徒以甘言游辭求合人主意此固不忠之甚者劉向上疏慷慨激切其言曰執狐疑之心者來讒賊之口持不斷之意者開羣枉之門可謂深中膏肓之病矣然亦有遺憾焉孟軻曰人不足與適也政不足間也惟大人為能格君心之非君仁莫不仁君義莫不義一正君而國定矣當元帝時筦中書典樞機者其人其政大略可覩然奚必屑屑然較勝負於此哉君心之本原未正而欲挽囘於末流固宜戛乎其甚難也獨匡衡能從其用心治性而箴之然所言駁而未純泛而不力嗚呼漢儒病在不學耳使果有孟軻之學何患不能正君而國定哉匡衡劉向號為名儒卒不能有格心之業使天下謂儒無益於人之國儒果無益於國耶讀史至此為之掩巻三歎前漢元帝紀贊曰帝少而好儒及卽位徵用儒生委之以政貢薛韋匡迭為宰相而上牽制文義優游不斷孝宣之業衰焉臣今月初九日獲侍清光於經筵陛下舉漢元帝好儒故事玉音云論者謂元帝特未得眞儒而用之耳如得眞儒而用之何患牽制文義優游不斷耶此論甚佳卿以為如何臣奏聖學高明如此可為宗社慶可為善類慶大凡眞儒固鮮而識眞儒者尤鮮譬之玉焉眞玉未必無瑕人見其瑕也遂輕棄之不知雖曰有瑕不害其為玉何可棄也若石而無瑕不過石耳又奚足貴人才亦猶是也眞賢實能豈無微過惟識眞者不以小疵掩其大德如使寸寸而量銖銖而較則眞儒不以小瑕而棄者幾希此惟在陛下明知人之鑑以洞燭人才之底蘊而已矣陛下欣然嘉納臣退而思之尚有未盡之遺論焉當元帝時劉向之剴切蕭望之之剛正雖未足為古之儒就漢世言之亦可謂儒之眞者矣元帝非不知二賢之可用也向數有論奏深當上心則曰君且休矣吾將思之望之為師傅帝知其經明行修材任宰相夫旣心知之則當篤任其人旣曰將思之則當力行其言然向之精忠終不能奪王氏盜竊之權而望之一為恭顯所陷恥以其身就吏寧死而不悔嗚呼曾是而謂元帝好儒可乎論者謂帝特不得眞儒而用之故有優游不斷之失不知有儒如劉蕭尚且外為尊敬之貌而内無信用之實卒使抱恨以終其身假令得古之眞儒元帝能用之耶然則人主之病莫大乎柔弱柔弱而不斷則左右小人乘間投隙變亂是非君子不得一日安於朝廷之上此則漢元帝膏肓不治之疾而非漢無眞儒之所致也有天下者尚鑒茲哉唐太宗貞觀三年謂房𤣥齡杜如晦曰公為僕射當廣求賢人隨才授任此宰相之職也比聞聽受辭訟日不暇給安能助朕求賢乎因勅尚書細務屬左右丞維大事應奏者乃關僕射臣謂太宗以宰相親細事則不能助朕求賢蓋光陰迅速而精力有限以有限之精力而耗於迅速之光陰用之於細事則必不能專心於求賢此必然之理也近者兩相竝命庶明勵翼陛下親灑御札從右揆之請使自丞相以下以及百執事各勤修職業於本局寅而入未而出誠率勵羣工之要務然臣區區之意謂可以革向來百官怠惰茍且之弊耳若夫為宰相者僅了細務於朝堂而未能同心協慮助陛下求賢此乃太宗之所深慮而未可為今日喜也夫以房𤣥齡杜如晦號為唐賢相猶且區區於目前之細務而未能專以求賢為急太宗於是以事之小者使尚書左右丞當之而大事乃關於僕射此令一出為房杜者何所辭其責哉甚矣求賢一事至難盡也拘攣者不能越常度輕易者不能精選擇私意多者先親故而後孤寒忌心勝者樂輭熟而妒忠直此求賢之所以難也間有高蹈丘園不屑軒冕者亦當汲汲焉苦心刻意致敬盡禮必欲其為時一出既得之矣又必度其才能之所堪與其職任之宜稱使犂然當於天下之心然後能收求賢之實效固非曰一人舉而遽用之一人毁而遽棄之也昔周公之為輔相也執贄而見者以千百計周公不憚吐握之勤以身先天下士故得士為盛今者晨入堂而出已迫暮其所賓接幾何人哉捜訪不廣則聰明壅招延稍怠則譏議起眞賢恥於自售而求售者多佞人戛戛乎其難也臣望陛下明詔二三大臣不惟退堂之後宜盡求賢不倦之意其會於堂也正當各以所聞所見某人為賢某人為才某人宜居某職某人宜任某事開心腹露情愫相與講明問辨以盡其所懷日日如是則一日得一日之人才月月如是則一月得一月之人才廟堂或未能盡識則當進侍從之臣相與開廣而究極之講明既盡則進而告君豈復有衡鑑不審是非易位者哉今之所謂進擬者亦略近此意然規模狹而不廣意向私而未公所以用人雖多而得人甚鮮者正坐此耳舍之不務乃一切諉之曰今世乏才韓愈有言其眞無馬耶其眞不知馬耶臣亦曰其果乏才耶其乏識才者耶願陛下與二三大臣更加之意唐太宗時魏徵每犯顔苦諫或逢上怒甚神色不移上亦為齊威上嘗得佳鷂自臂之望見徵來匿懷中徵奏事故久不已鷂竟死懷中又嘗與王珪語有美人侍側上指示珪曰此廬江王瑗之姬也瑗殺其夫而納之珪避席曰陛下以廬江納之為是耶非耶上曰殺人而取其妻卿何問是非對曰昔齊桓公知郭公之所以亡由善善而不能用然棄其所言之人管仲以為無異於郭公今此美人尚在左右臣以為聖心是之也上悅即出之還其親族臣聞唐太宗非不談仁義親君子然而緣飾之意多眞實之誠寡觀其鷂死懷中也若有畏憚之心及其論廬江王妃也初無忸怩之色一聞王珪之諫乃能飜然而改太宗所以興唐者賴有此耳然而未足以語謹獨之學也陛下天稟精粹上嫓堯舜所謂過言過行固己一毫無有而臣區區愚慮竊以為誠之一字猶有所未盡夫無矯飾之謂誠無間斷之謂誠臨朝則莊退朝則肆肆出於眞而莊由乎强此矯飾也可謂誠乎親賢人儒士則難親宦官女子則易難者親之時少而易者親之時多此間斷也可謂誠乎臣在經筵嘗對陛下啓問退朝入宮之後果何所為陛下語臣曰或觀書或作字或覽四方章奏臣不勝欣喜以為陛下果無暇日也而聞之道路則謂陛下猶未免溺於酒色之娛夫剛制於酒未見好德如好色聖經明訓皎然不誣陛下何不堅忍力行勿以無益害有益乃若左右􅉏近之人假公徇私者尤不可不戒履霜堅冰至為可畏防微杜漸所當致謹陛下語臣皆正大之論而退攷其所行乃有未盡然其與唐太宗雖有畏憚之心而初無忸怩之色者何以大相過哉願陛下以堯舜禹湯為法兢業戒懼無時怠荒則德日進而業日隆矣有唐之事又何足云唐德宗大厯十四年以崔祐甫為門下侍郎同平章事初至德以後天下用兵諸將競論功賞故官爵不能無濫及永泰以來天下稍平而元載王縉秉政四方以賄求官者相屬於門大者出於載縉小者出於卓英倩等皆如欲而去及常衮為相思革其弊杜絶僥倖四方奏請一切不與而無所甄別賢愚同滯崔祐甫代之欲收時望推薦引拔常無虛日作相未二百日除官八百人前後相矯終不得其道德宗嘗謂祐甫曰人或謗卿所用多涉親故何也對曰臣為陛下選擇百官不敢不詳愼茍平生未之識何以諳其才行而用之上以為然臣聞用人之大弊有二其始皆以善用之而其流乃至於大不善不可不察也何謂大弊有二或失之寛或失之嚴失之嚴者繩墨太謹而無翕受兼容之量失之寛者規模太廣而有不避嫌疑之譏茲二者俱未能無弊也常衮為相承賄賂公行官爵冗濫之餘慮無以振頽綱而挽狂瀾故矯之以嚴崔祐甫代之懲衮之狹隘而賢智有鬱抑之歎故復矯之以寛夫矯之固善矣其奈嚴者拘而寛者縱知矯他人之弊而不知己自墮於一偏之弊故史之論衮雖嘉其杜絶僥倖而又謂其賢愚同滯則是倖門雖窒而正路未闢太嚴之害固應如是耳祐甫欲收時望作相未二百日除官八百人一時寧不甚快然攷其所用多涉親故前後相矯一弊去一弊生豈非矯枉太甚之過乎善哉司馬光之論曰用人無親疎新故之嫌惟賢不肖之為察又曰已不置毫髮私意於其間蓋私者天下之大蠧也不避親故之嫌者固私矣親故果賢以嫌而不用者亦私也遠嫌畏謗者固私矣必待已之所素識而後用之者亦私也何者俱未能克己故也擇人以代天工烏有所謂已哉茍以公為心當用則用當捨則捨付諸天下而已何預焉三代王佐事業遠矣諸葛亮其庶幾乎郭攸之費褘董允向寵之徒森布朝列一時得人可謂盛矣然亮未嘗以已意而私黜陟也廖立李平用公論斥之而深足以折服其心雖遭廢棄略無怨色非無私何以能若是史臣評之曰開誠心布公道盡忠益時者雖讎必賞犯法怠慢者雖親必罰吁若亮之相業又豈衮與祐甫之所能及哉仁宗皇祐元年以知青州富弼為禮部侍郎初河北大水流民入京東者不可勝數弼擇所部豐稔者五州勸民出粟得五十萬斛益以官廩隨所在貯之擇公私廬舍十餘萬區散處其人以便薪水及流民將復其業又各以遠近受糧凡活五十餘萬人上聞之遣使慰勞就遷其秩弼曰救災守臣職也辭不受前此救災者皆聚民城郭中為粥食之饑民聚為疾疫及相蹈藉死或數日不食得粥皆僵仆名為救之而實殺之弼所立法簡便周至天下傳以為法臣竊謂區處流民之䇿惟富弼之法最為簡要所謂簡要之䇿惟曰散處其民於下而總提其綱於上而已竊聞金陵諸邑流民羣聚皆來自淮西荷戈持刃白晝肆掠動輒殺傷沿江出兵驅之其在句容之境者軼入金壇若宣城若池陽若當塗所在蟻聚剽刦成風逃亡之卒皆入其黨江南姦民率多附和目前勢已若此冬杪春初日月尚長蔓延不已各將潰裂四出不可收拾臣愚欲乞朝廷行下督府及諸閫與凡安撫總漕諸司作急措置自一路而推之諸路由諸路而推之諸郡每處流民隨所在分之凡贍養之費惟分則易供居止之地惟分則易足此非臣之臆說也弼擇所部五州勸民出粟得五十萬斛益以官廩隨所在貯之又擇公私廬舍十餘萬區散處其人以便薪水弼之所作可謂委曲詳盡矣今日果能推行此䇿非但勸民出粟而已或撥上供之數或撥樁管之錢或乞科降則上下當相親如一家或請團結則彼此當聯絡為一體而所謂團結者又不止一途而已能勞苦者庸其力有伎藝者食其業其間有為士者則散於庠序為商者則使之貿遷心有所繫而姦無所萌此皆分之説也分之愈多則養之愈易而其要在督府制閫以及總漕諸司為之領袖而已是故民貴乎分而權貴乎合所謂散處其民而總提其綱者正謂此也臣願朝廷備降富弼法施行使長吏任責一如青州故事流民幸甚宗社幸甚元祐元年司馬光言朝廷詔近臣舉可任監司者待其不職亦可并坐舉者呂公著曰亦須執政審擇光曰自來執政只於舉到人中取其所善者用之韓維曰今不先審察待其不職而後罰之甚失理義公著曰除用多失亦由限以資格維又言光持資格太謹光言資格豈可少維曰資格但可施於叙遷若升擢人才豈可拘資格臣聞國朝之置監司深得漢元封置部刺史之意劉安世嘗極論之以為秩低而權重秩低則其人激昂自進權重則得行其志此良法也祖宗盛時中外乂安州縣奉法田里無事實由監司得人之故稱為青齊福星者不特鮮于侁一人而已蓋監司與他官不同天下郡縣之吏朝廷除授豈得人人而察之寄按察之權於監司是擇監司者所以擇天下之守令也臣久在外服麤嘗諳歴大率監司之選必清威有時望而後足以激懦習必强敏有風力而後足以糾官邪必曉練有精神而後足以察奸弊此等人才眞未易多得欲諸路監司俱得若人必不拘資格而後可臣於呂公著韓維之語實深有感焉以元祐盛時可謂賢才彚征之會而監司之任尚有除用多失之憂何哉蓋懲王安石用資淺之人專以資格為重故也司馬光之言曰安石執政始置提舉常平官又增轉運副使判官皆選資淺輕俊之士為之夫安石專用輕俊之士固不可茍有持重知大體聰明識時務而資格未至者可坐視民生之愁困世道之陵夷而不亟選用之乎維之言曰資格但可施於敘遷若升擇人才豈可拘資格斯至論也今日楮輕物貴役重賦煩兵驕民窮冦盜間作求治之要莫切於擇監司而擇監司之要不當專限以資格漢部刺史以秩低而取之正以此耳今眞才實能每有拘閡而不獲用乃甘心取夫輭熟茍且者而責之以攬轡澄清之舉則宜其廢職而害民也臣願陛下深思祖宗置監司之意玩繹呂公著韓維之言明詔大臣妙選賢明監司勿盡限以資格使之分布諸道以振紀綱以銷禍亂不勝幸甚䝉齋集巻一
