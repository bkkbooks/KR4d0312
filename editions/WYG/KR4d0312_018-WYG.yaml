body:
  text: 䝉齋集卷十八宋袁甫撰誌銘承奉郎朱君墓誌銘交際主義尚矣與其子厚敬其父義也紹定中某持江左倉憲節五年待賓僚如一家有迎親来者致禮加敬青陽尉朱冠之名元龍敏而篤學檄入幕聞其父承奉君老成有氣概不知其就養也弗及見已而欲見則已歸後聞以疾卒元龍請銘義不得辭謹諾之以志吾過君諱適之字子正婺之義烏人曽祖宗茂祖邦彦父昌俱潛德弗仕君幼孤母胡氏俾就師晝夜刻苦委已于學戰場屋左次不咎有司洎二子預薦書君遂不復作仕進想每為人道貴孝友終身色養敬謹匪懈姊病而館于家奉嫠嫂如兄存哀諸姪而字焉治家肅整以嘻嘻為戒伏臘裕矣益帥先崇儉獨賑窮乏無靳色歉嵗設糜食餓者發廩平價以利民瘞遺骴飯羸囚苦節樂施皆此類元龍登進士第青陽及瓜欲迎侍固請乃許縱覽九華愛此竒觀居無何浩然賦歸元龍秩滿為理掾東江又以請曰吾聞部使者仁賑荒恤寃汝悉贊而長獄無濫民不饑父志願畢矣奚事偕往噫奔走聲利日夜不肯休世俗滔滔皆是子禄養尚倦游肯曳裾侯門乎儀狀脩偉與人交皆與其善過面斥之愚民為彊悍屈慨然出力捄解雖召謗不悔孔子稱人之生也直君實有焉君生于隆興甲申八月乙夘卒于端平甲午己未其明年十二月丙申葬于繡湖之西原君兩該恩封承奉郎娶陳氏封安人子男二人長元龍也奉議郎知處州縉雲縣事次桂發浙漕貢士孫男四人幼成幼聞幼特幼敏孫女五人曽孫女一人銘曰柏以堅保嵗寒竹以直拂雲端嗟俗迷諂而隨視夫君顔忸怩大于門義方存我作銘詔後昆東巖老人鄭君墓誌銘乾淳間美材出儒風盛士恥獨學謏聞父愛子延碩師擇直諒友甚已饑渴自儒先凋零斯道湮鬱學者甘心孤陋世推真師友亦罕焉緬懷乾淳撫几太息一日舊僚趙克家持鄭君少宏行狀来乞銘余攷師友淵源多從諸老先生游而定城令許君中應君宗卿錢君文子則專師也内表正節李侯敬之友也李侯學出東莱呂成公君涵濡薫染行端方學刻苦前賢格言大訓探微鉤隠窮晝夜不懈性輕財重義士友至于我館資糧乏于我助嵗大祲發私積貸鄉鄰歸逋如期慨焉焚劵遇族婣之死喪孤遺者周給之有品節而誨其子若弟孶孶無厭斁奬善救失親黨畏慕焉迹其行事破藩牆均人我師友漸摩驗矣君諱良朋少宏字也世為婺之東陽人曽祖振祖壽考紹庭皆有潛德考不娶蚤世仲姑為李氏婦正節母也君實自出焉祖母九十餘老疾勤視養喪致哀毁時祀輒嗚咽流涕子女滿前授詩書示嚮方晩課諸孫戒曰我誨爾望爾孝也孝不必榮以禄在守先志我不辱先矣爾學殖落猶我辱也有味其言綽乎乾淳遺風矣君生于紹興辛巳二月六日卒于端平乙未五月十有二日越明年四月丁酉葬于邑東五里岡之原娶王氏司農卿亶之孫女先君七嵗卒今合葬焉生五男子思睿早歿思義思順思忠思儼俱業進士而思順以京學生該免舉恩三女文林郎監建康府大軍倉趙必遞從事郎新監江東轉運使寄納倉陳秀發宣教郎新差知處州慶元縣喬適孫其壻也孫男六滋昭與恕怡宜女八壻進士曹仲寛趙與遷宗學生趙與鎏餘未行余與君無雅素師友皆端人信端也矧克家請不已乃為之銘曰東陽之東有山鬱蔥東巖老人于焉從容一室委心齊家雝雝古稱不朽豈伊顯融非榮之榮不逢而逢命名東麓相國肅公過者興敬師友之功承務郎致仕洪君墓誌銘端平二年余為柱下史舊友洪季思名夢炎以桃源酒官入郡幕父年登八十余升堂謁見婆娑燕愉意福夀未艾是嵗九月辛巳以疾卒于正寢明年冬十月甲辰葬夢炎請銘辭甚哀曰夢炎不幸王事馳驅父病不能嘗藥沒不能視含死有餘罪余曰父教之忠子遵父訓道也且余目擊其事有三夏五月禁旅閧子受廟堂命撫定告于父父曰奮身為國吾何憂教忠一也秋七月復被高沙撫叛之旨父曰汝全活一城毋辱君命教忠二也未幾差㸃檢沿江戰艦覈實荆襄守備子力辭父曰朝廷謂汝才曽未三月由監當而屬官由屬官而掌故今邊事繹騷奈何避事教忠三也嗚呼真足以厲臣子之節矣是宜銘謹按洪氏系出豫章唐末徙嚴之淳安族大以蕃派居梓桐鄉養村里六世矣君諱琠字叔瑜曽祖孜祖彦正俱潛德不耀考師騫漳州軍事判官累贈中散大夫妣邵氏繼胡氏俱贈令人君幼警拔出語驚人中散公歿事母孝一日母思食魚走溪滸求弗獲忽雙鱗躍出取以進語子女曰始吾疑王祥臥冰近誣今信矣兄琰弟璞同入上庠同登庚戌第君詞藝不後二難戰場屋左次則專意課子夢炎以春秋試南宫有司攷定首選俄列後名士論惋惜君幸有子成立益以詩書自娛性剛勁守廉隅辨是與非聞者心惕晩更和易毁譽不掛口居里閈施藥以療疫平糴以賑饑死無歸者瘞之值慈明太后錫類恩封京秩平生著述若干卷藏于家娶方氏以禮相夫子内外斬斬鄉人教女若婦必舉以為法先君五年卒葬于所居里之朱砂塢君合葬焉葬之日賓客㑹者數百人執杖而導從者數百人穉耋之泣送者且千人三男子長夢林季夢珏仲則夢炎也二女甲戌進士故婺州録事參軍方淳士人吳從龍其壻也孫男女各三人曽孫男一人銘曰事君不忠非孝也雖有離憂志樂也弗力王事滔滔皆是視此教忠寧不愧恥宜人趙氏壙誌宜人趙氏諱希怡曽祖諱子英朝議大夫祕閣修撰累贈金紫光禄大夫祖諱伯淮宣議郎通判黄州累贈中奉大夫考諱師淵朝奉郎太常丞兼國史院編修官實錄院檢討官自號訥齋妣呂氏贈安人丞相忠穆公之孫中原喪亂修撰官四方因家于台之黄巖訥齋當代端人與先正獻公為友宜人年二十有七歸于我天稟高潔無宗女習氣魏國夫人不逮事事正獻公孝謹余小有過差宜人輒愀然不樂嘉定八年余廷對叨第一宜人箴規益切歴官中外家務一髮不掛懷戮力王事宜人助也端平元年余以祕書少監召二年遷起居舍人兼攝詞垣吏銓宜人見余有所論駮與時落落每歎息曰歸歟既屬疾語余亦如是十月一日辛巳卒于官舍享年五十有九次年十有一月丁酉葬于慶元府鄞縣陽堂鄉陳㠗之原子男二從將仕郎次徯宜人奉已儉與人周襟度曠然時時諷誦詩書他美甚衆不盡録録其夙夜警戒相成若古賢妃貞女者而納諸壙悲夫馮君振甫墓誌銘慈湖楊先生發明先聖知及仁守之訓有大功于吾道誘掖後學許與固多至其稱二馮兄弟振甫國壽咸有所啓發驗諸躬行果不負先生許可國壽蚤亡振甫晩益融貫表裏洞然知及之矣進于仁守矣余持節江左興建象山書院延振甫為堂長四方學子来集振甫朝夕訓警懇至切到語自肺腑流出羣士信嚮雖負雋拔敏贍之才者一聞振甫講說大旨卻立拱手曰馮堂長我師也道本無言言非可傳道振甫學問鑿鑿真實忠信篤敬毫髮無偽感人悟物蓋超于言辭之表學者未熟稽古書未更歴事遽親炙慈湖先生之教往往意自揣摩承襲訛舛振甫于書無所不讀履踐又有深功每聆誨言不待揣摩神領心㑹傳先生之道最端的無差自國壽死余為吾道氣脈憂賴有振甫今又亡矣正學凋落云胡不悲振甫之亡也實嘉熙改元八月十有九日享年六十有二其孤將以己亥六月庚申奉君之柩殯于金川鄉㑹芳㠗之原泣請銘余不得辭君諱興宗振甫其字也居慶元之祠溪七世矣曽祖諱有義祖諱敏功考諱奉先妣李氏振甫亦娶李氏二男子長祖授次祖詒後國壽三女越士高彌大迪功郎監温州瑞安縣雙穗買納鹽場袁庸里士伍純仁其壻也銘曰道無方體先天地生孔聖有訓參前倚衡振甫黙識仁守兢兢百世之下尚欽此銘縣尉楊君太孺人何氏墓誌銘吾鄉城南楊氏最盛先正獻公絜齋先生久處其家塾子弟多秀士服習詩書頡頏場屋聲譽大振子美在羣從中以才稱雖未嘗從先公遊耳目濡染熟前輩風流藴藉攷平生行事不與俗子類尚氣誼重然諾喜賙人急不矜已功師友漸摩有自来矣君諱璘子美字也世為慶元府鄞縣人曽祖諱景舒以行義著聞鄉閭檢正王公庭秀為賦碧鮮亭詩子璧實誌其墓祖諱萃温温儒雅聘三山鄭屯田為塾師攻媿樓宣獻公兄弟俱来學邦人至今以為美談考諱公亮蚤嵗入成均四舉禮部不售妣朱氏娶何氏諱靜恭大理寺丞涇之孫通議大夫楷之女今集英殿修撰侍郎炳之女弟也紹定四年該皇太后慶壽恩封太孺人三男子應霆兩浙轉運司進士宗卿太學免解進士宗琰蚤亡女四人迪功郎温州平陽縣主簿諸葛壽朋朝散郎主管建昌軍仙都觀程士龍儒林郎泰州軍事判官林思孫其壻也次女許承奉郎魏㠓前夭孫男二人起巖習進士業起翔太學生應霆泣謂某曰先君之歿迂齋樓先生狀其行而墓碣未立今母氏又歿將以二年十一月丙申奉柩窆于桃源鄉西山合先君之兆敢請銘某謂迂齋發揮幽潛至矣奚用贅然余觀舉世患乏才才其真乏也耶國易治家難理能使一家之中綱紀繩繩内外斬斬斯為實才也已君治家事從容裁制動中節㑹廢者植仆者興疏者密薄者厚親朋居無廬于我館食不繼于我廩嫁孤女之無歸喪不能舉者斂埋焉急義疏財一無所靳而尤以孝行為本奉母惟謹左右無違飲食必擇所嗜敬進之祖塋精舍題扁未立時寧宗皇帝以皇孫毓德潛邸翰墨精妙鄭先生為僚東宮遂為之請寧宗欣然親灑青山繼德菴五大字以賜累世塋域堅壯周備生事死葬兩無愧怍開禧初邊陲俶擾縣官以乏興開入仕之門君慨然曰體國固吾素志授迪功郎調台州黄巖縣尉尋以恩轉從事郎君治民戢盜俱有方略誅鋤奸猾興修邑庠捐已財新尉廨秋毫不出于民此皆卓卓可紀觀其處家莅官豈余所謂實才者非耶君年纔五十有六而卒寔嘉定六年八月戊寅也後二十有五年嘉熙改元十月辛夘太孺人卒享年七十有六太孺人姿敏惠父愛之尤教以孝經論孟詩書左氏傳及内則女誡終身不遺忘性恥華靡被服簡澹相夫子以禮切磋如良友君既歿延師誨子必期成立值庚辰鬱攸之變再營廬舍戒二子無過侈傷吾儉尚友堂圮久未復愀然曰此高曽麗澤地可湮廢乎二子承志葺治重還舊觀嫠居寖久家法嚴整如一日婦道母儀可謂兩得之矣余既多楊君行事又讀迂齋狀謂崇陵違豫主鬯未立君伏闕上書累數千言使人興敬而太孺人又有賢行夙夜相成追古遺風是可銘也已銘曰楊氏先世厚德所萃蓋為子孫留方寸地夫君特起布衣論事奈何忠言報罷莫遂負此偉竒家道小試内外綱維人愛且畏推以澤物巖邑一尉琴瑟靜好儷美無二西山之藏瞻彼薈蔚勿隳德基詔爾後嗣林府君周夫人墓誌銘嘉熙二年春宣教郎提舉行在雜賣務雜買場林君嘉會以書諗予乞銘其考妣之墓謹按府君諱思哲字仲文其先三山人後徙温又徙處之松陽逮府君八世嘉定三年卜居暨陽之梅山曽祖惟周預三舍選祖摐考中弼俱潛德不耀府君性嗜書不治舉子業擇聖賢格言大訓諷詠服膺飭躬閑家與物無競肫肫然謹厚長者也同里周君溥聞其賢以夫人歸之夫人年纔十七端莊沈靜不妄語笑家素貧惟以訓子為急晨起府君入家塾講授經史夫人夜課之榘矱尤嚴諸子俱業進士嘉㑹遂擢第奉常冠乙科先是府君語嘉會曰吾年未耄而健忘非久人世者但欲見汝成立慰我志耳尋果以疾卒若前知者寔嘉定十三年八月丙戌也享年六十有四次年十月庚午葬于清潭山之原夫人晩嵗益康强兩該恩霈封太安人嘉熙改元嘉會宰婺之東陽改倅通州未上徑躋朝列親黨榮之夫人澹如也蓋其志在厥子植立門戸匪徒慕爵禄耀光寵而已次年正月戊午卒于中都之寓舍壽八十有二將以四月丁酉與府君合葬焉四男子長嘉謨次嘉會也次嘉謀嘉猷嘉猷蚤世一女適進士周恭先孫男五人登孫鎮孫承孫鉞孫鑑孫女八人曽孫男一人女二人某曩將指江東寔與嘉會同寅因子之賢知嚴父義方之自抑知賢母之教為有助也然則非余誰宜銘銘曰夙夜相成琴瑟靜好蒼天蒼天曷不偕老雖不偕老有子承考子兮孫兮光我家道提刑祕閣程公墓誌銘嘉熙二年中奉大夫提舉紹興府千秋鴻禧觀程公諱榆告老于朝天子俞其請進直中祕以寵嘉之鄉之士大夫用漢元德唐貞曜本朝明道故事號公為安節蓋公退居山林十有餘年安節之名不忝矣孟子曰聞伯夷之風者頑夫廉懦夫有立志范文正公記嚴子陵之祠亦曰先生之風山高水長嗚呼來不知所從去不知所往而自能槖籥萬物者其風之妙乎公之言行有家傳行述記載明備而公之子沐又乞銘于余余惟錄其細沒其大非銘體也蓋公平生大致不為勢利屈超然獨立風塵之表自嘉定大臣已落落不茍合至鄭丞相當國尤屹然決無阿附意寧芒鞋野服蹈丘園玩泉石以終其身然則天子之襃嘉鄉士之推尊聞公之風者可以廉頑立懦而與山高水長相為無窮矣公字森之處州松陽縣人曽祖起祖曥考大雅贈宣奉大夫妣葉氏楊氏俱贈淑人公登紹熙四年進士第歴徽州績溪縣主簿監建康府北酒庫知信州玉山縣通判慶元府知金州提㸃廣南西路刑獄既奉祠里居一字不入脩門洎屬疾亦不以死生動毫芒嘉熙二年六月二十有二日卒于正寢享年六十有八娶陳氏參政越國公之女先公二十七年卒繼葉氏既歸之二年亦卒俱贈淑人子男一即沐也文林郎監行在省倉中界門女適浙漕進士葉東新撫州録事參軍張忱進士陳炳文孫男鑄將仕郎以是嵗十一月甲申葬公于縣之移風鄉紫山名義為國之大閑也廉恥立身之大節也綱常不明利欲横流撤大閑隳大節他美莫贖故余于公之出處獨表彰其大者至于為邑為州如古循良將指如古膚使力扶風教受知儒先懿行嘉言不可殫述皆自其大者發之而余又知公之植立非但天資乃學力也余每與沐講論經義歸必告乃翁輒欣然領會其意屬余大書其堂曰中庸公益喜憾相得晩戒沐朝夕觀省勿忘然則余之知公與公之自知豈徒素隠行怪後世有述而已哉余嘗為言滿天地間莫匪中庸人謂公以不仕為高孰知所得乃在乎此使時見用其不為沮溺明矣乃系之銘曰嗟芷蘅兮芳自吐耿離憂兮心獨苦臥故山兮幾寒暑非避世兮時不用抱中庸兮炯千古子子孫孫兮事斯語撫機闗君安人郭氏墓誌銘余雅聞闗仲山之名未覿面也而狀君之行者乃林君伯翰伯翰余所畏言足以傳信矣其略曰君諱􅩈字仲山先世居青社五代之季有避地會稽者子孫遂家于台曽大父軾大父碩俱不仕父靜贈承事郎君生九嵗而孤母夫人王氏擇師訓之嚴必期成立入太學值光宗龍飛恩免舉登紹熙庚戌進士第授迪功郎臨安府鹽官縣尉以母憂不赴復尉慶元之慈溪秩滿陞從事郎調德安府司法參軍終更用薦格改宣教郎知建寧府建陽縣事既受代會新使者至豪强之不得志者共為飛語中君被重劾謫三山事既得白許自便復官授江東安撫司主管機宜文字戍期將及以疾終于正寢寔嘉定十一年二月十三日也年五十有九官終承議郎娶郭氏封孺人有平齋類藁三十六卷鍾吕集一卷藏于家君天資莊重酷嗜書雖道塗驅馳牒訴紛委得休暇即挾策諷誦作詞章不俚不浮吏事精敏所至著能聲性輕財急義自奉薄而與人周伯翰許可如右郭孺人既嫠居該紹定辛夘東朝錫慶恩加封安人卒于嘉熙二年戊戌正月二十有九日享年七十男二人長曰琪先卒八年矣次曰珹習儒業三女皆先卒中壻新隆興稅官郭掄安人從兄之子也孫男二孫女二尚幼嘉定辛巳葬君臨海縣義城鄉之豐山將以今年十一月十有三日以安人合葬焉珹諗余曰吾母東陽望族也性婉嫕有賢行先人得盡力官業不以家務累其心者母氏力也敢請銘余太息曰君所歴官凡三吾熟其二焉慈溪吾鄉邑也地陿號易治民去思至今吾嘗守富沙矣建陽俗最獷富豪根據盤互令俛首聽命迺安小欲自見禍立至又余所目覩也君處難若易游刃有餘未足為多既謫三山蕭然四壁闢一室曰龜巢又名小齋曰且休間嘗賦詠不知身之在異鄉也庶幾篤于自信夷險一致者矣然則微伯翰猶當銘况可取信乎銘曰不汲汲于富貴不戚戚于賤貧吾聞其語思見其人遷謫二年奚愠之云吾王聖明罪實在臣千古此心昭假明神夫義婦聴是曰彞倫雖死不朽相敬如賓太孺人卞氏墓誌銘佛氏之教徧天下儒者隂信其實而陽諱其名余每病之洪範五福夀富康寧攸好德考終命佛氏以福田勸人其所謂福亦不過如是舊同僚張亨之為余言祖母母家饒于財既嫁能節而自裕素康强無疾病好善尚慈儉臨終沐浴更衣翛然而往夀九十有二余曰是乃備洪範之五福無一闕者及究其所以然則得于佛氏之教妙年卻葷不御持誦觀世音號精嚴匪懈一夕感夢履坦途左右顧盼幽閴虚曠布地皆金砂晶光奪目一人肩蓮華来拱揖分兩枝見畀夢中疑非人間世覺而神爽思清語家人曰此西方淨土我沒其遊此乎念慮專靜精神黙通于是驗矣余將指江東亨之主東流簿敏而有守余愛之遂檄入幕後為坑冶屬官亦相與周旋且歌詩為太孺人壽别来三年而亨之以書請銘人生朝露耳惟得道者雖亡而有不亡者存太孺人姓卞氏諱妙覺霅川人同里張公諱思明之室始父母議擇對不肯嫁凡子名閥豪族皆弗願聞張公賢譽欣然歸之雅不喜紛華不妄言笑澹如也舅姑性嚴毅恪謹婦職奉甘旨惟恐後治家一遵禮度謂婢妾亦人子雖怒不出惡聲機巧鉤距之態豪髮蔑有真佛氏所謂清淨者耶紹定辛夘該慶夀恩封太孺人端平乙未正月十有二日卒于正寢嘉熙三年三月十四日葬于城西霅水鄉開元山之陽一男昌時承務郎二女進士吳浩黄永年其壻也孫男二人長應運登丙戌進士第儒林郎兩浙轉運司物料官即亨之也次應龍習舉子業孫女一人適吳門進士曹汝賢曽孫男三人女一人俱幼噫為佛之徒從佛之教易能也得佛之理不泥佛之迹難能也太孺人有得于佛氏而誨子孫則以儒識超塵世之表行修閨閫之中余謂偉男子未能過也乃述其精誠之應感以參其平生之行事而系之以銘曰是夢非夢金砂非砂其蓮花耶亦非蓮花夫人得之無礙無遮壽于而躬昌于而家淨土逍遥樂也無涯曹君能謙壙誌國朝風節名臣多賢子孫天也曹氏在天聖中任御史知雜諱修古者直道不阿凜凜生氣至令子諱覲皇祐間守封州以捍儂寇死節余與能謙為僚友聞祖風斂衽起慕余屏居山樊能謙束書終日諷誦夜挑燈忘倦論議灑灑信其為名賢後也曹氏家世出建安後遊宦無定止今居安吉長興之和平曽祖諱照洪州分寧丞妣莫氏祖諱驤信州推官累贈中奉大夫妣莫氏繼劉氏俱贈令人考諱待聘通守福州兼宗正丞奉祠終朝散大夫妣周氏宜人能謙諱逢已生于嘉泰元年十月癸夘嘉熙二年六月甲寅卒于正寢得年纔三十有八將以三年十有二月庚申葬于縣之嘉瑞鄉城山沙墩之原娶趙氏故太常丞師淵之幼女余亡室妺也能謙性明敏有巧思而根于孝友恥僅以才稱與余處動中繩墨孜孜于切已之學其賢如此固御史之報抑宗丞躬行力義方嚴有以倡之也能謙有庶子憫仲氏無後慨然以奉烝嘗其亡也趙氏方謀命繼而未之決能謙猶子主嘉定簿名夢龍請余志其壙余感愴良久銘之曰生而賢嗇長年人何愆有命焉家道綿清名傳世爭先我後鞭試問天然不然叔崇禧兵鈐公墓誌公諱任字信翁世家開封徙鄞曽祖灼左朝議大夫尚書倉部郎中妣石氏封恭人祖埴登仕郎妣林氏父有義贈武顯大夫妣劉氏贈宜人公以聯婣袒免宗補承節郎監處州酒税尉荆門長林縣監潭州永豐倉荆湖南路安撫司準備將領就辟本司親兵統轄充樞密院正將副福建路兵馬都監秩滿因仍者再頗有倦遊意奉雲臺沖佑祠為處州兵馬鈐轄終厭仕祝釐崇禧觀凡三載嘉熙三年九月庚辰卒積階至武節大夫享年八十趙氏宜人先公歿二子南忠訓郎永平監物料官高業進士女適趙時擇修職郎紹興府戸掾二孫夢得蚤亡饒孫男等將以四年二月庚申奉柩葬于鄞之翔鳳鄉青山原合宜人之墓某于公為子行公幼從先正獻公學以材猷自負而又能以儉約自持居官舉職受知當世名公馭軍紀律明恩信孚晩嵗益簡澹教子切切不倦南嘗薦名春官葬日薄二子泣請誌嵗月噫我正獻公夀踰八袠公年亦似根諸簡質欲寡易足心小罔失觀我斯志百世一日主簿呂君壙誌君諱䕫友字子韶姓呂氏世為齊之歴城人曽祖諱頤浩中興名宰相贈太師秦國公配饗高宗廟庭諡忠穆祖諱摭朝散郎直祕閣累贈大中大夫父諱昭亮朝奉大夫知隆慶府妣錢氏封宜人自忠穆扈蹕南渡寓居赤城隆慶又徙會稽子韶以父任入官授迪功郎監衡山銅鉛場未上改調富陽縣主簿該東朝慶夀恩循從事郎嘉熙已亥卒于富陽官舍得年四十有三娶相山玉氏善經紀家事子韶賴之男學治將仕郎女未行學治將以庚子三月甲申奉柩祔葬于諸暨縣義安鄉西山之祖塋子韶有美質識趨舍每念先烈如許我乃沒沒無聞厲志好修期自植立某之亡室視子韶為中表行為余言子韶弱不好弄長無子弟之過孝友篤于閨門余察之信然可以遠到矣而僅止此天乎學治泣請志嵗月嘻忠穆鴻勲施及後昆仕途雖屯典型猶存西山之墳百世清芬䝉齋集卷十八
