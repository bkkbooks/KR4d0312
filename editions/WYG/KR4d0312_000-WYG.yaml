body:
  text: 䝉齋集目錄别集類三宋巻一經筵講義七首經筵進講故事八首巻二奏疏四首巻三奏疏三首巻四奏疏三首巻五奏疏四首巻六奏疏八首巻七奏疏六首巻八制四十七首巻九制五十三首巻十表一首狀三十首書啓二首巻十一序二十六首巻十二記十五首巻十三記十四首巻十四記十七首巻十五説十一首題跋二十九首巻十六箴十四首銘二十五首贊六首巻十七祭文十六首誌銘七首巻十八誌銘十三首巻十九賦三首四言詩十八首五言古詩六首七言古詩六首巻二十五言律詩二首七言律詩二十六首五言絶句三首七言絶句七十首臣等謹案䝉齋集宋袁甫撰甫字廣微鄞縣人禮部侍郎燮之子舉嘉定七年進士歴官吏部侍郎兼國子祭酒權兵部尚書贈少傅諡正肅事蹟具宋史本傳焦竑國史經籍志載甫所著䝉齋集本四十巻自明以來傳本甚稀近時李鄴嗣等輯甬上耆舊詩蒐羅頗廣而亦未見甫集僅從他書摭拾編次則其佚固已久矣甫胚胎家學經術湛深闡發理道之言皆能得其精藴歴官所至汲汲以興利除害為事凡有奏請鑿然可見諸施行其在徽州所上便民諸條迄今利賴不同空談無補之流至於遇朝廷大事侃侃直陳尤為切中􅑆要如史嵩之議約䝉古伐金甫力持不可且言嵩之輕脱難信幾罹危禍又力斥史彌逺之専政而勸理宗以獨攬乾綱更為人所難言今諸疏雖不盡傳而所存劄子尚夥要皆劘切權貴抗論不阿可稱忠鯁之士其他詩文類多明白曉暢切理饜心不屑屑為粉飾藻繢之詞而有體有用務衷諸道洵能不負所學者維袁氏祖孫父子以儒術傳家經明行修世濟其美其名姓固已昭著史冊獨其遺編湮沒幾數百年今幸逢網羅放佚之時甫之祖文所著甕牖閒評既已裒輯刋布甫之父燮所著絜齋集及毛詩講義並仰邀宸章褒詠光賁藝林兹甫所著全集又得排次成帙勒為完書實賴聖朝表章遺籍闡發幽光復於蠧蝕之餘乘時並顯而其禔躬砥行之大略益藉以叅攷而知其文傳而其人亦彌足重矣乾隆四十七年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
