body:
  text: 䝉齋集卷十三宋袁甫撰記江東倉司無倦堂記余持江東使節至秋浦之初年實紹定己丑夏六月也與僚屬議政西齋窮晝夜不少休間縱步城上小亭圮甚因葺焉青山在望豁人心目取康節雨後静觀山意思扁曰静觀城俯大江慨然懐感河洛久苦邊塵我畫江自守池亦一衝要也事㑹之来何有終極圃植牡丹舊有亭曰花光易曰思洛次年冬十月余遷司臬仍兼庾事睠睠不忍舍兩亭豈為愛山與牡丹哉己丑迄癸巳嵗荐饑無日不講荒政亦念不到園亭也幕客之留池者諗余曰湖山樓将壓矣議更樓為堂既訖功請所以名其堂者子路問政夫子告以無倦余與同僚講荒政五年宜倦而益勤蓋活民乃吾職也每逢水旱霜螟之災中心惕然不惟不敢倦亦不知倦堂之命名聊以志余心耳然則靜觀也不在山思洛陽也不在牡丹昭昭矣嗚呼觀其所以觀思其所以思雖欲倦也其可得乎後之人與我同志雖千載猶一日也江東憲司恕軒記恕如心也欲惡者心之大端已之所欲人誰不欲已所不欲人其誰欲大學論絜矩之道謂上下先後左右皆毋以所惡施諸人夫所惡勿施爾則所施皆可欲欲吾心也不欲亦吾心也遂以欲不欲為心可乎心無欲亦無不欲然則何以識心心有思乎思由心生而思非心也心有知乎知由心發而知非心也思無思知無知欲無欲可以是識心乎心不可以識識也心不可識若何如心以不可識識心則不求如心而無不如矣臬司廳事之左小軒舊扁曰平恕偶因葺治取先聖誨子貢終身行之之語更之曰恕軒刑重事也臯陶之言備矣宥過失不經恕也刑故恕乎曰故雖小不可不刑如心而刑之吾何知哉雖然亦甚不得已焉耳天地大德曰生聖人守位曰仁制刑之本旨非嗜殺也辟以止辟也况古者修道以闡教讀法以明民民陷于罪猶曰非民罪也為之稽貌察辭為之師聴簡孚為之服念為之哀矜委曲繁重尚若此後世無教而有刑然天常人彝本未嘗泯滅民之罹刑寧不自知吾不教民而遽加刑焉亦豈不自知哉下違心而抵罪上違心而罪之是上下皆不如其本心也然下違心無譏焉上違心責可逭乎易之賁曰君子以明庶政無敢折獄夫明足以折猶且不敢正所謂如心也吾之明萌一敢心心果如是耶嗚呼後之居是官而與吾同是心者尚其監茲處州縉雲縣重修鼔樓記紹定中余持江東庾節東陽朱君名元龍字冠之尉池之青陽余改司臬事冠之為番之理掾又偶同僚前後俱檄入賓幕冠之天資鯁直屹然不肯阿附裨贊為多改秩宰處之縉雲端平三年至邑及余官中朝聞冠之更新縣樓愕曰冠之非好事土木者其殆必有以耶且是邑地隘民窮賦歛煩重冠之以寛簡勤亷得民和理冤滯恤貧弱尚教化凜凜有古良吏風余方私自慶幸何遽營繕勞民為未幾冠之貽書道委折求記其事乃知是役也一錢粒粟不科于民縣遇受輸例得緡錢五百冠之捐以供費郡太守陳公至又以公帑佐之工不屬吏董以士人寓公急義欣焉樂助樓成而民不知余歎曰固知吾冠之不負學道愛人之訓也君子為政惟患舍本務崇不急耳按圖志宣和五年創此樓距今一百五十年㑹大風一夕撤去勢急甚矣不煩民而事集本不傷矣且嵗祲艱食執役者競趨規模既定經始于季秋訖功于孟冬正農隙也凡此皆合古役民之義是可記也已繼自今危樓屹峙公門洞開令出入于是必思夫夙興夜寐以共乃事邑僚出入于是必思夫交相規儆以贊厥長賓客出入于是必思夫請謁之不行獄訟者出入于是必思夫枉直之得平此皆邑政所闗之大者豈徒聴鼔聲之讙亮覽石筍之崢嶸而已哉既以是報冠之遂筆之為記池州重建祠山廟記易繫言通乎晝夜之道而知精爽之至與神明交不間晝夜寤寐若一其易道乎先公嵗在癸夘大病中夢與神遇神駐馬熟視偉先公先公寤而病差某時方十嵗歴歴識斯事後三十一年先公復病迺卜醫于神良驗嗚呼吾親亡矣其誰獨無親乎吾每至官所水旱寇賊之災為民禱祈願吾民各得飽食寧居以養而親吾親雖亡吾親之心不忘也池有神祠庳陋傾圮撤而更新焉匪以徼福于神抑以表吾思親之心凡吏于池家于池與我同是心者其世世葺治焉俾勿壞池州西祠儷景樓記紹定二年夏六月某被命司庾江東明年冬以臬司兼庾事連值嵗饑夙夜以救荒為急惟周官大司徒荒政十有二以聚萬民其末條曰除盜賊夫荒政庾事也除盜臬事也然則脈理相貫尚矣某職思其憂何以稱弭盜賑荒之責一日讀昭明太子集乃大感悟當是時吳郡屢以水災不熟有上言漕大瀆以瀉浙江水詔發吳郡吳興信安三郡人丁就役昭明太子抗疏力諫其畧曰吳興累年失收人頗流移吳郡十城亦不全熟榖價猶貴劫盜屢起所在有司皆不聞奏今征戌未歸彊丁疎少此雖小舉竊恐難合吏一呼門動為人蠧去嵗公私未能足食今茲失業為弊更深且草竊多伺候人間虛實若募人從役則抄盜彌増吳興未受其益内地已罹其弊其言哀痛反覆洞見民隠嗚呼饑嵗民心不固則寇盜相因而起故弭盜無他巧在于使民足食賑民無奇策在于官吏不擾今昭明太子知漕渠必擾民擾民必致寇盡忠直諫力遏其萌可謂覩微知著之哲矣夫漕渠之役固勞民民事也然且不可矧當饑饉荐臻時職在撫摩不能培養邦本又縱尋斧焉因以重歛繩以峻刑虐民誨盜其為禍又可勝道耶然則昭明之言非獨有益于當時真萬世之龜鑑也某始制司于池雨暘疫癘之災為民禱祈輒響答迺即西祠肇建新樓用妥神靈扁以儷景洎来番且一年池人以記来請惟是賑荒弭盜身親歴之與昭明黙若有契世稱昭明仁孝其事不可概舉讀罷丁役之疏竭誠君親施利生民行一物而仁孝具焉豈特枚數衆善而後見哉自古詞伯英華昭明會萃成編富矣某之直書此事庶幾倣英華之遺意示訓戒于將来彼之慕仁孝者既堅信心而憚靈威者懍然知畏于以厚民生固邦本是亦昭明之志云爾寧國府修學記古之學也粹後之學也駮古之學也實後之學也虛古之學也務本後之學也趨末古其可復乎道與天地準萬世如一日也明古之道修古之敎是亦古而已矣舜命后䕫典樂敎胄子周官大司樂掌成均之學政學奚取于樂也正聲日接于耳邪僻不入于心鼔舞動盪善端興起虞周之教深矣去古既遠雅音息而教化衰然六經所載聖賢所述後世猶可攷焉有能傳先王之正統而與學者共之陶冶作成一歸于正親正人見正行習正論磨礱既久日充日明秉彞之良油然感發孰得而禦之故曰明古之道修古之教是亦古而已矣鄒君之典教于宣城也其有志于斯乎憫俗學之横流懼斯道之湮鬱始至日與諸生講習以求正人之心環視學宮嵗久滋圮慨然歎曰吾以教為職固陋如是心誠恧焉于是葺而新之惟殿及堂材素堅良用工差省奎畫所藏生徒所居頹敝已甚故規制加詳以至先賢有祠次舍有所帑庾有儲朽者易之攲者正之陋者飾之未備者廣之厥費多出于學又請于郡于部使者欣然咸佐其役經始于丙申之孟冬告成于丁丑之仲秋繼自今邦之俊秀游于斯息于斯絃誦于斯洋洋濟濟視昔有光凡鄒君之所以篤意于學者豈徒欲諸生事佔畢玩華藻已哉蓋將以求斯道焉道若大路坦然甚明根諸吾心不勞外索以此正身以此正家以此正君其致一也雖然邪說易熾正道難明克念與否聖狂分焉蚤夜以思之戰兢以持之此心純明無有間㫁實德在我萬變莫奪鄒君期望學者之心其大本在是某嘉其有志于古且欲學者相勉以成斯志也于是乎書鄒君名應博昭武人和州修城記開禧間權臣輕開邊隙兩淮繹騷敵乘虛攻歴陽甚急城幾陷獲全唐劉禹錫壁記謂此城亞父所營高且堅斯言固驗然守備素具亦太守周侯力也嘉定壬午五月大水城圮以丈計者餘四百寶慶改元劉侯燧守是邦復修築焉今太守何侯始至集僚吏將佐父老暇日登城慨然曰城瞰重岡濠枯無水賊窺我易耳郡雖凋甚備可緩耶迺相地勢夷高就庳西自鎮淮門繞北至東門去城三百步環濬深塹以其土築月城于是重城重濠有金湯之固矣費緡錢二十餘萬而不以累費朝廷百姓亦弗知也嗚呼此豈易言哉自古王公設險城池固不可廢而近世論兩淮城築者吾聞其語矣曰我恃城為固脫弗能守為敵所據本以自固反以自累或曰淮四戰之地敵長驅而来我或迎其前或躡其後在兵利鈍不在城有無縱有堅城敵来不迎過不躡直株守耳噫二說不同自恕一也職曰守臣矣誰令失守戰所以守也奚可株守侯本經生奮身右科忠義自許任專城之責其志于不失守明矣為政戢姦暴安善良創寧淮寨千四百楹收敢勇舊戌招屯田强弩各千人置弓矢器械萬數人心既固軍政大修卒有緩急伸縮開闔無不在我又奚株守之足患然則兩淮城築決不可無而所謂真可恃者又在城築之外耳侯馳書告余求記茲役觀所施行事又適與余心合遂為之記侯名嗣武芍陂人象山書院記寧宗皇帝更化之初興崇正學尊禮故老慨念先朝鴻儒碩師咸錫嘉諡風厲四方謂象山陸先生發明本心之學有大功于世教錫名文安庸示襃美于是慈湖楊先生我先人絜齋先生有位于朝直道不阿交進讜論寧考動容稱善天下學士想聞風采推攷學問源流所在而象山先生之道益大光明甫承學小子將指江東象山實隸貴溪祠宇荒頽過者悽愴爰相邑南背負巍壁面俯平川清與目謀曠與神㑹築宮百楹既壯既安士遐邇咸集紹定五年春甫周咨原隰遂往觀焉始至舍奠先聖退謁三先生祠竦然若親見象山先生燕坐而與二先生相周旋也升彞訓堂學子序列深衣大帶濟濟翼翼相與講明問辨皆三先生之訓語也齋曰志道明德居仁由義精舍曰儲雲佩玉又皆象山先生之心畫也顧瞻之間已足以生恭敬消鄙俗知入德之門規模信美矣乃具以本末上之朝有詔俞之賜名曰象山書院士合辭来請願有記甫竊嘆世降俗敝學失師傳梏章句者自謂質實溺空虛者自詭高明二者交病而道愈晦書院之建為明道也道惡在無不在也烝民之詩曰有物有則孔子亦曰仁人不過乎物孝子不過乎物天地大物也日月星辰風雨霜露山川鬼神草木鳥獸皆物也而物無非我我亦嘗究其所以然乎物何所始物何所終相更相禪相生相推亘萬古而莫窮是何為者其必有以矣人亦萬物中一物也故曰人惟萬物之靈有是靈矣則必洞然于上下四方往来古今之變而得其所以然者矣其或凝焉滯焉未大昭晰焉者果何為而然也盍深省乎接乎目入乎耳森列乎前後左右者物也物非彼也彼不我外我自外之彼本不隠我自謂隠是自蔽也自窒也非物蔽我窒我也父子君臣兄弟夫婦朋友井井秩秩有倫有理者是孰使之然而不容不然盍深省乎鈞是人也剛柔輕重遲速氣質固不齊而降衷常性則一也何古先聖哲察倫明物而我乃未能自别于日用不知之凡民豈其不明歟游談聚議數他人之短長高下燭照龜卜也而何獨自知則昬抑不强歟事物觸我少有不平雖甚懦勇不可當也而何獨自立則弱然則本非昬也即觀人以自觀即明矣本非弱也勿力爭而心競即强矣反覆手之間耳然則自明自强者何其鮮物交物而引焉者何其多也此非物罪也盍深省乎省非難常省為難曽子日三省也以魯顔子亦足以發也以愚此魯非魯此愚非愚學者于此而省發焉純純乎孶孶乎理融心悟一以貫也躬行實踐黙而識也忠君孝親本有良貴仁宅義路何莫由斯志其基本敬其輿也誦讀則沃以膏液嚴師畏友則鍼砭藥石也死生不貳帝臨汝也天下歸仁物我無間也毋梏章句泥物者終不能格物也毋溺空虛遺物者終不能成物也故曰誠者物之終始不誠無物又曰萬物皆備于我樂莫大焉噫此其可言者也如以言而已矣猶泥物也言亦空而已矣猶遺物也甫幼聞先人之訓曰吾不感象山先生與我言感先生不與我言耳嘗屢叩屢不答一日叩愈切先生曰此事不屬他人自求可已嗚呼至哉紹定六年清明日記馬實夫君子堂記菡萏詩歌芙蓉騷賦曷取哉比德也我德之清其清也我德之芳其芳也睟面盎背陽發其華也歸根復命隂結其根也有孚盈缶的中之薏也大白若辱出淤泥而不染也君子人歟觀此則可以知德矣昔濓溪先生愛蓮有說而于他華不能無貶焉余曰四時之變不同而草木之華隨之蘭菊固各有時胡可以一律齊哉獨蓮也當流金鑠石之時有瀟灑出塵之韻是則尤可貴耳至于時則與他華等未可以彼議此陶靖節有云善萬物之得時惟其時也然後君子余友馬實夫築室桂山扁其堂曰君子蓋取諸濓溪一日過鄞之東湖訪余于種德庵而屬余記若實夫者可謂有志于為君子儒矣故為道其平日之所自得者以助實夫之進德云端平三年立夏日記東陽縣興孝廟記孝之道大矣天經地義萬古一日也不慮而知曰良知夫何知哉不學而能曰良能夫何能哉聖帝明王之世彝倫敘孝道明天下不以為罕見之行以罕見而得名其道之微乎表門閭門閭昌矣而非孝子之志也復子孫子孫榮矣而非孝子之志也孝子何志乎行吾之所當然不願乎其外也雖然此孝子事耳為人上者以孝治天下彼有孝之實則惟恐其名之不彰彰孝子所以使不孝者愧也愧不孝所以使孝道興也聞吳有施君焞者泣血叩閽以贖父刑罪吾能捐身為親如是乎晉有許君孜者悲號蒔松鹿犯其栽虎為殺鹿吾能盡誠昭應如是乎孜之子生亦有孝行吾能正身訓子如是乎又聞唐有馮君子華者廬于親墓而有白兔靈芝之瑞吾能感致嘉祥如是乎有應君先唐君祐者事親居喪各著至行吾能生養死哀如是乎茍不能然若何不愧愧何自而發哉無所知也無所能也而自不容不然也孩提之童則愛親孩提何知何能哉見親之不葬則顙泚豈知其為泚哉此六孝子者人稱其孝而六孝子常以為不足耳欲報之德昊天罔極六孝子之心固與天地相為無極也聞六孝子之名而赧然知愧者其心固與六孝子同也孝道之興皆由此心生耳端平三年婺州東陽林令君嘉㑹治邑有善政深以扶植風教為先務于是合兹邑之孝子而祠之且白于郡郡上于省若部而奏之天子今左丞相肅國公實東陽人首捐金錢佐役而和者滋衆鳩工飭材廟貌聿新遐邇胥恱朝廷賜額曰興孝于以章聖上孝治之仁表令尹崇本之化用以為来世事親者之勸而非徒為孝子私也令君屬某為之記不敢以固陋辭乃為敘次本末且作詩以遺之俾歌以祀神其辭曰春雨濡兮秋露零思吾親兮本性情昔為孝子今神明帝錫嘉名兮孝道興神皇皇兮来下奠芳醑兮醆斚歌白華兮我心以寫聞蓼莪兮神淚亦灑誰非人子兮神鑒之錫爾類兮慰爾思年豐兮稻肥歡樂兮耄倪神未来兮我民待神之歸兮報無怠神無在兮無不在溥此孝兮横四海馮君振甫言行記君生九嵗而孤執喪如成人稍長篤學窮日夜不倦通經史諸子百家之學日課有錄題其首曰惟民之生渾乎其天是為常則因物有遷習矣弗察莫究其然顧操存之有要庶云為之罔愆試肅將于一念已參乎其在前儻須臾之弗離則斯道庶乎其可望焉繼今必書小子勉旃後偕從弟國夀師事慈湖楊先生國夀早世先生作哀辭曰予與振甫相親先後問答無幾遽爾皆覺覺非思慮言語所及其為先生許可如此不好非聖之書不以聲色亂耳目弟為族人後生産均分之無靳色創贍宗一廩貧不能活者嵗時量助之每歎世人不知蓄德但知蓄財本為子孫計而天理不爽福反為禍君築室金川之湖濱蓬户甕牖氣浩如也貴溪實象山先生談敎之地余將使指興建書院用白鹿洞規制請于朝廷君為堂長四方多士聞風興起来學滋衆君氣貌舂容誨誘不倦生徒有過輒慘然不悅未嘗疾言遽色學者為之感動天性質直未嘗為迂曲繳繞之態每曰吾惟直心而發耳暮年見世途險巇嘗題詩壁間曰眼俗難觀古時閒只順天平生羞詭遇投老更加鞭嵗在丙申自象山書院東歸中道得疾既抵舍聞書院趣君行猶幡然欲往若忘病者丁酉仲秋十有九日忽命具浴浴罷俄頃正巾更衣翛然而逝嗚呼君之行已􅌸有瑕玷親戚鄰里下至田夫野叟莫不敬愛卒之日咸嘆惜之余既銘君之墓又掇拾君之言行詳記以示象山士友忠信篤敬如君者不可復見矣吾道奈何吾道奈何重修白鹿書院記我國家祈天永命涵育羣生與三代同其長久是無他故焉正誼明道不計功利而已斯道也亘古如一日而所賴以植立不壞修明無斁者則必由講學始蓋道不通行于萬世不足為道學者無益于人之家國不足以為學熙豐用事之臣專務功利排斥正論斯道晦蝕甚矣而所以修明植立者則元祐諸儒正誼明道之力也紹符政宣間羣邪得志流毒生靈極而至于中原板蕩斯道掃地矣而所以修明植立者則中興諸儒正誼明道之力也權臣力持和議擯棄忠良宴安江沱不念讐恥斯道又幾鬱矣而所以修明植立者則乾淳諸儒正誼明道之力也開禧權奸竊弄威福誣正人為偽學借恢復以開邊斯道又幾墜矣而所以修明植立者則嘉定更化諸儒正誼明道之力也皇上嗣臨大寶正斯道興廢明晦之機而中外臣僚下至韋布之士皆當精白承休共扶斯道甫無狀將指江東且五年建象山書院于貴溪興白鹿書院于廬阜豈徒然哉正欲力辨道誼功利使士心不昩所趨以庶幾實有益于國家耳雖然甫心有大懼焉風俗之壞積漸以成君子之澤積久乃見伊洛諸先生講道之功當時未見也而見于中興南軒晦菴象山諸先生講道之功當時未見也而見于更化見者枝葉未見者本實本實弗撥遇春思榮乾淳培養之澤至更化始見以其本實之無恙也更化以後培養能如乾淳乎夫培養有加于前而後可以跂望乾淳之盛不然本實撥而枝葉枯利欲熾而道誼微吾為之懼矣然則南軒晦菴象山諸先生講明問辨之學可無紹而修之者乎天理人欲之分南軒晦菴二先生剖析既甚章明而喻義喻利之論象山先生敷闡尤為精至所以續洙泗之正傳者日星炳炳諸先生立身立朝大節追配昔賢而所以淑諸人者大要忠君孝親誠身信友用則澤及天下不用則無愧俯仰如是而已言論辨說特其土苴耳執言論辨說以妄窺諸先生之門牆而于其實德實行植立修身有益于人之家國者乃不能取為師法則不足為善學矣顔子之鑽仰曽子之戰兢其苦切至到如此曷嘗以口耳之學爭夸競勝哉甫與元德張君同官于池又與仲能湯君有同年好二君從事晦菴先生之學功深力久遂延為洞長元德以年高先歸仲能悉力振起多士聞風来集又以暇日大葺堂宇整整翼翼増廣于舊日是麗澤之習日益光明善相告過相規毋事茍同勤勤磨切使後来者推攷源流所自以不忘今日培養之澤回視更化以来被乾淳之遺化者鬱然相望于先後其為有益于國家不亦大乎甫既記象山書院以與四方之士共之矣則斯記也互相發揮亦足以助學子之警策云白鹿書院君子堂記易六十四卦大象皆言君子君子者全德之稱歟濓溪先生妙達隂陽動靜之理謂乾坤化生萬物萬物生生而變化無窮嗚呼易道深矣先生之學該貫天地萬物而獨愛一蓮何哉蓮亦太極也中通外直亭亭淨植太極之妙具于是矣蓮為君子則富貴隠逸非君子歟隠逸逃富貴者也富貴未必可貧賤也若夫君子何適不可哉仲能湯君為長于白鹿書院一日貽書命余作君子堂記亟稱堂基爽塏與太守史侯慨然捐錢粟助風化且曰書院乃重修而此堂則新創重修者起六十年之廢壞新創者廣六十年之未備堂瞰荷池取濓溪愛蓮語扁以是名諸生藏修游息其中亦嘗有感乎富貴天也非可求隠逸偏也非所安求為君子而安焉濓溪之望後學正在是余恨縻吏鞅未獲一登斯堂儻乞閒得請其行也執周易一卷與諸友相周旋訪廬阜尋舊遊而後歸不亦快哉番陽顔范二公祠記我先人絜齋先生讀史見致忠盡義為世標準之偉人如唐顔公我朝范公未嘗不感慨興嗟指以勵諸子且曰國于天地有綱常焉二公綱常之氣骨也人以氣骨成國以氣骨立某識斯言不忘將指江東臬司署番按圖志二公作牧是邦人祠之至今然或附黌舍或在郡圃規制庳陋弗稱一日知州事林侯與某語慨然有卜爽塏侈祠宇意曰祠成子為我記之某敬諾每覽唐史論顔公晩節偃蹇及敘至德初元公赴鳳翔事不能明公赤心反稱棄郡渡河觀史至此令人拂膺夫元載盧杞氣燄熏天下公摧奸尊主何謂偃蹇捨平原詣鳳翔非怯也當禄山初反聲撼河北公不于此時怯顧怯靈武事定後耶洎至拜御史直道不阿權奸膽落兩京既復平原併安皆公力也何謂棄郡忠臣義士雖身為盗賊猶憚之而史忍誣之乎顔公使希烈范公抗元昊皆一時盗賊之雄希烈陷汝州公以八十之年挺身罵賊始未敢害公希烈忿唐殺弟希倩乃致公死地公死唐存得死所矣元昊僭帝請和范公自為書力陳逆順成敗狀昊謀大沮時論猶誚公擅復書坐奪官此與史譏顔公偃蹇棄郡何異曩令全軀保妻子之臣見義不堅決以昊書来上則國體所繫可勝悔耶盜賊夷狄不能折二公而折二公者奸邪朋黨也慶歴朋黨之論興范公連斥斥復起起復直言時事已而又斥迄不變公巋然德望碩大光明無纖瑕可指而中公者必曰朋黨元載盧杞陷顔公于唐主之朝而朋黨之論擠范公于盛明之世范全身名而顔隕賊手讒人交鬬術無工拙聴言者昬明固異也我朝保全憂國之老臣豈唐世敢彷彿萬分一哉番為二公遺愛之地人心懐之千古不泯祠宇興廢于二公何加損而某獨感念先訓著其致忠盡義闗世綱常之大節如此林侯名清之秩滿除坑冶使者崔侯端純代之始至聞建是祠嘆慕不已曰吾得守二公所守之邦深自慶幸斯言亦可嘉已小雅云高山仰止景行行止行之實難嗚呼心顔范之心是亦顔范而已矣奚其難䝉齋集卷十三
