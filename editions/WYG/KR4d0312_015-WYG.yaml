body:
  text: 䝉齋集卷十五宋袁甫撰說張平仲為鄭氏子求書三省大字遂為之說人心至明常人自違其心若曾子者可謂不違心矣人取謀于我竭誠殫慮若已事然此本心也不如是則不忠非違心乎人道莫重于友一語不妄始終如一此本心也不如是則不信非違心乎人之為學傳于父兄傳于師傳于古孶孶服習罔敢失墜此本心也不如是則不習非違心乎夫其所以違心者不省故也是心在我不屬他人自提撕自警策自不昬不墜萬病消釋一心炯炯天之廣大地之博厚日月之昭明雷風之鼓盪山之峙川之流草木之發生禽魚之飛躍皆此心也不違其心本無不忠省之曰豈其有不忠乎本無不信省之曰豈其有不信乎本無不習省之曰豈其有不習乎日日如是純明靜一臨死生之變不忘戰兢嗚呼斯其所以為曽子馬實夫字說東淮將漕馬君光祖余字之曰實夫而告之曰和順積中英華發外自然之華也華而不實識者譏之何譏耳譏其外浮而内無本也大易之贊乾曰剛健篤實輝光日新其德實與光相對譬彼草木本實不撥則華潤不枯精彩盡發于外而根本一摇則生意慼矣何光華之云孟子曰仁義禮智根于心其生色也睟然見于面盎于背施于四體實夫于根心之語其有得乎未也根非外来本心素具明心以培其根則枝葉華萼皆根之所自出也勿忘勿助長是為用力之要實夫勉之葉朝宗字說古括葉君名東字子潤紹定癸已訪余鄱陽㕔講中庸大旨余更其字曰朝宗而語之曰子嘗樂水而得其趣乎書夜周流一息不停雖過顙在山然亦未有不下者江河淮濟同歸于海海受衆流而不加多焉故百川雖異萬折必東朝宗于海萬古一日子而有得乎此為學以至海為準學海以不動為本識智者樂水之旨與樂山實相貫通則可以躍然有省矣省而習焉習而熟焉會歸于海動靜一源知仁匪二其于學殆庶幾乎朝宗勉之異時將叩子所得以慰老懷端平第三春余得罪去國朝宗不遠千餘里到鄞川東湖問余死生求余字說而告以此朝宗敬諾遂書以遺之徐克常字說鄱陽徐氏子更名憲請字于余余取書克有常憲之義字之克常而語之曰工師度木圜中規方中矩曲直中準繩醫師製方君臣佐使各當其可藝也有法度焉維人之生有物有則何以守之曰常而已日月經天過則薄食寒暑推移愆則為沴爾憲爾常無増無損敬之哉入孝出弟帝則在斯井井秩秩夙夜勿違時泰則昭憲度敷禮樂之化世否則秉常憲盡忠孝之節德惟一是謂常子其可進此乎吾語子亦驟矣雖然語在我聴在子程自芳字說鄱陽程令名沐求余字之而為之說余字之曰自芳而告之曰子亦知夫芳之義乎屈平九歌有云浴蘭湯兮沐芳釋者曰芳芷也沐香芷以自潔清也子亷以律已公以涖官庶乎能潔清矣而余有取乎芳之義者豈止若是耶君子小人之分在乎臭味而已屈平之作楚辭引物連類凡所謂香草者皆芳也其芳可愛則飲墜露飱落英紉而為佩滋而成畹可也曷為乎世人不芳其芳而反謂不芳者芳耶吁芳不芳乃人之好惡然耳吾之自芳菲菲乎其彌章者常自若也而豈以世之芳不芳易吾之初服哉澄神瀹慮澡身浴德滋義理之根濬學問之源斯所謂自芳乎夫自芳非斂諸身而已固將流此芳于天下也布德施仁人薫其芳立功揚名人播其芳著書立言人誦其芳非特見于一時而已又將載此芳于後世也顧不求芳于外而反求諸内故曰自芳若所謂誠者自成而道自道云爾屈平之不遇未嘗斯須不惓惓于靈修也新沐者必彈冠茍有用我者則將以彈冠為慶而奚為私有其芳哉吾子其勉之和敬說贈庶可敬而不和拘矣和而不敬肆矣夫敬與和匪拘匪肆然則和敬二乎曰真敬未嘗不和真和未嘗不敬奚其二何謂真敬心敬也非貌敬也可以言禮矣何謂真和心和也非貌和也可以言樂矣禮樂豈有二致哉知禮樂之非二致則和敬一貫之理在是矣而世人往往弗察不惟不識和敬亦不自識其心吁心吾心也反已而求和敬油然而生非自外至也是故學者用力于和敬當自求放心始耕樂說贈項吉甫耕非可樂樂道耳然則耕非道乎于耜舉趾是穮是蓘何者非道婦子饁餉年榖豐登何者非樂其樂耕也即樂道也七月一詩備陳先公風化終之曰稱彼兕觥萬夀無疆無逸一書歴言稼穡艱難繼之曰知小人之依乃逸天下真樂有過于耕者乎伊尹樂堯舜之道果在耕之外乎吉甫屬余書齋扁而告以此豈獨吉甫樂耕哉余亦願歸耕者因是以見志焉贈趙克家說温兮其若玉儼兮其若客昭晰兮見秋毫周迴兮三思我不如克家曠兮其能受休休兮若不足無榮無辱未散太璞我欲學焉而未能也願克家相與勉之深息說贈馬實夫實夫問余夜不得睡或授以移心法但當不睡之時思為孩時所為展轉思之自得睡矣余語之曰古之真人其息深深真人之息以踵衆人之息以喉遂書深息二字畀之實夫而有得于此勤于行行而熟當知或者移心之言不滿一笑樂山樓說贈馬實夫余嘗作仁者樂山銘曰瞻彼山兮形若塊然振古青青發育無邊靜乃如此妙不可傳仁者黙識以永天年實夫歸自東淮扁所居之樓曰樂山蓋有志于求仁遂書以遺之不貳室說贈伍清之中庸曰天地之道為物不貳大明之詩曰上帝臨女無貳爾心人心之無貳即天道之不貳一以貫之所以為先聖不貳過所以為顔子顔子曷為有過曰觀過斯知仁吾于顔子之過知顔子不遠復焉知顔子服膺勿失焉知顔子簞瓢陋巷不改其樂焉知顔子之屢空焉太空不貳顔子何貳融堂告清之之義切矣清之自知有過乎否乎未知其反觀知之其盡以告我融堂之言藥石也清之其毋忽題跋跋丙戌御書洪惟聖天子光臨大寶崇尚儒學堯章炳炳士習振起臣拜手稽首伏而讀之至矯偏適正崇雅黜浮之訓不勝興敬而言曰雅者正也崇雅即所以適正也厥初生人本無不正因習有遷乃流于邪誕者習妄輕者習浮庸者習汙懦者習媮由是澆漓卑苶之風成純厚典實之意泯本心之正存者寡矣挽而回之其必由學乎學也者所以反其不正而歸于正也善無小一得其正何用不臧惡無大一失其正他美莫贖戒之哉謹爾話言詳爾視聴居必廣居行不由徑邪思倏起改之即止正途坦然奚所擬議他時涖官臨民一出于正始足稱聖天子迪爾衢士之意雖然師道不尊學者安仰端榘矱揭範模師以正率之弟子有弗正乎蕞爾守臣敷述訓言勒諸金石於千萬年跋仁宗皇帝御書臣謹按國史皇祐五年狄青以樞密副使討儂智高余靖孫沔輔之青用番落騎兵張左右翼夾擊智高大敗而遁蓋仁皇之德威于是信矣兵刑一也古者大刑用甲兵仁皇兵威之信繇修明政刑所致跪觀奎畫深見聖心抑小臣備數司臬哀矜庶獄敢不兢兢以聖訓自勉跋高宗皇帝賜洪忠宣御書高宗皇帝賜忠宣公宸翰恩禮之隆如此惟忠宣可以無負矣忠宣直節千古有光權臣氣焰今何在耶權臣能抑其爵位而不能掩其修名能屈其身而不能奪諸子孫衣冠蟬聯逾久逾盛孫僴寶藏奎畫傳之無極觀者歎美高皇知公本心而追恨權臣欺君之辠天定勝人于此尤驗跋孝宗皇帝賜洪丞相䘏刑御書洪丞相當軸孝宗皇帝賜以䘏刑聖訓臣于其孫僴獲觀雲章斂容興敬而言曰天地之大德曰生刑非以殺人也而生人之德存我朝欽卹之仁追配三代聖子神孫世世勿墜天地同德矣國祚延洪維天相之某職在司臬每閱獄案如天鑒臨兹又佩服寶訓以自警勵一本至公無毫髮私庶不欺于天不負于孝廟且不愧于此心云跋徐逸平詩怗此邦尊事清獻趙公既祠于學矣嵗時郡守帥僚屬展拜其墓所以勵節行厚風俗也方將推廣斯意益求前輩師友淵源所自如徐逸平之師楊龜山者表而出之今得見逸平與其高弟鄭吏部詩篇斂衽三復良用感歎吏部之孫洋儻有志焉盡搜逸平遺書来當與學者共之是余之志也跋楊文公手抄李義山詩公之風節高矣如陽翟之歸知者以為脫屣富貴不知者以為直情徑行斥丁謂等事知者以為盡忠無隠不知者以為沽激要名心胸落落與世枘鑿名高謗隨勢固然也君子之所為要使知者知耳公之聞孫當塗使君以公手抄李義山詩示余因得盡觀諸公跋語夫遊戲翰墨尚為人寶玩若此則當時知公者雖寡後世知公者多矣知尊其名未知學其為人真知亦豈易得耶援筆敬書因以自警跋何叔度詩集友人胡牧之過余出示古括何叔度詩編吏氛中得一寓目如暑天凉風襲人襟袖想其標格超然逸羣恨未及一款談麈叩其所得于詩之外者跋楊文公手書遺教經世之好佛者多有福田利益之心公正色立朝無所阿附豈有利心也哉詳攷公本末雖為小人所嫉終不為小人所害王欽若陳彭年之徒忌公才名出已右隂擠而去之洎再入翰苑會寇忠愍之貶或以草奏事中傷幾不能脫丁謂本無陷公意遂免于禍噫重義輕利至使小人心服盛矣哉跋長沙幕府四箴長官之待僚屬政欲已出權畏下移能用其所長者鮮矣况望其肝膽無隔休戚一體如家人父子乎能以真情相與者鮮矣况望其訓導諄諄講明義理如師友琢磨乎粤山真公之帥長沙也待僚屬之意真如子弟朋友條為四事庸示勸勉幕屬王君既作四箴矣余申以一言可乎天下萬事皆原于心心本至靈已私障之已私既去洞然大公無適無莫常清常明律己也撫民也莅事也皆是心為之也亷而不本于心則有以敝車羸馬為亷者矣仁而不本于心則有以燠休姑息為仁者矣勤而不本于心則有以衡石程書為勤者矣是皆心未通乎大公智漫窺于小道故流弊至于此然則四者固官箴之要而存心又三箴之要心誠亷當辭而辭當受而受皆亷也心誠仁温如春生凜如秋殺皆仁也心誠勤職思其憂思不出位皆勤也兹所謂無適無莫常清常明不失其本心者歟余假守柯山朝夕與同僚語者惟求其本心明白洞達了無隠藏頗得講貫之味今又因王君獲觀此箴且真陳二君子皆為王君印可余輒于卷末微發未盡之旨轉示同僚而復歸諸王君云朱權敎序拜錄跋嵗序拜于學禮也曷為俄舉輒廢蓋曰是非所急故易視之耳敬禮之輿可易視乎朱君蹔攝教悼禮之廢敬謹而行墜典以舉嗣是者其常如朱君毋萌一易心哉跋厲李二夫人行實紹定已丑暮春某延請慈湖馮君振甫敎子家塾振甫慈湖先生高弟自其祖父經明行修世有令德某居同里閈亦聞其㮣矣一日振甫以二軸見示則其祖妣厲夫人與其妣李夫人之封制慈湖先生以貞孝二字表而出之有旨哉厲夫人之守志也子在襁褓貞矣李夫人之守志也子纔九嵗亦貞矣慈湖先生何以稱其孝曰貞德如姑孝莫大焉稱李夫人之孝貞可知也已而某獨有感于此者姑婦相繼咸以德稱德立家之基也貞孝立德之基也某觀世人之衣冠蟬聯光寵赫奕自謂能大其門而種德弗深牆高基下其頽可立而待孰如二夫人以德嗣德相為後先貞孝萃于一門芬芳遺于後裔基立矣保養封植則子孫責也振甫幼侍母寢中夜呼起苦口訓誘振甫今所植立無忝母訓又推以淑其子若孫焉德基既固日培日崇馮氏其興乎兹其所以有感而重起敬也跋歐陽伯禹行實余不識歐陽君陸伯微余友也伯微之徒張氏狀其行載所遺伯微書自謂于象山先生之學有㑹心處馮聖與吳規甫亦極稱之清修篤孝臨終翛然其亦可人耶巖居川觀之士世不知名者何限君尚有諸君之稱述不至湮沒援筆以書為之慨歎書魏子開行實余同年進士湯仲能剛直有學識余悼白鹿書院敝久習頹老先生淑人心之本旨鬱而不明非少更張不可遂屈仲能主之仲能辭再三乃任責行之一年規模煥然仲能一日過我因問匡廬善士仲能為余言堂長魏子開其人也今亡矣因出示行實一編讀之令人懐思其子萬里今為直學亦以舉職稱余不識子開因仲能以知其人抑亦有德之士也夫尹吉甫穆如清風之詩三歎夫德輶如毛民鮮克舉嗚呼知德者鮮自古而然余為之感愴因書以授其子萬里且勉以克紹前人云跋慈湖先生廣居賦慈湖先生既作廣居賦矣廣居之室後轉而之他先生之猶子叔正能復其故物夫廣居豈室廬云乎哉室廬有廢興而廣居萬古如一日也端平三年夏余屏處山樊叔正過余求紀其事且曰更為我敷暢廣居之旨余不得辭設客問以見意客問廣居之義何如曰坐一室牆之外無所覩忽焉步名園登崇臺心目頓豁遊城市未羡曠野之適俄而汎輕舠尋幽壑恍然疑非人間世此見廣也塗歌里諺朝夕薫習一旦縱觀都邑鐘鼔管磬之迭奏琴瑟竽笙之交作已為之洗耳傾聴况乎鈞天之樂来從天上吾乃得周旋其間相與共宴衎而聆雅音此聞廣也襟度曠夷規為恢張視外物如浮雲脫名利如敝屣與人則傾肺肝不事城府捐財則等泥沙不限繩尺是作為之廣未足為德心之廣也非意相干曽不介懐不虞得譽付之嬉笑疾雷破柱色不為動泰山壓前目不為瞬想其胸中汪洋博大澄不清而淆不濁是足以為廣矣而未足以臻其至也夫莫廣于天矣而周天三百六十五度四分度之一雖毫釐不差焉其微如此所以成其廣也然猶未也巧厯之所能算猶有盡也巧厯算數之所不及是無盡也無盡乃所以為廣也豈獨算哉離婁竭其明目眩而不能視師曠竭其聰耳聵而不能聴夫超于聲容之外者無所極也無極所以為廣也豈獨耳目哉激西江之水水窮而不可測殫南山之竹竹盡而莫能紀繪畫之所不能形容詠歌之所不能摹寫是必有妙于此者矣夫妙于此者其變動不居其出入如神闔闢無常奚可端倪運轉不息孰知紀極吾顧膠焉滯焉拘拘焉吾懼喪吾天窒吾淵何自而保吾廣大之全客難余曰一枝之託摶風之翼也坎井之蛙東海之鼈也蟪蛄之暫大椿之夀也何如噫嘻悲夫余告子以周孔之道而子乃詰我以莊周之寓言毋乃非其類也乎客曰敢問周公之大道曰言其廣廣乃狹不言其廣廣其庶乎曷謂不言其廣曰終日言未嘗言終日不言未嘗不言坦坦蕩蕩非偏非黨混混融融無際無窮左之右之何左何右一往一来何往何来廣居子居于何所掃方丈地臥六尺牀琴一張書一卷飯一簞水一瓢取于天壤間者纔若此而已世人憐吾之窮吾不憐吾窮而憐世人不知吾之不窮夫憐世人之不知未為廣也猶有彼已心也無彼無已浩乎太虛貴匪卿相賤匪癯儒富匪萬戸貧匪窮閭是可以廣乎曰未也卿相之貴如其貴癯儒之賤如其賤萬戸之富如其富窮閭之貧如其貧各足吾分各樂吾樂故曰老者安之朋友信之少者懷之是不亦太虚乎是不亦無彼已心乎無彼已心是謂道心子往矣吾已多言矣客拱曰願有記曰奚記為雖然固辭勿記猶未廣也遂即此為記而授諸子楊子書慈湖遺稾先生之言多矣門人馮興宗周之德取訓語之要聚為一編屬甫刻梓以惠後學或者病所取太少甫語之曰先生豈多言哉先生居處無一惰容接人無一長語作字無一草筆立朝大節正直光明臨政子民真如父母是皆先生純純皜皜之妙先生嘗侍象山先生發本心之問舉扇訟是非以答忽省此心之清明忽省此心之無始末忽省此心之無所不通後守永嘉謁先聖謂自幼學壯而始覺覺此心澄然虚明無體廣大無際日用云為無非變化嗚呼先生之學師先聖師象山先生吐于言辭的的真實一編已多矣奚其少題慈湖先生書孝本末凡禮經所載大抵皆為親存言之耳噫親存固當事親歿若之何而事之記曰夫古之人胡為而死其親乎親雖死而有不死者存音不可聞矣若聞其音容不可見矣若見其容豈音容哉此心靈明固不以生死隔也某不獲終某之身事吾親以為大痛朝斯夕斯常如先親之儼在前也欲報之德昊天罔極萬里諒同此心願相與勉之跋王次㸃論語說余為兒時先正獻言朋友遍四方俱善論今古第說論語罕有契心余黙識之用力于此書有年矣後始知不說論語乃善讀論語者今觀王君次㸃所著補義一編會萃衆說㫁以已意最為詳縝則又欣然曰不說固佳說亦佳說猶不說也噫得斯旨者可以讀論語矣跋方友民家藏五遂堂遺墨莊忠敬信勇五者一有不遂皆謂之非孝曽子之言光明洞徹讀之令人興起後世學者膠滯拘牽往往于訓釋言語間欲求大道不亦惑歟孔子既歿門人以有若似聖人欲以所事孔子事之强曽子曽子曰不可江漢以濯之秋陽以暴之皜皜乎不可尚已嗚呼使曽子不足以知夫子之皜皜其論孝安能有是言哉方君友民以忠獻為其先世名堂曰五遂且書曽子論孝一章方氏子孫寶藏之持以示某因勉之曰道若大路古今共由茍能不失其本心是亦曽子之孝也已跋趙黄陂所藏絜齋先生遺墨黄陂令君以先公遺墨見示某讀之泣下先公言由中出與人以誠此帖所謂進身之計不必他求但朝夕勉勵反求諸已自然感動孚格人誰不稱慕之即夫子言寡尤行寡悔禄在其中之旨也不肖孤佩服此訓其敢忘諸謹識卷末而復歸諸令君云跋彭忠毅誥忠毅鄱人也宣和二年方臘反次年公以衢州守臣抗賊力不支罵不絶口以死後一百有六年當寶慶二年余忝守衢緬懐高風為之太息又二年余持江東庾節嵗餘遷司臬自池来鄱實公通德之鄉適會盜起常山破開化江山迫信饒徽勢張甚余檄州縣飭守備請于朝調池兵捍禦賊幸不闖吾境今年夏公曽孫壻董君景陽以吳大夫所書公告身示余慨然有感每謂本朝祈天永命皆襃崇節義之力方韓起挾閩兵以叛公緣是失守賊平之後天啓聖明斬起福州而贈公直學士戮淫旌善黑白以分亦見公道之未盡泯而所以開高皇中興之業者此其基也余嘗語僚屬曰為臣但守忠節天鑒不遠豈負忠臣今觀忠毅益信故書其後跋象山先生集先君子曩嘗刋于江右庾臺矣某將指江左新建先生書院復摹舊本以惠後學先生發明本心上接古聖下垂萬世偉矣哉此心神明無體無方日用平常莫匪大道是謂極是謂精一是謂彞倫是謂乾健坤順是謂日月星辰山川風雨霜露鳥獸草木之變化是謂鬼神之情狀先生嘗言千百世之上有聖人出焉此心同也此理同也千百世之下有聖人出焉此心同也此理同也學者之心即先生之心某藐焉晩出景慕先生戰兢自勉寡過未能先生之道大矣奚庸贊述姑誦所聞附于卷末跋趙伯泳家集忠義天地之正氣也顔杲卿罵賊視死如歸魯公繼之亦大罵希烈以死兄弟風節凜然千載趙公一門先後相望忠義之大節實似之嗟夫為國者使正氣存則足以折亂臣賊子之萌矣嗣前人遺烈伯泳尚勉之哉題夏判官講義後講義筆之于書本以代口授耳自本意寖失講者惟以詞章為務學者以詞章視之于是書之所傳反不若口授之入人深也某承乏柯山訪求鄉曲之彦與多士切磋問學衆爭言判官夏君賢某悚然曰是不可俟君見我宜先候之遂躬致此請君辭再三乃幸許君儀狀偉特望之儼然而和氣薫人出言有味每一開講某率僚屬諸生拱聴時習堂上見其從容就座氣象不迫已足感人悟物至于言由中出不事藻繪尤得口授之本意君亦善說經矣雖然謂君為善說經則可謂經為止于是則不可書不盡言言不盡意學者當自得之跋先正獻公與傅君帖五兄既跋先君子之帖矣尚奚言哉深惟已德弗競家聲易頹一念及此萬感交集今觀此帖指學問之端的戒言行之愆違悼風波之溺人求幽明之無愧不肖孤斂衽莊誦若無所容其身嗚呼其敢不戰兢服膺庶幾寡過無貽先君子之羞題何智夫宗簿蘭亭帖平生好觀蘭亭而家藏未有善本自謂有固佳不有亦佳可以發好古者一笑跋陸君出示放翁帖余與伯微友愛如親手足因知深甫之賢真能世其家學者深甫早亡伯微又亡矣書院落成羣從弟子濟濟咸集深甫之季出示二軸余不識放翁也而睠焉思深甫伯微之賢不可復見為之太息跋楊贍軍家藏朱先生帖紹定己丑春余道過西興獲識贍軍楊君而未悉其家世也仲夏復過焉君又見訪袖出朱先生帖始知師友淵源家傳典型使人凜凜有生氣夫砥節厲行孰無是心然見危臨難未免失其所守者無他利欲奪之本心易昬故也孟子舍魚取熊之喻可謂深切矣平居暇日涵養講明義利之辨明如日星一日患難之来何至顛倒錯亂若平時無輕爵禄之念而臨事望其捐軀報國吾未見其能也楊君天資明美加之勉勉不已必能世其家者迺敬書而授之跋夏迪卿誌銘余舊識夏君迪卿幾四十年肯父以巨軸示余乃慈湖先生書水心所著迪卿誌銘篆額又陳北山之筆也既感迪卿云亡又感乾淳諸君子無一存者悲夫跋慈湖先生陸君墓誌慈湖先生誌陸君墓有足跡未嘗至庖廚一語注于旁筆力清勁藹然先生之道心見焉先生論兵主于不殺講求諸葛武侯李衞公陣法甚詳謂古者正兵不可敗與孟子不嗜殺人之訓若合符節嗟乎庖廚尚宜遠人其可輕殺哉安得壯士挽天河淨洗甲兵長不用撫事興懐為之太息䝉齋集卷十五
