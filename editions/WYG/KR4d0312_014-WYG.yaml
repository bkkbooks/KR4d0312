body:
  text: 䝉齋集卷十四宋袁甫撰記番江書堂記或問余曰子創象山書院于貴溪興白鹿書院于廬阜而又建番江書堂何也余曰子豈知余心哉余自為童子拱立侍旁每見師友過從攷德問業熟矣曽未十數年次第凋零及余兄弟游宦四方同志者亦往往間見未十數年又皆寥落如晨星之相望每為之慨然將指江東兩書院蓋士友所宗之地振而起之責實在余故凡士願處象山若白鹿者各隨其行輩與其望實或畀領袖之職或在賓講之選衿佩咸集彬彬可觀矣而余之所深慮者已成之材雖易于振拔而後来之秀未保其嗣續况士友之紛至非接其話言參諸履行則未可得其為士之實于是選通經學古士率生徒而課之余暇日亦數加攷察俟其有立也乃分兩書院而肄業焉此番江書堂之所以建也諸老先生遠矣師友道喪士習日駮慕超詣者無深實詳縝之功騖辨博者乏通貫融明之趣轉相依倣諸老先生之本旨愈晦不明方且徇偏見立異同幾有專門名家之弊其原皆起于論說多而事實寡然則羣居書院相與切磨亦求其所以為人者如何耳在家庭則孝友處鄉黨則信睦莅官則堅公亷之操立朝則崇正直之風果若是奚必問其自白鹿乎自象山乎不然飽讀舊書熟習遺訓孝友信睦公㢘正直一有愧怍自白鹿則白鹿之羞也自象山則象山之玷也可不懼哉書堂凡四齋曰逹源止善存誠養正而講道之道則名曰自得得者何井卦曰无喪无得往来井井井之義大矣哉雖汲而未嘗汲也故愈汲愈新雖養而未嘗養也故愈用愈有尚無有得寧復有喪本無可喪于何求得孝友也信睦也公亷正直也行所當行止所當止至平至常萬古一日何喪焉何得焉然則得云者得其無喪無得者而已放勲之所謂使自得之者得乎此中庸之所謂無入不自得者得乎此孟子之所謂深造自得者得乎此以此而學為人尚何論說之勝而事實之微乎尚何徇偏見立異同而有專門名家之弊乎嗚呼番江書堂之學子而果不失諸老先生之本旨也即所以教白鹿象山之學子皆不失諸老先生之本旨也伐木之詩曰神之聴之終和且平學子服膺斯言吾見道德一而氣脈長矣勉之勉之奉化縣舒先生祠堂記先生墓在奉川松谿里其墓碣慈湖先生所作也先生興教新安其祠堂先君正獻公所記也今奉川邑大夫胡君逸駕景行前哲聿新祠宇率邑人尊事之又俾某為之記顧藐焉晩學何足窺先生之仞牆雖然自兒時見先生每過家塾拱立侍傍已有所興起又觀先生所說三百五篇與我心契似若有得弱冠因仲兄就先生學于新安歸言飲食起居之詳與先正獻公所稱若合符節後與先生諸子交益知家法之懿闔族聚居交相敬愛皆先生有以表倡之某雖未嘗數侍先生之謦欬然其獨得于心者有不可以言語形容盡而非假言語又無以寫我心請因胡君之請而有述焉先生真有道之君子也道非形器非離形器先生内美充實可謂有孚盈缶矣而即之若虛叩之若無第見坦坦蕩蕩洞無城府温温謙謙不異常人終日窮年應事接物小心畏忌周旋規矩而超然常與造物遊陶陶乎浩浩乎生乎天壤之間獨能餐此天和享此真樂而未易與世人言也故先生之胸襟光風霽月也先生之節操山高水長也先生之詠詩天籟自鳴也先生之作文鳶魚飛躍也洙泗風雩之氣象先生有焉處逆境不知其逆也居順境不知其順也千變萬狀自為紛紛而不知其為千為萬也亦不知其為一也先生之言曰敝牀疏席總是佳趣櫛風沐雨反為美境此先生之學所以深造自得而某之所謂真有道之君子也其他稱述已多矣奚以贅為胡君與余俱甲戌進士邑政不擾而人安之其為先生立祠也豈非斯道有黙會于心者耶雖然先生之道揭日月而行某之假守新安嘗為先生請易名于朝矣而卒未果遂胡君倘持是而申前請焉必有慨然主盟吾道者先生諱璘字元質後宰温之平陽終于宜之别駕云浮梁縣修學記令治百里簿書期㑹之外以興修學校為急難能矣然修學而已爾學修而士無以養又輟餘財以助贍給難能矣然養士而已爾衿佩来集絃誦琅琅又嚴程督以進材藝難能矣然課業而已爾潘君材之宰浮梁也三者皆優為之一日貽書于余且言令邑以来縮浮費葺學宫凡門廊齋舍煥然更新又創傑閣崇奉奎章學租所入有限則捐帑廩濟其乏春秋補弟子員月有試旬有課駸駸可觀矣請記之余去年春觀風至茲邑嘗集屬僚暨諸生講道矣咸謂余迂令今偕羣士求記是弗我迂也令弗我迂固當士弗我迂其亦有感乎桑麻菽粟舉世不以為迂以其能生我也人非道不生而舉世一聞談道則以迂目之道固在桑麻菽粟外耶目道以迂則不迂非道也甘不迂之利犯非道之名道實生我而欲違道以謀生吾甚悲世人之惑也令不謂我迂是不目道以迂也令不目道以迂環百里之士若民皆不以道為迂孝而親敬而長行著習察勿失秉彞道化其將興乎余嘗語兹邑之士曰令之新政是一初也士今日聴講是亦一初也此初嘗新則日日如初令勉之士勉之余亦因以自勉焉精神閣記有吳君自盱江来貌甚樸野謁余言曰吾家世耕且學幼習父師訓有志斯道建一閣舍傍朝夕講學焉其為我銘且記之余曰子豈專為是来耶吳君曰吾尊慕慈湖先生有年矣今幸得見先生誨之勤勤余曰先生何言袖出一紙先生書孔子曰心之精神是謂聖余曰子迺得此于先生其兢兢寶之哉盈宇宙之間莫非精神也先聖即是以啓後學先生即是以師先聖子之閣也即是以名之余之記也即是以申之天地變化天地之精神吾心之精神也日月照臨日月之精神吾心之精神也是閣之上聚六經羣聖人之書六經羣聖人之精神吾心之精神也環以先賢之像先賢之精神吾心之精神也登高而望前雲嶠後雷峰左柏山右松嶺層巒疊嶂雜然森列者不可勝數晨昏出沒煙雲吞吐萬態呈露盡得于几席之上景物之精神吾心之精神也子仰而顧俯而察昭明有融本無障蔽終日乾乾何有窮已涵泳于斯藏修于斯㑹朋友于斯心之精神交暢旁達泰然無思而非無思寂然無為而非無為嗚呼旨哉斯先聖之訓也斯先生之教也雖然余豈敢謂造此道哉姑誦所聞而已子其勉之余亦以自勉焉南康軍四賢堂記南康史侯作堂祠四賢而以書諗余曰濓溪晦庵二先生俱嘗守是邦而劉屯田父子隠居廬山下壯節冰玉堂及劉氏故居記皆晦菴筆也余覽之慨然曰侯其有意于風化者耶濓溪五十餘上南康印綬分司南京屯田為潁上令不能屈節事上官棄官入山祕丞亦落落與時忤仕迄不顯而晦庵在外不過九攷立朝纔四十日嗟乎四賢之風節如是世之高此四賢者亦曰不以爵禄動其心而已抑余竊謂以退為高非四賢之志也濓溪自為小官屢爭獄事洎持節廣東不憚瘴毒之侵雖荒崖絶島人跡所不到處皆緩視徐按務以洗冤澤物為己任卒以是抱疾其言曰可止可仕古人無所必束髮為學將以設施必不得已止未晩也劉公父子節義凜凜祕丞蓋與荆公有舊欲挽使修三司條理終不為屈未足多也而盡誠規益謂所更定法令不合衆心宜復其舊使荆公早用此言豈至稔異時生民之禍若是慘耶晦庵歴事三朝忠誠懇惻之意具形奏疏大抵排和議詆近習抑宦寺不遺餘力而至于君心隠微人所難言者亦每每控竭無隠孝廟眷之厚先生封事有曰日月逾邁如川之流一往而不復不惟臣之蒼顔白髮已迫遲暮而竊仰天顔亦覺非昔時矣嗚呼忠愛之語吐自肺肝與淺丈夫自潔其身者奚啻霄壤然則四賢豈不欲用于時而必以名節自見哉論者第見濓溪先生酷愛廬阜乘興攜客自放于山巔水涯之間而陳令舉與屯田騎雙犢往来山中殆類高人勝士之為者而孰知伊洛之學自明道伊川以及延平乃考亭平生尊慕以為立身之實地者皆光風霽月之餘韻而史學獨擅一家卒以助成司馬公通鑑之巨典者亦自青雲白石之深趣来耶言施于事則非空言學可及物則為實學不茍合者必合道者也不求世用者必能用世者也余既以是復侯書又為敘次其本末俾刻之石以詔来者使皆知夫四賢經世之實如此則其于儒道之功用不為無補云爾樂平縣慈湖先生書閣記先生之訓曰舜曰道心即心即道何道也熙帝之載亮采惠疇載采事也疇類也凡流行乎事物之間理當如是而不容不如是者何往非帝載乎何往非道心乎從五典敘百揆穆四門祭大麓是帝載也皆道心也察璿璣覲羣后舉元凱去四凶是帝載也皆道心也舜命禹昌言禹辭焉曰予何言予思日孜孜乃歴敘其身之所親歴刊木濬川暨稷益播奏艱鮮與凡懋遷之事禹親承舜道心之傳而所謂昌言乃如此是帝載也皆道心也嗚呼果可以有精麤本末論哉果可以無精麤本末論哉果可以置有無精麤本末之論哉謂有精麤本末者卑云乎哉謂無精麤本末者高云乎哉置有無精麤本末之論者不高不卑云乎哉皆論說也非事實也先生每舉易大傳曰書不盡言言不盡意噫先生其得之矣書閣之建邑之令佐謝君溥許君應龍與夫有職于學者舒君益而下凡十有四人薈萃先生所著羣書于閣而率學子日觀習焉蓋先生嘗宰斯邑矣邑人沐先生遺化歌思至今弗忘故惓惓于其遺書如此閣既成而求某為之記某竊謂先生無意著書也道非思慮所可及非言語所可盡先生無意著書也先生自幼志聖人之學久而融貫益久而純平生踐履無一瑕玷處閨門如對大賓在闇室如臨上帝年登耄耋兢兢敬謹未嘗須臾放逸此先生之實學也凡先生之所言者言此而已學者之所以學先生者學諸此而已若夫外盛而内不足名似而實未有得焉者乃先生之所深戒而先生亦不願學子之萬一有是也嗚呼差之毫釐繆以千里敬之哉敬之哉華亭縣修復經界記楊君余舊友也自華亭馳書来告吾倣經界法為悠久利事成具顛末示余且曰質言近俚其潤色之余曰古有方言奚俚之病直書不亦可乎華亭浙右壯邑嵗入苖號踰十萬石實六萬七千有竒而縣官嵗督纔三萬八千止蓋自紹興經界迄今百年官無版籍吏緣為姦隠匿詭寄弊倖非一重以此邑西連湖北枕江東南竝海田齧于水無嵗無之由是賦役俱病貧富交困而爭訟四起矣紹定五年楊君来為司征越明年監簿趙君與出守嘉禾整圖籍寛賦斂欲自近邑始招君幕下置圍田局募甲首給清冊命之曰抄撩匿者露虛者實乃檄君攝事華亭君日受訟牒力究弊源蠲胥吏白納之錢貸民戸積欠之賦弛酒稅無藝之征德意漸孚矣則以禮屬鄉官分任其責不履畝不立限不任吏每都甲首鄉官擇之每圍清冊甲首筆之田之頃畝昭然可觀邑士民相與舉令于州州上之朝俾遂為真夙夜黽勉以竟前功賦籍一定詭挾有歸既又白郡以北三鄉上田賦重則盡降而為中以北三鄉折糯價重則復減而從輕以青龍鎮地積計稅重則盡降而從畝以邑郛及諸鄉浮財物力頗為民擾則止以實産定和買役錢之數令可謂盡心也已又稔于衆曰吾當與爾曹減槩量之贏以示優恤未幾明天子新更大化誕布寛政痛減斛面盡蠲積逋令得奉行上意不負初約于是端平初元秋苖以五萬七千八百一十石為額較遞年之數逾二萬而民不以為厲已創屋四楹于縣㕔之東扁之曰圍田文籍庫或問令曰子謂察情偽防蠧弊盡于是乎令拱手曰不足不敢不勉有餘不敢盡吾素學也討論修明則有後人在余壯此言類知道者今世孱吏不足道能吏往往以有餘自誇不知餘而必盡意味索然根本且日慼矣令言有契余心于是乎書東莱書院竹軒記竹軒者成公東莱先生會友之地也先生愛竹與心黙契勁直之節清遠之標鏘然鳴玉之聲蒼然不老之色光風皓月入我懷抱琅琅弦誦上下酬答時當大夏鑠石流金一見此君洒然物表雪霜凌厲萬彚摧折惟有此君獨立不懼是皆足以發深省助加鞭麗澤書院之法家拂士也先生生而愛此歿獨能忘情哉物之廢興時也不隨時廢興道也軒故待制陳公肖巖之廬先生講道于斯後廢弗葺嘉定更化門人創先生祠取軒之舊扁揭于東廡紹定六年今宗正少卿趙侯必愿為婺守以在官之田二十五畝易鄰牆老子宮竹園將復舊觀而未果嘉熙改元吾友履善韓君祥由武學諭来貳此邦學徒俞箎持先生猶子巽伯敘竹軒本末謂履善曰祠今錫額為書院趙侯所易地築軒以嗣遺響可乎履善是之攝郡事肖望張君渭叟與履善同寅相好也捐楮五十萬米十斛屬理掾趙君師乘涖其役既又慮費弗給肖望輟俸餘二十萬履善十萬佐之末幾落成臨以方沼繚以周垣雖近市而不囂似避世而非隠豈先生之道然耶道不與軒為廢興軒有成壞道固長存履善貽書請某記其事某曰朝家命我假守至再矣銳欲拜先生祠下俱尼于病愧我麗澤雖然願一言為諸友告某嘗詠竹云竹虛中虚乃實得乎此永勿失諸友相與切磋究之二年仲秋後學鄞川袁某記武學經遠齋題名記止戈為武武有七德經遠名齋經世云乎哉經德也禁暴戢兵保大定功安民和衆豐財是謂七德經之為言常也常保是德必學而後可學殖也殖之固德乃常矣漢人有云縉紳之儒守和親介胄之士言征伐今或易之縉紳談兵而介胄且議和矣嗚呼此乃學不明之過也孟子曰入以事其父兄出以事其長上可使制梃以撻秦楚之堅甲利兵矣格言大訓超于和戰之外而獨探本原如此自綱常不明人心汩溺利欲中平居視父兄長上為何事驅之行陣曳兵而走此其源委蓋上無禮下無學勢所必至是乃為國隠憂區區和戰又不足云矣齋舊有題名今復新之裒姓氏勒堅珉以貽後匪徒為利禄計而已經德止戈之義朝夕觀省于以助麗澤講習之功抑以副聖朝樂育之意云鄞縣學乾淳四先生祠記鄞縣立學舊矣中廢不振嘉定間主簿呂君康年聿新規制垂成而去嘉熙改元趙君希聖来居是官首白宰上之府請益廣教養益宏斯道且謂近代師表如南軒張宣公晦庵朱文公東莱呂成公象山陸文安公四先生未祀于學寧非大闕遂併力舉兹事屬某為之記固辭弗獲乃言曰夫道一而已矣學者各植門庭將以自尊其師師道不如是也三代既遠漢儒專門名家破碎大道自時厥後紛紛籍籍不能會于一我皇朝大儒繼作始克合百川而宗于海中興以来四先生身任道統之責悉力主盟凡修之身行之家用之國推以淑諸後進皆天理人彞如桑麻榖粟鑿鑿真實不可誣已四先生無二道而學者師承多異于是藩牆立畛域分所謂切已之實學忠君孝親之實心經國濟世之實用暌離乖隔不能㑹歸有極反甚于漢儒可悲也夫殊不思乾淳以来四先生相為後先所以明義利别正邪羽翼吾道果為何事弟子之尊其師當先識其師之道大本必正大旨必明則道在是矣奚必于一話言之間一去取之際屑屑焉較短量長以是為能事哉迹類而心殊名同而實異乃後學之大病又豈可以累四先生耶若夫四先生之自相切磋則固有不茍同者矣正以道無終窮學無止法更相問辨以求歸于一是之地是乃從善服義之公心尤非後學之所可輕議也今趙君合祠四先生于學超然出于各立門庭之表其于大道之統必有得焉者矣上天之載無聲無臭愚又奚言惟願同志者勿自欺其心殆庶幾矣乎安邊所公宇記洪惟我孝宗皇帝申儆軍實豫備邊用聖算宏遠矣開禧權臣貪功啓釁舉積貯而一空之我寧考用悔于厥心迺更舊轍講實政謂儲蓄國之大命也捐所籍權倖田宅及其他沒入之産與圍田舊隸于官者總嵗收之數受而藏之名安邊所校其所入日計若不足嵗計則有餘始命御史提綱厥後以版曹或都司寺監官畿漕領其事端平初復取浙右臬司及諸郡倅貳所掌之課自督嵗輸責任逾重嘉熙之元有司不戒于火所亦遭燬今宗正少卿樞密副都承旨趙公以夫時以宰士實兼斯職慨然歎曰邊儲贏縮闗國安危官庀厥司公宇其可緩遂請于朝更造焉益以主管官舊廨為㕔為堂為燕坐為寢室為庖湢之屬隟地為圃環植脩篁以游以息中門之右甃壁䥫鍵圖籍是藏翼以更舍創主管廨于修文坊之北費緡錢二萬六千有竒經始于是嵗孟秋之癸酉告成于季冬之壬子而貽書屬某為之記某告之曰記將以傳遠欲俾後人永久勿廢耳孟子稱出無敵國外患者國恒亡安邊之名凜焉在目邊境不可一日不安則儲蓄不可一日不備此所以仰體寧考保邦息民之心而迓續天命于無窮也其誰敢廢之公復書曰願即此為記公内和外剛臨事不茍某所敬也于是乎書耕樂堂記樂在耕乎耕何足樂樂不在耕乎舍耕奚樂或曰樂道耳曰道在耕乎耕何以見道道不在耕乎耕奚為不見道古之聖人見也非見也無見也非無見也以道為可見正明目而視之不可得而見也以道為不可見立則見其參于前也在輿則見其倚于衡也有所見則樂不可見則不樂乎不可見則樂有所見則不樂乎見其不可見真見也樂其無可樂真樂也請以是贊耕樂黄州重建學記齊安郡博士馮君去病興崇學校以書請記于某且曰明道伊川二程先生實生黄陂邦之人士祠之至今某深惟二先生以正學為天下倡我宋儒道繇是大明上接洙泗統緒顧晩學無似正願與學子茂明之明道先生嘗與横渠先生論性矣其言曰動亦定靜亦定無將迎無内外茍以外物為外牽已而從之是以已性為有内外也又曰今以惡外物之心而求照無物之地是反鑑而索照也嗚呼至哉言乎學者不識性或溺虚空或膠意見譊譊焉騰口說而于切已之實了無相闗伊川先生曰聖人之言如彼耒耜陶冶之器一不制則生人之道有不足矣後人所為動多于聖人然乃無用之贅言雖真失正反害于道某三復斯言惕然内省夫以已性為有内外拘牽固滯大本不明而顧以言語誦說為能正使充棟汗牛祗以為損實有何益某自懼不能免斯病也學子亦嘗深省密察乎天高地下萬物散殊神用昭昭倫理井井動靜一内外融何以多言為上帝臨女果見其臨乎見者孰見神之聴之果知其聴乎知者孰知學子毋謂此道為高遠易存存詩書兢兢禮洞洞屬屬存此而已敬此而已躬行實踐自成自道不能存不能敬罪實在我何可自恕果能是卓然真知性無内外不墮拘牽之失而誦詩讀書確然真如耒耜陶冶之適于實用則于學道其庶矣乎齊安淮名郡俗淳朴有古風當邊事繹騷之日遑恤庠序馮君勇不顧謂忠孝正于多事見興學其可緩諸請記之書歉然不有已功歴敘經始及佐費皆前任人與長官力噫斯足以見馮君之言近道矣其庶不負二先生之遺訓矣是宜書襲桂堂記國朝承唐舊以進士為重人不榮世閥而榮儒科風俗流傳有年矣襲桂堂者武恭楊和王四世孫名白字淳則之所名也高廟南渡初武恭戮力王室勲在竹帛孳孶誨子業儒惠懿公諱偰惠敏公諱倓直敷文閣諱㒜儒科踵接上嘉武恭有子陞甲以榮之淳則登嘉熙二年戊戌進士第朝廷用前比陞淳則四甲今需次分司鎮江諸軍糧料院上距敷文公八十有五年流風餘韻輝映先後襲桂之名不忝矣余讀楚辭淮南小山招隠士有曰桂樹叢生兮山之幽偃蹇連蜷兮枝相樛山氣巃嵸兮石嵯峨谿谷嶄巖兮水曽波猿狖羣嘯兮虎豹嘷攀援桂枝兮聊淹留其末章曰王孫兮歸来山中兮不可以久留夫招隠而咏桂何也若曰桂生巖中隠士在焉猿狖之與俱虎豹之與羣桂雖可攀援然非可久處盍歸乎来此招隠所由作也國于天地必有與立君臣之義如之何其廢之攝世科躋膴仕以是為桂若何吁桂乎桂乎義豈盡此乎仕途險巇君子畏之挹此桂芳莫如清白武恭忠貫神明出入兵間四十餘年避寵辭榮無少瑕玷休光鴻烈衣被後昆蓋嘗以清白名堂今與襲桂對峙而竝垂芳焉吾觀後漢書君家與吾鼻祖位登鼎鉉號東京名族俱流傳至今淳則勉之顧瞻典型動循禮度自待其身常如未第時則姓名益香矣余病世人未識桂之所以為桂故特發小山之微旨以見未為時用香藴諸身招之使来香滿斯世他日倦游而就閒晩節之香不愧青史斯其為桂大矣武恭種之于前淳則襲之于後子子孫孫又傳襲至于無窮與世間凡種迥殊此乃吾自有之物非襲而取之之謂也昔嘗與淳則同寅知其美秀而好修茲請余記其事故以祖烈期淳則亦因以自警焉信州自鳴山孚惠廟記紹定二年余持江左庾節是秋盜起江右地與信屬邑接飭官吏嚴隄防盜伺間迫貴溪境遙望戈甲鏦錚旌旂照天怖而走時防守兵實不多民間讙言神助越明年冬余司臬事又明年春盜起衢之常山聲撼旁郡永玉兩邑民奔逃弗可禁余亟集尉寨卒糾鄉豪募兵晝夜警衞檄郡調禁旅白于朝益以大軍力扼衝要我軍稍張然盜烏合滋衆屢窺兩邑卒憚莫前若有尼之者民間又傳神助與前年貴溪事相類余慨然嘆曰神人相依而行惟自鳴山之神以孝聞天下繇昔迄今餘八百載我朝襃大王封夐絶前世為民祈禳靈應如響銷寇暴安善良功德茂焉天下之惡一也牛昌隠譖言之禍王不報不止盜賊夷人丘墓戕人父母離人妻孥焚人廬舍不知幾牛昌隠也民之仇盜猶吾仇也忍坐視乎雪父母仇孝也雪民仇孝之推也王孝于親推孝于民民亦致孝享于神感王庇庥思報王德余今年春觀風部内親至王之祖廟感愴久之命工飭材聿新祠宇及秋訖功廟貌尊嚴制度恢張從民願也然則邑人所見戈甲鏦錚旌旂照天者曷信哉信乎民而已矣凡繕修之費與祠事之詳及夫程督之官若吏皆載于碑陰而此弗錄非略也神之炳靈隨叩隨答水旱螟霜癘疫之災禱而應者屢矣余四年間目擊其事此尚不錄况其他乎春秋常事不書復仇則大之王復仇著孝弭盜靖民誠有足大者他事不書而此獨書春秋法也淳祐六年夏匠丞懋齋章侯著到郡未幾郡以不雨告首迎兹山神作梵事隨獲甘澍嵗事以登七年夏浙江皆告旱後又三迎王于公廨而三獲嘉應曽不移時他處困于異歉此邦獨至屢豐蓋侯之牧是邦也迎養芸翁于郡之凝香綵衣怡愉恪盡其孝王以孝其父者孝其民侯亦以孝其父者孝其神以及其民一念之孝兩相契焉宜其隨禱隨應不啻聲相應言相接也吁幽冥杳漠之間人謂未易以精神貫通也觀侯所以禱其神與神之所以聽之者則孝悌之至通于神明益信其不誣矣百拜敬識庶使来者知信之民無忘神與侯之賜云沛然堂記吏部郎趙公師事象山陸先生某嘗獲觀先生之書云積雨小霽始得一訪風練飛雪之壯方念不得與賢昆仲共之是晩来書適至喜可知也去非從善勇決如此沛然之壯在胸中矣何以觀瀑為哉又從而敷述其義援虞書克艱儆戒之說反覆數千言某未曉所謂去非者何說讀至書尾則云若汩于利欲蔽于異端逞志遂非往而不返雖復雞鳴而起夜分乃寐其為病益深而去道愈遠矣奚足以言此哉某于是知先生之所謂非者蓋指利欲之蠧異端之害而言之也惟沛然之壯則能去此非少有依違牽制繚繞繫累之意則決不能去此非矣學者讀先生之書玩先生之旨寧不躍然有感于中曰壯若有力實非一力一勺之水非少及其不測也非多發于涓涓者非始會歸于江海者非終其訪風練飛雪也非物其去非從善也非我第見天壤之間皜皜融融無際無畔淵淵浩浩不識不知克艱者艱乎此儆戒者儆乎此明明穆穆聚精㑹神者切磋琢磨乎此也嗚呼妙矣哉吏部諱師雍字然道其嗣希聖主鄞縣簿謂某曰先人嘗築堂于家塾扁之曰沛然將刻先生之書以詔後之學者而未之遂也今吾礱石矣其為我記之某何能措一辭哉姑告之曰沛然在胸中何以觀瀑為終日觀瀑元非觀請參斯旨毋自迷趙君唯唯遂為之記金斗書堂記吾友張伯常龍泉人書来為其鄉人鮑君求金斗書堂扁且曰書堂之建將聚鄉族之子弟而敎之每嘆世降道微誰復以講學為急務鮑君獨能捐已財誨後學此意良可嘉尚雖然其本在擇師師不必他求伯常學醇行方氣充識明可以為師矣余屢欲屈伯常于象山書院以地遠故未果今里閈近也金斗專也近則無往来之勞専則無暴寒之患行于鄉然後推于他郡豈惟伯常之學推而淑諸人將見金斗書堂之澤自是浩乎不可量矣伯常試以是語鮑君鮑君儻從吾言甚善不然書堂之扁不可以私藏于家其盍歸我乎䝉齋集卷十四
