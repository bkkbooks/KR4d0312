body:
  text: 䝉齋集巻八宋袁甫撰制王鑑特授拱衞大夫某州觀察使制敕具官某詩曰赳赳武夫公侯干城又曰赳赳武夫公侯腹心夫武力之士外敵王愾而内託腹心賞以懋功豈拘常比爾淮安之功雋矣進橫階登廉車疊此寵章匪直賞邊功而已羽林千列師律靜嚴隱然有虎豹在山之威焉尙厲爾志庶乎無忝王與權除大理少卿制敕具官某漢制廷尉卿一人設屬雖多而不立貳哀矜之道略矣我國家損益歴代之制並置卿少以率其屬而天下無寃民匪得其人曷副茲選爾才敏而周識明而恕踐更中外休有聲稱固嘗典成均而教國子矣夫明刑弼教類非俗吏所能爲也爾其體建官之意推好生之仁俾四方奏讞悉協于刑之中則朕以懌尙敬之哉齊碩除大理卿制敕具官某朕哀矜庶獄思得廉平審克之吏爲理寺長庶幾悉聰明致忠愛民自以不冤爾屢更麾節以治行著退居閭里不競聲利朕甚嘉焉擢寘月卿班序寖高在書有之非佞折獄惟良折獄佞有口才良本德心一趨舍間正邪以判欽哉有德惟刑長我王國則予以懌史湜林炎並除大理評事制敕具官某漢詔置廷尉平日其務平之悉聰明致忠愛毋撓法毋留獄是謂平吏或持巧心以苛爲察洗垢索瘢不恤滯淹平于何有爾湜舊有位炎新以才選皆明習法律往卽乃僚哀敬折獄勿失其平時乃之休欽哉安泳錢杲卿並將作監丞黃特大理寺丞王彥雍大理司直周䅘大理評事制敕朕于人材必取之治民觀所從政蓋學而習焉鮮有敗事未聞以政學者也汝等習爲吏矣滋識情僞能迪訓典以序進陟益觀汝能王埜除太府少卿兼權樞密副都承旨制敕具官某嘉定初爾考介侍螭陛兼掌掖垣論事無所囘撓清風勁節至今不泯爾才識兼茂能世其家者也自爲樞掾裨益居多今進爾外府少列而宥密導旨亦仍其舊夫兵財當今急務也毋但曰錢穀甲兵之問不至于廟堂讀周官一書則得之矣尙其懋勉以稱朕嘉奬之意何處久除太府卿制敕具官某周禮列外府于天官之屬厥有旨哉冢宰制國用總其大綱而條目則付諸人爾敏才精識達于經義踐敡中外熟知財用之本末源流矣茲擢寘卿列其爲朕謹出入察盈虛致上下兼足之效非惟法守舉職而道揆之地亦有賴焉此周人命官意也尙其懋勉嗣有襃嘉趙必愿除右司制敕具官某乃祖忠定光輔寜考厥功茂焉朕思其人不可復見爾能世其家猶乃祖之不忘也屬時多事嘗攝宰掾著聲稱矣就俾爲眞益昌家學以稱朕意李宗勉除司諫制敕具官某臺諫均天子耳目之官也然糾官邪者在于論議之間而沃上心者超乎言語之表設官之始寓意各不同則居其職者可不體斯意乎爾涵養之素渉歴之深講求之熟旣已爲朕烏臺振風采矣閱歲滋久嘉猷屢聞此特得于議論之間者耳峻升諫省以繩朕躬又將觀爾于言語之外焉格心之道由明處入大易納約自牖之義也朕每患剛德之未充而善政之未固汝何道以開朕心之明而立于寡過之地乎用卿不盡其責在朕臺省徧試亦足以究卿之蘊矣虛懷以竚尙其懋哉李韶除正言制敕具官某朕觀慶歴中御筆三諫官之除臣襄作爲歌詩有風采動朝端之語至今讀之猶有生氣信哉忠言有益于國直道非以要譽至公血誠壽此氣脈繄名儒是賴爾經明行修外和内剛諫垣之選朕審之久矣國歩孔艱意者朕德多闕而政未得其理歟自宮庭以達于朝著皆爾所得言也一念懇惻有犯無隱使遠邇中外由此改視易聽不敢有輕量之心則先朝得人之盛尙庶幾見之婁體仁除太學正制敕具官某太學賢士之關而糾其未迪彝教者正之職也爾端靖自將雅有譽處以躬範物學者象之記不云乎禁于未發之謂豫相觀而善之謂摩欽哉杜範除監察御史制敕具官某朕自更化以來擢骨鯁之士布列憲府斥佞排邪王道以清嗚呼正邪賢佞消長之際亦可畏哉泰之六四曰翩翩不富以其鄰不介以孚察乎此顧不當爲杜漸防微慮耶爾清介之操表于朝著剴切之論粲于奏篇善人附焉憸人懼焉風憲之任爾宜當之其爲朕明目張膽折姦萌窒蠧穴維持國是俾勿替更化之初豈惟宗社賴之抑亦爾有令聞吳昌裔除監察御史制敕具官某六察之任所以糾官邪肅朝綱也非得論議動衆心憂國如飢渴者曷稱兹選爾西蜀之英中朝之望節㮣甚偉問學日新其于古今治亂與本朝典故嘗熟講之矣每在周行覩國有闕政侃然義形于色今居言責可替素心其思藜藿不採之喻勵精金百鍊之節不避權倖不受調停斯爲眞言官矣朕更化兩載治未云獲樂聞忠讜猶初意也我毋爾諱爾毋我負懋哉李襲之循資制敕具官某千里餽糧兵家患之往者西陲用師糧道脩阻爾竭力集事迄無乏興制臣謂爾才朕非吝賞姑進選階尙迪來效吳源特贈迪功郎制敕常棣之詩曰凡今之人莫如兄弟我有良臣曰吳柔勝諸兒競爽長子源最賢不幸而夭淵其弟也援紹興舊比以官賞爲乃兄請因心則友朕有感焉源而有知服此休命尤焴除兵部郎官兼淮西制置制敕具官某朕簡拔賢俊畀以麾節方面之寄尤不敢輕茍以稱職聞則必授之爵秩以風勵遠邇蓋司勳頒爵意也爾故家人物志尙恢宏更歴旣多夷險一節可以驗所學之實地也入儀周行禆贊機務言論規畫有足大者合肥爲今重鎭疇咨得爾果勝其任坐鎭而綏禦有方轉漕而調度不乏以爾能事寛我顧憂欲增重于使權爰肇開于閫制擢躋戎部足爲望郎其所謂遠而有光華耶郊壘尙多其益思修備固圉强本折衝建爾殊勳對我休命陳康義除郎官制敕具官某花萼相輝今古罕見爾一門三秀或挺挺尙高風或恢恢崇大體爾處其間兼此二美龍舒之政蔚有令聞朕甚嘉之晉爾省郎蓋將引以自近昔汲黯願出入禁闥蕭望之雅意本朝宜疾其驅副予延竚袁申儒除攷功郎官兼檢詳制敕具官某士有抱負器業多所敭歴晩乃晉登朝列其于世故飽義理熟則裨贊之益必多爾通經學古困而後亨克繼世科屢更麾節召至儒館鬢已霜矣晉班郎省仍掾機庭惟公則選曹無私惟勤則宥密有賴尙其懋哉用增光于前聞人則予汝嘉范鍾除吏部郎官葛逢除都官郎官制敕具官某等朕惟郎選至重必屬聞人儻或輕授非所以應列宿凝庶續也亟起家食之賢序進周行之彥爰得二人以稱兹選爾鍾問學平實爾逢資稟朴茂士論推許素有定價且敭歴多而世故熟矣朕患吏道不清而選法日壊正有賴于銓綜之公而都官一職卽古司隸亦顯曹也各敬爾事贊爾長以無負朕選任之意李韶除吏部郎官制敕具官某朕自更化以來省闥之官未嘗輕授議者謂六曹事劇郎多虛員而銓部未公尤爲大弊必得儒英熟知當世之務乃稱斯選爾敏而篤學介而通方本諸躬行施于有政藹然廉平之譽搢紳高之肆疇郡最徑陟刑曹兹復付以銓衡之任其爲朕甄别能否振拔滯淹俾吏道清而庶績熙尙其懋勉嗣有襃擢王氏特贈和義郡夫人制敕朕觀五代史著李氏斷臂事其言曰士不自愛其身而忍恥以偷生聞李氏之風宜少知愧夫李氏惟不辱其身而已非以身殉國也曩西陲有狄難爾一弱婦人乃奮然詈賊以死映世之名寒如雪霜殉國之節視古烈丈夫有光焉豈李氏得比乎賜湯沐邑建號小君以奬烈魂且以愧爲士而喪節者何琮母包氏贈令人制敕母氏聖善我無令人國人稱願皆曰有子爰錫漏泉之澤用酬陟屺之思具封某氏禮謹采蘋心勞吹棘雖生弗逮千鍾之養然歿已霑屢命之榮宜廣蕃釐式昭寵數少答擇鄰之教以開奕世之華鄭發先封父母制敕具官某祀明堂而民知孝于是老老之恩溥焉爾夫婦偕老有子從仕可無勸乎宜均祭澤錫以官榮服我命書永娛釡養楊汝明父大全贈少師制敕朕若稽故典深體人情揚名顯親所宜先于禰廟施祿及下豈復間于里居爰因熙事之成増煥密章之寵具官某父某官操行端潔問學淵源當寜考臨御之年正賓贊盜權之日侯門誰不伺候進而趦趄熱官我豈願爲思之爛熟脫屣奉常之職馳車蜀道之難追念高標幸有英嗣克承家法久在邇聯珍祠暫佚于賢勞襚服宜彰于世美儲師峻陟旌爾教忠之能宗祏增光欽予廣孝之義楊汝明母史氏贈漢國夫人制敕陟屺懷親孰不知夫孝養擇隣教子端有望于顯揚宗祀告成恤章加賁具官某母某氏行遵慈儉姿縕柔嘉詠蘋蘩之章能循婦道明經幅之喻藹著母儀有賢嗣以大其門驗積善之昌于後屬我邦釐之洽増爾家采之榮錫命副笄已少光于幽壤徹田緜竹益可慰于寒泉緬茲淑靈歆予茂渥楊汝明特贈四官制敕朕愛惜人才優崇耆舊道之云遠悵莫遂于來歸天不憖遺驚倏聞于謝事宜加襃襚用見眷懷某官温然天姿濟乎世美緬懷爾考之節不受權臣之汙家庭有異聞乎學斯二者國人稱願然曰有此幸哉爰從筮仕之初已養立朝之望積有休譽久在邇聯晩撫瀘南千里之封殆過潁川八年之治勞于藩服佚以祠庭圖任未遑云亡何遽君子萬夫之望胡不壽康豐水數世之仁可堪凋落爾抱欲爲未遂之志朕懷用才不盡之思宜疊進于四階且復官其一子以昭恤後之典以表優賢之思覬而英靈服此光寵龎援特贈朝奉大夫直祕閣制敕守圉扞敵之臣死城郭封疆固其職也爾乘使者車乃能挺身蹈難死不舍節偉矣一死未足多武關再戰梗敵喉牙俾不得薦食吾土社稷之衞也賞以報功存亡奚間以榮爾死以迪爾後人使凡爲臣子者勸焉聖人有金城不在是乎葉奭除宗正丞趙涯除宗正寺簿制敕具官某等宗正地嚴職清所以處名流也爾奭堅勁有守爾涯潔介自將皆奮由儒科蔚爲邦彥或俾參領或典勾稽不負予九宗之委矣成周之制辨昭穆叙親疎宗伯職之維翰維城卒以宗强朕嘉慕焉今之宗寺古宗伯也明古之制以佐其長以固我宗藩斯儒者事毋徒曰謹司屬籍而已趙汝􅲳除司農寺丞杜範軍器監丞李以制大理寺簿章勵將作監簿制敕具官某等漢宣帝勵精求治綜覈名實以簡羣臣黜陟有序衆職修理上下無茍且之患迄濟中興朕甚慕之爾汝􅲳秀于公姓材力有餘爾範穎于儒紳業履甚度爾以制金玉其質安雅自將爾勵弓冶其傳謹畏自飭大農戎監有丞理寺匠監有簿往爲我分治之丞以承輔其長簿以糾正厥違非特示進擢之榮也政事文學禮法之士繼自今咸稱厥職則予以懌曾穎秀除戸部郎中制敕具官某郎官上應列宿矧版曹尤劇屬時方艱匪得雋良曷稱兹選爾學于家庭施諸政事令譽籍籍搢紳間朕甚嘉之躋諸省戸俾贊而長其務革時弊全國體以俟明陟趙以夫除左司郎中制敕具官某淸中書之務方今所宜急也然非得識治之良材贊予輔弼烏能專意彌綸大經乎爾之才猷綽有餘地且更中外而騰聲華夷比國家多事章奏塡委以省郎攝宰掾密裨廟論屢罄忠嘉朕固已心奇之就俾爲眞式昭異奬都司學爲宰相先朝明訓也懋哉將于是觀器業焉曾穎秀除倉部郎中姚子材除工部郎中制敕具官某等太微郎位光近帝座非一路號福星者弗在列爾穎秀以淸敏聞于浙右爾子材亦威惠流于湘東洵爲監司之才者宜從外服擢寘望曹積倉以爲供億之儲備械以贊修攘之政皆今要務惟爾之能其齊乃位揚乃職以副朕意徐愿除直祕閣依舊福建提舉制敕具官某皇華之詩曰每懷靡及膚使之職馳驅咨度必有常如不及之意民瘼其少瘳乎爾氣和質美學有師承繇尙書郎出持庾節斂散合宜亦旣活吾赤子矣頃建卒之叛爾勇無所避親行撫諭者再焉不有其功繼以自劾可謂每懷靡及者歟寓直中祕庸爾襃嘉服此休光益思稱職朕將圖所以進爾者虞復除耤田令制敕具官某朕嘗書四十八規于緝熙殿日觀省焉爾敷暢厥旨條列來上粲如也掌故未足以旌爾勤進司帝耤庸昭異奬且以來臣工之嘉言吳潛除知隆興府制敕具官某孔子曰君子疾沒世而名不稱又曰君子之道闇然而日章夫名不稱已疾之名顯矣人疾之惟有闇然日章之德則已尊而人不忌爾之名高矣敭歴中外能聲益振更化之始首還班列未幾持節江右暫攝閫寄威行惠洽政平俗安朕甚嘉之列卿高選連帥眞除所以詳試政事而養爾日章之德欽哉行且召卿矣李性傳改知寜國府制敕睠我從臣作民良牧朞月而可已聞最績之多易地皆然爰重屏藩之寄是爲公選毋曰賢勞具官某學博而量洪器醇而識茂岷峨淸淑之氣世載其英家庭講貫之功達施于用頃輟甘泉之賦暫分澤國之符蔚有聲猷深用嘉歎宜仍兼于祕職就移鎭于宛陵淮右流離方資勞來江東根本政賴封培豈忘與我共理之良是以引卿自近之漸欽予時命其爾之休宇文景度知順慶府制敕具官某參井之墟兵氛未解深軫朕懷南充樂土也蕃翰之寄可輕也哉疇咨在列知爾有牧民之長今起家爲二千石不但守條教而已簡恤爾都屹然爲雄鎭使朕獲寛西顧憂時乃功懋哉張謙牧知嘉定府制敕具官某朕顧瞻坤維敵氛充斥民無寜居犍爲獨不被兵驚徙流離亦不少矣芻牧之求可輕也哉爾守高梁有治理效制臣謂爾廉平其錫左符往宣惠政爲朕勞來還定安集之俾民知有生之樂復見太平官府西州根本繇此再植則予一人汝嘉趙彥檝知寶慶府制敕具官某邵陽居湖嶺要衝控引谿蠻盤錯數百里未易綏御以爾踐敭歲深更練材老起之祠庭畀以符竹往欽哉惟廉惟平毋暴征毋峻刑簡易寛厚以寜其人則予汝嘉張舜傳知重慶府制敕具官某蜀去天萬里朕深念遠民謹簡良牧爾嘗關決㑹府有能名制臣謂爾可任今予命爾牧于藩邸往欽哉朕階前卽萬里也勿以遠而忽余元廙除司農寺丞趙必愿除大府寺丞制敕具官某等大農外府皆財賦之職必得通儒深究本末源流然後國用饒而民不告病爾元廙學周官而明理財賦之說爾必愿出相門而知制國用之道並丞二寺僉論惟允夫議論多而功實寡世以此病儒爾其夙夜惟勤一雪此言食貨生人之本也果稱職則儒不腐矣懋哉趙汝譢除祕書丞兼右司制敕具官某詩曰不解于位又曰夙夜在公謂人臣居一職則任一職之責自朝至暮罔敢怠遑也爾少馳雋譽蚤掇巍科臨政勤敏轉而上聞登朝著兼宰掾夙夜不懈猶昔也擢丞中祕號爲淸簡矣雖然身在蓬萊飽觀典故以其所得于方冊者裨贊廟謨剖決庶務則夫淸簡者乃所以爲繁劇之資歟往盡乃心嗣有襃擢除將作監丞制案此制原本闕姓名敕具官某朕念淮西宿師連年輦車驪馬前後轉輸其事勞矣爾以敏材贊大幕府飛輓無乏爾惟克勤乃事朕今擢爾丞于繕監往旣乃心以續前績向也攝官猶稱治辦況爲眞乎詩曰迺積迺倉迺裹餱糧于槖于囊思戢用光今曷繇臻此爾尙勉之趙汝談除禮部侍郎兼直學士院制敕朕圖任物望共濟時艱思累朝豐水之仁侯誰在矣眷更化甘泉之舊盍歸乎來爰晉貳于儀曹仍升華于翰苑具官某邦之宗老時之名儒學博且精信儀型于後輩筆雄而雅肯蹈襲于前人朕以世事浩繁賢才衰少豈伊白髮蒼顔之彥不在金馬玉堂之間矧郡最之上聞宜綸音之趣召職典三禮詞成一家紫禁穹班問諸國人皆曰可青氈故物孰如君子居之安遠追伯夷之寅淸近想東里之潤色罔俾專美用副簡知袁立儒除大宗正丞制敕具官某周家忠厚内睦九族親親之至也爾敏秀嗜學藹著聲稱擢丞宗司俾贊宗老詩不云乎宗子維城無俾城壊金湯之固何以尚茲懋哉趙崇嵒除大宗正丞制敕具官某朕聞侂胄擅國柄士大夫靡然趨之爾父汝掄與侂胄有舊屹立不阿節誼高矣爾安恬自守綽有父風師友磨礱氣温而行潔茲用序遷晉丞宗寺爾其永肩一心勿隤家聲嗣有襃寵顔耆仲除樞密副都承旨制敕具官某國朝用人之法任丞郎卿監者出而宣勞外服以符節策勳者入而羽儀朝著等而上之必歴河北轉運乃爲三司使蓋迭更内外渉歴多則知識明也爾天才卓犖無施不可昔爲宰掾旋命觀風發庾贍饑淮堧以最聞矣朕念邊事方殷樞筦求助引以自近宣導密旨出入之間庶幾我祖宗用人之遺意焉夫王者之于天下譬猶一堂之上也軍情民隱朕之所欲知者進而告爾后退而贊廟謨稱職如此則予一人以懌䝉齋集巻八
