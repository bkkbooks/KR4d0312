body:
  text: 䝉齋集巻六宋袁甫撰奏疏論履畝劄子臣仰惟陛下一念愛民上通于天急聞讜言如恐不及臣竊伏思念計田輸劵此事大非得已必須施行之際倍切謹審勿謂指揮已出憚于參訂致貽後悔及今明示德意務體下情使人戸曉然知朝廷寛恤之心庶不致激成他患今謹條列于後一指揮内一條人戸所納官㑹各州軍截鑿一角發解朝廷臣謂令各州軍截鑿不若令人戸自鑿齎赴官司何則官司截鑿人戸弗信許人鑿納大信乃昭或謂人戸鑿納必有夾雜偽㑹之弊殊不知此雖有之然其弊亦自有限況只鑿一角真偽自可稽攷若從官司截鑿彼直謂以空言紿我將來官司仍前發出行用則彼固已有怨忿之心矣人情不甚相遠如許其自鑿以納官則必不疑目前雖有輸財之苦亦知㑹少而價增異日可以獲利庶幾其不怨大凡處事當體下情朝廷但知出令不可屢改不思怨謗一興勢須改令與其改于怨謗既興之後孰若修于怨謗未形之先或又謂我但直行截鑿足矣何恤人言殊不知朝廷用度目今窘急州縣揣知此意必有密獻不必盡鑿之説者朝廷處匱乏至極之際萬一惑于其言豈不中天下之疑縱使不為逢迎者所惑然人之疑心難以家知戸曉必曰截鑿一也何苦不許人戸為之而官司必欲自行之耶臣之愚只是一箇信字使天下曉然無疑而已一指揮内一條令各州軍拘人戸納官㑹分為六限每限半月計三月可足以臣觀之將來人戸輸納不時州郡必致申請朝廷與之展限恐限内先納者皆是畏謹及貧弱之人違限不納者郤是頑梗及巨力之戸朝廷今者施行正欲恤貧小然究其流弊反使强家濫被寛恩而弱戸先受督責豈不倒行逆施耶臣欲反此説而用之令州郡先催形勢有力之家立定期限不許申展一則頓改收買㑹價必然驟長二則不墮勢家之術希望展限以求幸免三則貧小者見州郡嚴于大家其心大服彼大家者事力有餘于限内責其必納更復何辭待大家納足後催中戸中戸力雖稍薄然彼皆各自愛惜自能依限輸官末後視所收多寡如何斟酌事體催貧小之戸或已納數多則朝廷施行寛恩可使貧小者霑被大凡作事寛嚴並用如此措置誠為兩得其宜右開具如前委是利便斷可施行免致後悔伏候敕㫖再論履畝劄子臣竊惟近日收減㑹子指揮令人戸有田一畝輸㑹子一貫分為六限三月而足臣嘗奏論州縣奉行往往不體朝廷之意致使中下之戸先受督促之苦其豪家巨族與吏表裏不以時輸此大弊也謂當先督形勢之家嚴示約束如期輸納陛下既然臣之説臣退而告諸宰輔亦謂可行日徯續降指揮而猶未也臣亦聞其説矣蓋曰勢家競買則價驟增然後催中戸以及下戸反收貴價之楮甚而無可買者非所以利貧弱也臣竊以為過矣今惟憂楮之不貴不必憂楮之太貴也楮貴而無可買正自可賀有何可憂朝廷見下戸之無可買也則寛恩可施矣此所以利貧弱也而何不利之有或又曰勢家迫之太急恐滋怨而激變此亦過計也輸財助國自古有之況自故相當軸士大夫不義而取之者多矣今以前日之所漁取者還以為公家之助非父祖生産作業傳諸子孫者也何至遽生變耶朝廷處事往往當憂者不憂而不必憂者反以為憂何謂不必憂士大夫決不因此而生變是也何謂當憂臣濫攝銓曹仍兼西掖日日書黃及書填綾紙紛然不勝其多此等皆號官戸然而未必盡鬻爵也用兵以來竄名功賞者皆妄庸無賴人耳又近年朝廷給降祠牒不計其數極目村疃盡化緇黄寺觀之内童行少而僧道多大槩皆橫目無知之人此等易于為亂不若士大夫之有所顧惜也乃置此不憂而獨憂士大夫何耶且有力之士大夫亦猶有力之寺觀耳今一令之行將先寺觀之大者乎抑先其小者乎如謂勢家不可先督則寺觀之大者亦付之徐徐云爾而可乎論者又謂兵法攻瑕則堅者瑕攻堅則瑕者堅今不先督勢家此亦不攻堅之意也臣以為國容軍容各有不同兩陣相對志在決勝則攻瑕可也撫柔此民恩意綢繆而先治貧弱可乎或又謂子産有言安定國家必大焉先臣亦以為不然鄭蕞爾國伯有伯石之徒逞暴恣行視公室何有故子産濟之以弱今朝廷清明法度整肅上下一心安得以列國為比故臣謂今日之事所以牽制而不敢斷者一言以蔽之曰未能盡捐私意而已姑息于形勢之家而不念貧弱之戸此病何自而發哉私意未克剛志未決故耳譬猶治深痼之疾當使元氣不傷而疾自去有庸醫者烏喙大黃輕于嘗試無救于疾而氣先耗矣計田輸劵此用烏喙大黃之喻也毋用于貧弱而獨用于形勢則可以全安而無害否則殆哉臣十有八日侍經帷陛下語臣曰修内司有田七萬八千餘畝若以收減㑹子指揮言之亦合照數輸納今欲特降十萬貫赴封樁庫交納以充收減之數臣仰見陛下急救楮弊自上率下無所吝惜如此臣力贊陛下此舉足以大服人心已而伏覩指揮一一皆如聖諭又見陛下言行相應勇于斷制如此夫以陛下尚且為天下倡而士大夫獨不能為衆人戸倡乎臣愚欲乞睿斷行下諸監司專主先督勢家之説過期不納者必罰無赦如州縣奉行不䖍縱胥吏與勢家為地抵拒拖延慢上之令則監司定將守令按劾如監司曲為庇護不即發覺許臺諫糾察以聞自昔聖王之治天下不過寛嚴並用各得其宜而已嚴于監司守令以督形勢之家待輸納數多楮貴物賤則貧弱之戸大示寛恩至此方表陛下憐貧恤小之心上通于天是亦祈天永命之一助也臣疊冒天威罪何所逃惟陛下裁赦再論履畝劄子臣近者伏覩朝廷履畝收劵指揮退而精思畫為兩條一曰示信官同人戸截鑿使天下知的然有收減之實而不至溺于空言二曰恤小先督形勢之家使天下知貧弱者其末必寛而不至流為虐政終始兩説言之懇切至于再三欲乞降聖㫖分明行下而側耳未有聞焉臣自知誠意不足感動然終不敢喑黙遂已者蓋履畝本非仁者所當為乃大不得已而用之耳于大不得已之中而行之有方足以救楮弊之窮則公私俱便亦未可全謂之不仁也自昔朝廷行事而犯不韙之名天下不諒其心往往激成大禍熙豐犯新法之名誰復諒其興起治功之心建紹犯事讎之名誰復諒其與民休息之心開禧犯開邊之名誰復諒其恢復故疆之心然則今日犯履畝之名而欲人諒其急救楮劵之心亦可謂甚難矣雖然果能行臣示信恤小之説則天下知吾不以空言欺天下而使天下貧弱之戸終被寛恩則猶可救藥也臣聞諸道路自此令之出大家巨室雖睨視未動而大寺觀主首之桀黠者巧謀詭計已窺伺朝廷之意向有欲挑包散衆者矣有欲鬻常住之産者矣大者既然小者胥傚勸諭之術既窮必將厲威刑以迫之當是時强有力者營關節託聲勢足以自庇而繫纍笞箠以應官司之期限者皆弱小者也鄉村小寺觀緇黃猥雜何可勝數彼豈皆畏法循理之人哉且何獨寺觀為然如鬻爵冒賞之村夫與亡沒官戸之不肖子平時常賦猶不樂輸今迫以出錢是無故剜其肌肉也彼又豈肯俛首帖耳受繫纍笞箠之苦耶縣道差人催督始以抗拒抗拒不已繼以毆擊其間巡尉不識事體奮臂爭鬬則激變挻禍自此始矣此猶曰將來之患也只如目前科配㑹子之數亦自難行蓋縁田有肥磽苗有輕重産錢有多寡在在不同難以拘泥且以臨安言之自十畝以上至四十畝均納苗一石此則田愈磽則苗愈輕也其他州縣有反此者苗極輕者為上田苗極重者為下田産錢之不等亦復若此槩曰履畝豈能遽得平耶行法不平則乖爭之端已見矣近聞上戸已有一種議論皆謂倉卒之間買劵未辦吾之歲收惟有米耳朝廷當此稔歲儲米為荒歉之備亦為有利于國為此説者乃窺測朝廷名為收減而實則橫斂耳嗚呼陛下之心曷嘗為謀利而出此令哉彼見截鑿之令未必果行故以利心量我耳臣一聞此語即披瀝肝膽對衆言之其語乃塞若陛下不肯明白截鑿亦使臣虛負斯言矣臣所以極陳事理如上所云者大要欲陛下知天下人情如此知天下揣摩意向如此知天下求為脱免之計如此則陛下豈能家至戸曉又豈可刑驅勢迫也哉反覆思慮惟有臣之二説示信以釋天下之疑恤小以消天下之怨寓德意于號令之外回陽和于肅殺之餘使天下諒陛下之心而已臣更有一説天府者天下州郡之所取則也畿漕者諸路監司之所視傚也行之有道守之不移必當衆截鑿必先催形勢以此推之天下大書榜帖揭之通衢有目者見有耳者聞咸曰示信如是恤小如是孰不以天府為準以畿漕為法遍天下欣然聽從也哉如商邑無以為四方之極則外之分符持節者且將有辭于我以為近甸尚不能行而何以令天下志卑者茍且逃責而好髙者解印綬矣荀悦有言榮辱者賞罰之菁華也陛下有此菁華而不善用之臣謂宜宣召顔煕仲趙與􅊸諭以陛下至誠惻怛之心所宜上下交相孚洽其州縣有不擾而辦者首加襃擢而不然者必罰無赦菁華發用則人心興起仍乞陛下宣諭宰輔所有中書之務不繫大體者權令執政分押不必盡勞宰輔為宰輔者專以責監司郡守為務下至縣令亦合人人知其才之短長與其用心之邪正今者出堂甚晚儘可㑹聚掄材如更欲廣其見聞則當進侍從而博詢之既知之矣然後揀選疏剔斥其不善者而奬其循良者如監司郡守果有風力待其績效既成雖驟寘清華可也譬如人之一身精神周于軀幹則可以常安而無疾今中書汩汩于細務而精神不周于事幾臣之所甚惑也嗚呼撫太平無事之運人誰不以為易今外而邊事方殷内而又倡為履畝之説此何等題目既不得已而犯之必磨淬精神求以善其後庶不至于大可悔恨耳奚獨宰輔當然哉陛下之精神所以鼔舞羣動者尤不宜有一息之宴安而使天下有一夫之怨讟也漢武帝席文景富庶之餘患國用不贍用桑孔輩不過更錢幣算舟車數事尚不曾行履畝之下策而猶不免乎海内虛耗至下輪臺詔封富民侯僅能轉危亡為安存況今日乎陛下如視為等間小事無庸過慮方且聽不必盡行截鑿之説而自悖收減之初意動搖于左右浸潤之言而形勢之家與夫大寺觀得以内降脱免此又陛下自撓其紀綱而他人無所致力者也惟聖明以社稷生靈為念察臣狂瞽之言原臣屢瀆之罪及今續降增添德意指揮而毋致後日下哀痛之詔力遏請謁動搖之漸而毋輕蹈御札已事之轍臣不勝大幸陳時事疏臣竊謂今日事勢不當論安危當論存亡夫關于國家存亡之最急者莫急于北邊秋髙馬肥必謀大舉傳聞將以三路並進阿齊台與逆全妻將自山東窺我淮甸蘇布特將自木波界窺我西蜀布占將自陜州窺我襄漢萬一果如所聞國家何以禦之布占本主和者也近者淮安兵叛布占舉兵相應所以致此者蓋亦有説武僊田八敵之深仇襄州輕于接納已為失策李伯淵又以詐奪阿達馬由是布占之怒愈甚然則和好已難諧矣始輕戰而挑敵中議和而款師今戰既不可和又不成勢甚迫矣尚覬和而忘備悠悠度日敗在眼中奚止累卵之危而已哉然則為今之計不破拘攣之格顯幽拔滯則真才必不出不除張皇之禁披肝露膽則下情必不通不掃塵穴之務一意憂邊則神志必不專不去浮淫之蠧舍虛就實則功程必不著不振朝廷之綱信賞必罰則氣勢必不奮不併江淮之勢合異為同則事權必不一不察卒伍之情賑乏賙急則軍心必不安此皆通國之人明知其當然而上之人遲疑顧慮不能果于有為者正以未知其職耳夫天下之所以治安者以内外上下各得其職也欲守邊人人稱職必先任大閫者不失其職欲閫寄人人稱職必先臺諫給舍不失其職欲臺諫給舍人人稱職必先廟堂之上不失其職今兩淮荆襄四蜀衝要之地處處枵虛色色鹵莽身居大閫一不暇問朝夕之所計慮者不過互相猜疑巧為傾陷謀邊甚疎謀身甚密外諜甚拙内諜甚工讎敵甚淺私讎甚深帥臣若此邊守何責臣所謂必先閫寄不失其職者此也自輕啓兵端經營京洛喪師辱國愁痛尚新恥過作非復事唐宿委棄軍實取笑敵人繩以國法罪何可逭而臺諫給舍重于抗章國有丘山之損罰無毫毛之加精采既頽折衝何賴臣所謂必先臺諫給舍不失其職者此也范葵久處淮襄朝廷未得其代甚類一則杜把二則杜杞之説此在廟堂平日儲才耳昔之儲才者豫事先定某死則某代之今事急矣何暇言儲敗徵既形勢當更改臨敵易將之疑此拘常襲故之論不足信也亟求可代者大作規模并謀合智推誠付託勿掣其肘事力雖匱不可吝財兵難豫度不可中御任責在閫寄而主張在廟堂讒言莫入論議歸一庶或有濟今閫寄之誤國者臺諫給舍不敢言而廟堂亦不問使代之者果得其人臺諫給舍或以風聞動搖而廟堂又輕信之則國事去矣臣所謂必先廟堂不失其職者此也而臣又有疑而未喻者天下之事緩則緩圖急則急著今處呼吸危亡之秋而不厲卧薪嘗膽之志習雍容鎮靜之量而不為捄焚拯溺之舉方且牽于常調拘于吏議豢于茍安惑于坐談大敵臨前束手無措則不得已而行守江之下策淮襄既不可守江其果可守乎今淮襄尚無恙也不肯破拘攣之格不肯除張皇之禁不肯掃塵穴之務不肯去浮淫之蠧不肯振朝廷之綱不肯合江淮之勢不肯收卒伍之心坐待北風一起遠近響震則財為誰之財民為誰之民與其一擲而輕棄曷若先事而亟為與其疑醫而待亡曷若信醫而圖存自古有病者未必死而諱病者必死今朝廷諱言病矣縱使開不諱之門而未能確然信任可用之人束縛繩墨靳吝脂膏不捐反間數萬之金反聽市虎三至之説臣恐敵不在外而在内兵不動草地而起于蕭牆矣抑臣復有愚慮請盡瀝衷忱為陛下精言之孟軻曰入則無法家拂士出則無敵國外患者國恒亡此言人君當納其身于戒謹恐懼之地雖有敵國外患乃可為進德之助也强敵迫我人皆憂畏臣獨謂陛下進德之機正在于此伏願陛下杜女謁遠閹宦戒㫖酒親忠賢精明不衰則昏怠不起畏忌常存則邪僻莫干凜凜然常有履霜堅冰之念而後可以壯元氣消外患强中國禦敵國矣臣猥以淺學備數經帷正以推明經義論説古今開導上心為職臣今此疏自廟堂臺諫給舍以至閫寄邊守皆以不失其職為言臣豈不自知其職乎若陛下乾剛日進敬心匪懈處宮闈如坐朝廷對妃嬪如對儒生則無怠無荒而四夷來王天下將曰講説之官不失其職如此如或不然純一有間怠荒乘之縁飾雖多真實反寡則清議將以臣之責人者移而責臣矣豈不甚可懼歟臣赤心愛君不識忌諱盡吐肝膈惟陛下裁赦是日上不視事繳進前奏事劄子臣聞處事勢孔棘之時與常日不同有大斡旋則可以運動事幾有大力量則可以鎮壓人心有大識慮則可以消伏變故史冊所載亦可覩矣胡為今日之事獨不然耶邊遽方聞窘態已露楮幣一事耳論説紛起施行倉卒實效未獲疑謗先騰臣甚惑焉且克敵一軍疽根伏藏久矣諸帥不協互相猜貳狼子野心竊窺間隙于是潰決而不可制任閫寄者各執所見朝廷持兩可而聽其所為遂折而歸于招之一説然既招之後憂慮萬端今邊報又急矣敵犯鳳州又犯蔡息三道並進已驗于此浮光棗陽久闕正守此為何時拱黙坐視齊安制閫精鋭消沮潯陽江面守備尤疎朝廷非不明知奈何不為拯溺救焚之計而尚爾遷延玩愒耶自古主于綏懷則不輕用武主于敵愾則不屑招納今既許其勦又許其招雜用錯施初無定守有謂秦鞏不可棄者矣而又惑于鞭不及馬之論有謂秦鞏不可納者矣而又搖于獸窮則搏之説委恢珙以通好于布占然今之窺我者布占也和安可輕信任范葵而加兵于唐宿然今之為吾患者唐宿也兵豈可輕舉首鼠兩端莫知所決宵旰之憂其有既乎履畝輸劵可謂下下之策曩嘗議及此矣其時尚畏公論未敢犯此惡名遽改而為鬻祠牒之舉已而怨謗譁然亟從寢罷曾幾何時今又歸于履畝鬻牒信不美也猶有物以予之今履畝則白取矣鬻牒敷配僅及大家今履畝雖云有官之家而七色雜流與已仕而亡歿者咸不免焉則所及者亦泛濫矣一命之微官與故官之子孫伏臘不周事育不繼者何限今乃使與穹官顯爵家温禄厚者一槩同科州縣之吏不能皆良觀望回護避貴虐賤有力者頑未應令而追呼迫促破家蕩産悲痛無聊者大抵皆中下之戸先受其害昔之謀國興利貽笑千古若括商若僦質若税間架若除陌錢彼豈以為得已不已耶蓋亦曰不得已而為之耳然上焉不得已而虐其下則下焉亦不得已而叛其上涇原之變此亦激于不得已之至耳非獨前古然也本朝熙豐間若青苗若助役若市易若手實彼其施行之初人言籍籍主國論者惟曰是不足恤也然始于不恤人言而終于不恤國家被害之民在在嗟怨我不恤彼則彼亦不恤我矣王安石誤國之罪至于激成靖康之禍皆不恤之一念為之也然則為今邊事之計當如何曰臨敵雖不可易將宜急擇忘身徇國有謀知義之帥以為之儲和戰雖不可執一説宜痛懲獨運秘密之弊使舉朝羣臣皆得以獻其謀屏目前常程細務而廟堂謀謨專一以料敵制勝為急令淮襄四蜀之血脈俾與朝廷為一家而無一毫壅閼䝉蔽之患則邊事其庶幾矣為今楮幣之計當如何曰行法自貴近始凡將相勲戚之家斷不得夤縁幸免而使貧弱者偏受無窮之毒恢宏朝廷寛恤之意凡産去税存有名無實者一切務從闊略勿為迫促急蹙之態以激天下等死之心昭示大信上下交孚勿使疑吾徒有截鑿之空言而終行刓忍樁留之實意收愈多則數愈少數愈少則價愈昂非獨國利亦為民利則楮幣其庶幾矣顧臣迂愚之質實懷體國之忠每見聖主有仁心仁聞而今乃為寧考所未為之事二揆潔已奉公而今乃為故相不屑為之舉心誠痛之故嘗謂厥今有大患下人輕上幸災樂禍此風滋長真可寒心若邊事區處合宜楮幣施行有序尚可弭輕量之心消意外之變如其不然邊事搖軍心于外楮幣搖人心于内内阻外訌不亦岌岌乎殆哉臣之愚策如上所陳吐自肺肝不識忌諱惟陛下裁幸取進止乞降招撫諭四蜀劄子臣竊惟敵兵犯蜀憂慮萬端今趙彦呐隔在仙人原音問久曠陳隆之離興元見住米倉山髙稼在沔州亦無音耗朝廷就令四川總領安癸仲撫諭軍民陛下宜降手札勞勉制帥及撫諭使又宜命詞臣草詔具述陛下憫傷蜀民曩經敵兵蹂踐痛猶未定今又重遭兵禍皆由和戰不決舉措不審召釁納侮悔其可追老弱死于流離士卒狀于鋒鏑惕然愧懼食息靡遑即此大意更加深切庶幾遠民明知上心亦使軍士生其氣勢臣之愚慮蓋見故相當國以言為諱詞臣揣摩意見多所避忌語不懇惻豈能動人陛下更化以來曠然與天下為公今者詔㫖丁寧所貴明白洞達臣不暇遠引三代誥命只如漢武末年兵戈不息深陳往悔吐自肺肝與夫唐德宗奉天詔書自謂天譴不悟人怨不知痛心靦面罪實在予下至封敖草陣傷邊將詔有云傷居爾體痛在朕躬如此等語頗得王言之體願陛下明諭詞臣使之展意無所依違敇書誕敭將見歡聲如雷賈勇敵愾敵兵不足慮也僭瀝愚忠惟陛下採擇奏備邊四事劄子臣濫叨班綴賜對便朝竊見陛下軫念邊疆憂形于色微臣恨無良策少濟時艱姑竭愚慮畫為四條皆至緊至切汲汲行之如拯弱救焚庶克有濟其一曰固江陵以重上流之勢臣聞去年撥襄鄂隨郢復岳德安漢陽信陽等府州軍屬沿江副司而置司于鄂州撥江陵均房歸峽光化荆門等府州軍屬荆湖副司而置司于江陵襄陽距鄂州千里而聲勢不接江陵介居襄鄂之間而孤城無助今德安棗陽隨郢襄陽皆破而復州與信陽漢陽僅存空城而已均房光化歸峽荆門或破或潰而江陵遂成孤立之勢矣顧乃責沿江副司以復襄陽責荆湖副司以守江陵地勢既相隔越事權亦復不專彼此牽制恐必至于蹉跌莫若以荆湖諸郡仍舊併歸一帥總治江陵且撥湖南九郡以隸之庶幾形勢便順事力從容經理上流之策莫急于此其二曰堰瓦梁以壯東淮之防臣聞敵人往年首犯襄陽邊境連年遂入西淮至去冬又擾東淮直抵維揚三邊之禍歲甚一歲今荆襄既已失陷止守江陵孤城危迫西淮屢擾蕩然無藩籬可恃儻東淮守禦又復不固則敵馬旦夕飲江而江浙之地俱震動矣當此之時豈容玩視而弗戒乎昔孫吳築瓦梁堰以抗强魏形勢倚賴江南之境恃以為安者六十年至南唐李氏未嘗不悉力經營無如堰未及成而淮已盡失今制臣建議修復故基病于工力浩瀚迫不及辦宜從朝廷亟助其費乘此强敵暫退之時作急經畫併日興工庶幾猶可有濟其三曰處流民俾復生業臣聞淮上之民少長習于兵革為國保障其力居多去冬敵騎奄至西淮義勇往往憤激思鬬而任邊閫者惟恐摧鋒而怒敵但知撒籬以媚之驅逐老弱焚蕩生聚以為清野之計重以敵馬蹂躪腥焰熏炙淮上之民扶老攜幼渡江而逃者不可勝計朝廷不以為念勞來之使中輟賑貸之令徒頒彼留江南則無所得食返江北又無以為生不亟圖之非但外失捍敵之利必内重蕭牆之憂臣愚以為宜申飭江淮帥守諸臣亟行賑恤以示恩惠朝廷亦合貼助支費假以資糧俾得各復生業或團結鄉社以助聲勢或揀刺義勇以填闕額或選擢材武之人優補軍職兼此數端實區處淮民之切務其四曰責邊閫遣回敵使臣聞比者朝廷已嘗戒飭邊臣遣回敵使中外之人方幸廟謨堅定不墮姦謀稍有生意但見王檝盤桓窺覘久未出境遠近之人觀聽已惑近者傳聞猶為可疑豈其不稟朝命道宣歙而來耶朝廷周慮曲防固萬無是事不知道路之言何為有此敵人變詐每得利便既有輕量之心恐肆玩弄之計今兹復來更非前日可比包藏叵測必有出于邀索之外者兼邊疆効死之臣無非與敵為仇復有訛言煽搖可憂非一儻盧阻遏其來貽禍目前則專在邊閫委曲區處之耳豈遂竟無良策耶或謂兹事當密難使戸知但恐欲愚國人而人終不可愚耳以臣管見王檝之欲來者乃邊臣諉其事于朝廷而止其勿來者在朝廷當專其責于邊閫處置少差噬臍何及臣所陳四事辭雖樸拙情實懇至儻陛下以臣言為可采伏乞睿斷速賜施行經筵進講論李允則疏臣聞帥閫以真才為重以善謀為主有才而無謀不足以為真才矣李允則之守邊也胷中之謀愈出愈奇懼敵人疑已而揚言護嶽祠修城築也引水作石梁聚舟為競渡寓水戰也撤樓夷阬而植榆塞下設險固也上元舊不然燈特結山張樂使民縱遊陷敵將也不救火災密運器甲以補所焚安衆心也此猶易能耳未足以見允則之奇謀敵遣間諜刺我兵數而能使諜者轉為我用此一奇也敵敺吾民將以為質驗而我能反其鋒而用之又一奇也雲翼卒伍之逃敵以不知所在為辭而允則指言某處運智如神又一奇也天下多事之秋使得任閫外寄者善謀如此可以寛憂顧矣雖然設謀易用謀難自信易為上所信難李牧縱匈奴數侵趙邊而終不肯出戰謀則善矣然其迹似乎養寇陸抗與羊祜邊境交和謀亦善矣然其迹似乎賣國必也上之人寛洪大度聽其所為而無掣肘之患則謀成而功立不然信任不專讒間入之則所以撓其謀者多矣臣是以深取李允則之善謀而又三歎真廟之善聽也䝉齋集巻六
