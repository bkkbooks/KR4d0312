body:
  text: 䝉齋集卷十七宋袁甫撰祭文三衢祭清獻趙公祝文凡守兹土嵗拜祠宇予末施敬人仰標榘廬墓勞止孝弟旌里立朝抗論鐵面御史帥蜀言歸琴鶴自隨豈伊求名忠誠匪欺洎秉政機新法力排年未七十退老高齋世俗茫茫慾焉得剛偉歟我公玉潔日光我希高躅惟日不足矧是後人可貽我辱我修泮水延公孫子漸之摩之風流是似春風融融淑氣沖沖吉蠲蘋藻敬告我公我公精神千載常新想聞斯言心兮欣欣自鳴山廟祈晴祝文於赫神靈天地同大有禱必應下民依賴季夏霖潦瓣香端拜俄頃之間天日開霽邦人僉言精神黙契夫何旬浹雨復為沴城闉居民匪舟莫濟莽為平川厥菑不細大田多稼垂成欲壞雨聲稍歇民猶少慰一聞簷溜憂窘無奈吏之不德獲罪上帝致此譴怒民則何罪痛心疾首曷救斯敗惟依明神一誠昭對隂氛盡掃霖霪勿再積水歸壑室廬無害農保有秋奄觀銍艾無聊之情一朝舒泰歸功有自實神之賜祖廟離宫鳩工靡怠匪伊為報民心攸繫神鑒斯言出由肝肺自鳴山廟告修造祝文惟神孝誠上通于天傳之萬古孝德章矣饒州行祠民倚為命而門廡卑湫未稱王祀至者慊焉某將指此来水旱盜賊必禱必應則嚴廟貌以報神休以益顯夫出雲雨禦菑患之靈以宏庇乎此邦之人庸敢後乎夫得人之歡心以事神亦所以助神廣孝于天下也將以吉日乙亥撤門廡而更新焉人心載喜神其聽之自鳴山祖殿修造祝文於赫神靈廟食百世庇此下民天覆地載我行其野禾麥茂遂父老頂禮拜王大賜王之至仁厥有根柢孰為之根篤孝于親維此孝心通天地人視彼有生與吾親均王推此孝發育如春廟貌孔嚴安可弗新吏失其職頹垣敗壁某拜祠下心焉跼蹐撤而新之宜尸此責妥王之靈為民祈福昭示仁孝永永無極江東謁諸廟祝文國之所恃者民民之所恃者神事神治民吏之職也某將指此来深惟一道司臬責重任難凜凜焉思所以稱厥職公清以為本勤勉以行之此心無愧無怍則庶可以事神治民矣祗謁之初矢心以告番昜五賢祠祝文謹以酒果之奠敢昭告于文忠顔公文正范公詹事王公忠宣洪公忠定趙公世有偉人吾道棟梁惟顔惟范唐宋相望鑿鑿其實炯炯其光百代聞風首俛心降梅溪王公景行前哲凜然清標同一軌轍忠宣之節忠定之烈照映今古俱稱人傑嗟哉晩生不見典型憫俗之頹涕淚交横祗拜五賢想像芳馨夙興夜寐兢兢奉行諸廟謝晴文勾芒司旦土膏既興陵陂之麥鬱乎青青積隂未解霖雨其零侵畦溢壟溝澮皆盈民以病告有禱于神曽未徹奠雲開晦明曈曈曉日赫然東昇匪神之休孰赫厥靈巫祝矯舉吏實何稱神降之福以答民誠自鳴山廟謝晴文血食溪上惟神孔靈千載一日凜凜猶生水旱有求如響應聲今茲淫雨巨浸日増害我嘉禾甚于螣螟睠惟東江嵗比不登饑者相望殍者相仍予吏兹土職兼常平豈不救荒惠止斗升惕然内愧所望秋成芃芃其稼百室可盈垂成而壞易喜而驚為民告哀遣官代行冀神之聴痛鑒此情層隂蕩空曉日舒晴多黍多稌如坻如京吏責寛釋民歌沸騰則神之賜丘山猶輕巋然祠宇豈無壞傾捐我薄費是經是營豈以為報聊竭此誠此誠無盡通貫幽明自鳴山廟祝文某惟勲盛者報必隆實大者名必赫番江之民王父母之番江之水王指麾之浹旬以前敬禱祠下隂霾頓掃晴日麗空遐邇耄倪莫不呼舞非所謂實大勲盛者乎某雖無狀心與王通其禱也固曰當力請于朝増崇封爵斯言一出金石不渝累日討求申藁已具繕寫一通告于王前庸致隆報以赫厥名此某之所以踐前言也惟王神功廣大隂相黙佑使水之未盡退者速歸其壑民之尚阽危者速奠厥居一道之民咸曰聖哉吾王不其休歟因謝有祈寸衷甚切惟王其鑒之初建書院告陸象山先生文先生之精神其在何所耶在金溪之故廬優游而容與耶在象山之精舍言言而語語耶抑周流乎上下四方與天地游與四時序耶某將指東江志興正學山之旁近爰咨爰度得勝境于徐巖離家山而非邈三山環峙兮高可仰大溪横陳兮清可濯殆天造而地設匪人謀之攸作是可以宅先生之精神振先生之木鐸或曰建象山之書院當于象山之故址而又焉可改也是求先生于形迹而未知先生之精神無在無不在也先生之道精一匪二揭本心以示人此學問之大致嗣先生之遺響警一世之聾瞶平易切近明白光粹至今讀其遺書人人識我良貴由仁義行與行仁義者昭昭乎易判也集義所生與義襲取者截截乎不亂也宇宙内事即已分内事渾渾乎本一貫也議論一途樸實一途極天下之能言者斯言不可贊也嗚呼先生之學如此先生之精神如此然則在金溪之故廬者如此在象山之精舍者如此周流乎上下四方者亦如此誰謂徐巖而獨非此耶工役俶興禮宜䖍告先生精神淵淵浩浩祭陸象山先生文先生之學得諸孟子我之本心光明如此未識本心如雲翳日既識本心元無一物先生立言本末具備不墮一偏萬物無蔽書院肇建躬致一奠可見可聞非聞非見先師兗國公祝文先師道德難可名狀元氣融融春風盎盎舜何人哉當仁不讓奮此大勇一何其壯顓䝉小子學焉勉强慕先師之屢空一言而蔽之曰平平蕩蕩創東塾告絜齋先生祠堂祝文洙泗闡教萬世同尊漢唐榛蕪陋儒實繁我朝諸老發揮微言肆我先公體道之元推以淑人訓語温温光明本有意動而昬昬去明復照耀乾坤四海歸慕絜齋之門矧伊一家昆弟子孫爰及甥輩罔間藩垣祠宇告成德容如存肇開東塾晝夜講論某未知學膚淺無根願與同志唱和篪塤如彼鳳凰千仞高鶱如彼滄溟百川並奔學要如是洞徹心源佩服終身罔極之恩祭史衞王文師王之生數闗乎天惟福惟量其大無邊問王之福得君甚專斡旋元化獨秉大權始終無二凡三十年其間變故何翅百千䝉疑履危雍容周旋固守矩方隨機規圓無竭泉流不動石堅偉哉元勛洗日虞淵恭已委政倚王之賢王雖臥疾寵數蟬聯再世王爵自昔莫先生榮死哀孫子緜緜福萃一門舉茲以旃問王之量翕受羣言我所身嘗知王裕然官雖疏逖有言必宣皇都鬱攸物情喧喧我忠于王飛奏君前亟解機務君臣道全彗星謫見流言愈傳我忠于王再騰奏篇亟逃天譴窒欲之原兹誠苦口誰謂我妍王量如海百川赴焉不辠我言察我心田心乎忠愛匪事佞便感王知已實惟勤拳聞王之薨職守攸牽緘辭寫悲心旌翩翩祭拙堂致政韓公文惟天不輕畀人兮夀為九五福之首皓首朱顔婆娑林下兮信人間之稀有集兹福于厥躬兮又回顧夫我後後人命懸于天兮孰豫知肯堂與否偉韓公之獨稟于天兮蓋積善之素厚森堦除之蘭玉兮何弟恭而兄友嵗在癸未兮二子雙綰乎藍綬耿名門之輝光兮譽喧騰乎萬口咸謂儒家氣味不比北平之有子兮鸞鵠停峙足以傳諸不朽我未瞻公之典型兮先于長嗣焉定交體質金玉兮義理薫陶一見傾蓋兮延誨兒曹我仕大江之東兮又王事之相遭長嗣迎公以来兮兩臉有似乎蟠桃遂升堂以展敬兮情誼奚翅乎漆膠次嗣詞學之競爽兮瀉萬斛之波濤羌塤篪之迭和兮暢一翁之逍遙龍賓兮相邀濁酒兮山肴此樂何極兮知不知吾常囂囂人謂公才兮少時勇決遇事敢為兮志意彌烈晩年名堂以拙兮心如石鐵斂鋒鍔于不用兮攖萬變而不折陋流俗之鍥薄兮遵道德之軌轍寧安已之分義兮奚顧彼炙手之可熱倚長松以嘯詠兮凜清風之高潔此吾拙堂之所賦兮昔公一覽而擊節謂知予心兮勝予自說次嗣通籍兮慶事不絶長入朝路兮出分風月天子有詔兮峻奉常之班列將整裝而上征兮胡為乎求醫問藥而中輟嗚呼嵗幾兩周兮拙翁言别每問訊兮憂心惙惙忽訃聞兮使我悲噎有子可託兮孫枝芽茁死生晝夜兮達人一瞥拙翁何憾兮茲理洞徹身有時而盡兮光明亘萬古而不滅到此乃知拙翁之作計兮今而後其計非拙靈乎有知諒我遠而不遑奔慟寓誠一巵千里對面其歆我詞祭程提刑文立身大節出處行藏固守命義其道乃光猗歟程公温温春陽孰識其奥外柔中剛好善如渴汲汲皇皇覩彼不善真若探湯鳴弦懷玉厥聞孔揚事茍利民勇孰可當民曰父母遺愛甘棠夙駕箳篁来我鄮鄉不為勢屈守道之常清湘布政肯遜龔黄政最既聞使節煇煌奈彼妒賢巧言如簧公心坦坦不動毫芒從此賦歸脫屣軒裳清斯濯纓志在滄浪我初識公謂我循良未知其學義理昭章我来東江簜節是將部有賢僚實公令郎辟宰番邑井井紀綱公時就養訓之義方公每語我喜色洋洋吾兒知學温習靡忘願使此兒志氣日彊公與我别凡幾星霜終始一心道義是蘉捐世俗累留晩節香聞公抱病我心已傷俄已訃至令我涕滂嗚呼哀哉誰能知公疾惡剛腸雖老猶壯以禮自防索我大書中庸名堂爰及諸齋區處精詳將淑生徒正學是倡推此規模浩不可量胡然一疾失孤鳳凰慨念平生一往括蒼病實尼之躬奠未遑姑寫我心千里一觴幸哉有子世繼芬芳公亦何憾雖死不亡誌銘孫君墓誌銘余友人胡牧之遺余書曰吾學子有孫震者其先人功甫以嘉定辛未十有一月丁巳卒享年四十有八將以乙酉嵗十有二月壬寅葬于俞山之原功甫居天台閬風挹山川秀爽有異質美髭髯意氣恢疎而篤于孝友昆弟六人功甫于次為四親既歿凡室廬田産器物聽伯仲所自取功甫不以介意好買書延良師以教子授孟氏天爵人爵之語亹亹訓誘不勌臨終戒諸子力學家事一不掛口故其子築館所居之西偏扁曰緑猗以盡琢磨之義先志也功甫不得志于時家庭事業大概若此子其序且銘之余歎世降俗薄較錙銖之利忘同氣之親遺子以籯金而不淑以詩書何如其知也識度如孫君而可無述乎君諱九敘功甫字也曽大父皓大父闉父璿妣張氏娶四明奉川胡氏子男三長即震也次雩霆女一適四明進士王劭孫男五恢孫愷孫悌孫怡孫忻孫孫女一銘曰行修于家是亦為政我刻銘詩後人興敬伍府君墓誌銘余求友于四方見有質茂美而志恢張者心甚敬焉朅来柯山得友曰伍清之挹其貌莊而和聽其言平而實攷其行鄉閭稱為佳士叩其志沛乎勇決而莫之禦也嗚呼是余所謂質茂美而志恢張者耶是其門戸當興而然耶一日清之泣請于余曰不肖孤將以九月甲申奉先考柩葬于東山之麓惟是德銘未立敬敘先世梗概敢頓首以請余覽之拱曰積善之家也是宜有後按伍氏之先本楚人自英烈以存吳著偉節歿為明神大江以南往往立廟祀之子孫散處吳楚閩越間漢晉迄唐代有可錄攷國朝登科記題名餘五十人在臨汀者獨盛而占籍于衢者猶未著也君諱總字子夀世為西安人曽祖熹醇厚有古人風家雄于財然喜施與貰貸者率折劵曰積而能散義也祖侁考機俱以善人稱退然自守與物無競然生理視舊則不復振矣君奮自植立竭力以奉甘旨與人交篤于信義然耿介不茍合門無雜賓尤以教子為急家務靡密躬自任之不以累諸子聞四方有明師良友亟使就正焉已而清之預鄉書入太學嵗率再歸歸必止之又三年補内舍生君遺以書且舉山谷詩但得新年勝舊年即如常在郎罷前曰專而學業孝莫大焉以是清之得一意于學嘉定十有六年清之擢奉常第歸拜膝下敎忠之訓訖不離口時雙親在堂綵衣團欒其樂無涯越二年而皇考歿又明年妣蘧氏歿積憂熏心號慟成疾六閲月而終寶慶二年四月二十有八日也夀纔五十有二娶王氏子三人長維寅修職郎新衡州司戸參軍清之也次維新後其叔麟孺維允先卒孫三人源孫還孫聞孫銘曰人誰不死而君有子人誰無子而子令只東山之陽吉人之藏子孫緜緜伍氏其昌危君墓誌銘嘉定丙子余官金陵與臨川危君諱和字應祥相好也後十年余守柯山應祥自中都過余與譚名理心若有契不知余識進耶應祥學進耶應祥主上元簿㑹府人物林藪挾才能爭取上官知面嬉笑胸戈㦸應祥深藏若虚諸公器重之不挾書覓舉舉反先儕輩嵗大祲招糴旁郡走川陸不告勞受輸務寛民不希意取贏攝校官士循規矩參鞫獄人稱無寃漕檄同官慮囚府亦屬以事莫知適從垂獲譴應祥奮不顧白漕請代行有識義之就辟帥幕悉忠長官無巨細必啓告敵人来侵羽檄交馳制帥挽應祥參畫以書生不知兵辭始終金陵六七年迄免譏謗簿舍明道先生舊游應祥憫正學湮蕪大闢祠宇廣養士員西山真公偉是舉也為記其事改秩宰饒之德興值嵗歉先諸邑條賑卹不待部使者迫之然後從事民賴以活諸所施行皆此類處閨門莊而不矯睦宗族恩而有義事闗風教力持之不變居官以廉潔稱還里飯不足澹如也取陶靖節語自號閒靜居士應祥十年間涉歴蓋如此訪我柯山風霜飽矣枝葉落矣方期晩節共進此道嗟乎胡奪之速應祥登乙丑進士科歴階至奉議郎自德興丁内艱再調隆興之南昌未至官而卒實紹定己丑八月丙辰也享年六十有四曽祖巑祖能父必强贈承事郎母陳氏繼許氏俱贈孺人娶羅氏封孺人子男三人璹先君三月卒琛瑀業進士女三人長適鄉貢進士李廷龍次適從事郎常德府龍陽縣尉趙税夫次適將仕郎趙必撫孫男四人孫女一人曽孫女一人始應祥築書堂于臨川東鄉之蟾塘風景清曠環以脩竹讀書竟日超然忘世平生著述有集若干卷藏于家應祥既歿葬未得卜一夕見夢其孤曰書堂即其地也尚何求琛等遂以某年月日奉君之柩窆焉謂余知君琛泣請銘銘曰言依乎是行逃乎毁不亢不媚孰信信已生兮書囊藏兮書堂餘韻琅琅世載其芳江夫人巢氏墓誌銘余持節江左志興學校郡博士各思振職而秋浦校官江子遠尤奮發帥先余固多子遠而未知家風之自也一日子遠奉親命持祖妣夫人巢氏言行一編拜且泣請余銘余覽之藹然有古賢妃淑女風子遠才固高然玉于成者夫人教也子遠推家庭之敎敎庠序士士咸知興起子遠益自勵不使才勝德則夫人之教入之深矣乃序次大略惟巢氏自尚之仕劉宋嘗守新安繇新安還建業舟過東匯愛其江山卜居焉遂為南康都昌人至國朝熙寧間有名谷者仕蜀與東坡兄弟友東坡謫嶺海谷訪之握手道平生歡世服其高誼曽祖諱自牧祖諱勉父諱紹椿自號無我居士居士雅以先世風誼為法自拔流俗一女憐之擇對惟謹知江君諱某端厚長者歸焉夫人生于紹興乙丑之十月終于紹定辛夘之七月夀八十有六兩遇恩封太安人將以某年某月某日𦵏于縣之新城鄉伏牛山之右麓六男子煜煇􅁮炎榮華皆業進士􅁮丙戌奏名調峽州宜都尉四女俱嫁為士人妻孫男十人日新九萬萬里又新自新萬頃萬盈萬全萬齡萬善九萬太學生萬里太學上舎生丙戌進士及第子遠也夫人相夫子以禮春秋祀事必潔必誠闔門千指耄稚尊幼醇纇靜躁不齊夫人調適其間略無長短憎愛語猶子或謂聚族久生産作業寖廢不若各有歸夫人愀然不樂曰此外物耳我奚較顧爾曹妙年盍力學光啓我門戸奈何以瑣瑣嬰心聞者悚服久之不欲咈衆則聴各以意取人人慰滿遇人有恩意婢妾有過怒不形辭色嵗惡食艱雖居約推以食人嘗買二羊備姻禮一夕盜取去有告者盜聞亟伏辜請償夫人曰是為饑所驅奚可責償好言諭遣之盜大感悟性節儉經時不製一新衣不以一錢供耳目玩至延師家塾傾囊篋無吝色諸孫滿前聴迺祖講論孟中庸大學夫人黙記要語時時申戒俾勿忘每教為人婦者孝而婉教為人妻者柔而正出語有典則宿學莫過也嗟乎是所謂有德者耶克登上夀子孫衆多多而又賢非德之驗耶余謂子遠家風有自非虚語也是宜銘銘曰維夀母兮美無度家不裕兮德則裕維此德美流慶曷已何以占之視其孫子胡君墓誌銘君諱誼字正之其先苕霅人五季避地徙丹丘後徙明之奉川曽祖嗇祖仁考宗彝俱不仕妣王氏正之生于紹興已夘歿于紹定壬辰夀七十有四娶陳氏繼任氏先正之三年卒男三明鎮明璧明奎皆習儒女一適進士袁潤孫男二守成守本女一將以癸巳冬十月甲申葬于松林鄉銅山之原明璧持其叔父牧之所敘言行泣請銘余為童子時見學徒負笈從先君子游常百數正之骨清神靜筆端洒洒無俗氣先君子尤愛之曰修謹士也自以不與時偶益讀古聖哲書深求旨趣以自暢適晩嵗建聚書樓扁曰觀省自號觀省佚翁且作記曰青嶂當前翠竿在側展卷與聖賢對語優哉游哉又述先君子之訓曰修身為本謹行為先觀于斯省于斯子子孫孫寶之永無忘正之歿半嵗一夕見夢明璧汝其卜吉于冬以葬我亟走江東乞銘且持觀省樓記求跋于吏部吏部余兄也時謁告省松楸正之何自知之噫死生如一是真能觀省者耶古人云斃而後已正之雖亡觀省尚不已耶先君子以絜名齋每曰安貧樂道是謂潔白不遇而富貴汙莫甚焉正之老于韋布乃能服膺師訓觀省此心死而不忘是宜銘銘曰癯儒精神樂哉一貧是為絜齋先生之弟子不辱師門甘氏夫人墓誌銘余聞南安邑大夫徐君德夫之賢舊矣嘉熙改元余與德夫同朝一日袖母夫人行實泣請銘余讀之歎曰嗚呼非此母不生此子非此子莫顯此母德夫自為士人已有跂慕前修志對嘉定癸未廷試策詳定官以語觸時忌繇亞魁降第十辛夘秋都城災詔求直言德夫時為福建帥司幹官感慨草封事力詆權相謂積隂之極厥徵為火親黨危之德夫入白夫人夫人曰禍福有命當言即言獲罪歸幸矣其宰南安也西山真公嘗薦之德夫以母老辭夫人聞之曰汝受西山知義當就職至則蠲横征革蠧弊活羸殍治行卓然為一道冠曽子有言涖官不敬非孝也有賢母以成孝子之志可嘉也已夫人姓甘氏曽祖仲賢祖文雨父如松世為豫章豐城人夫人生而慧淑父母鍾愛以歸同邑故承事郎徐公琮事尊嫜盡禮相夫子以義雖處約其志樂也睦娣姒無間言撫前室子如已出妾御有過訓飭而已鄉閭族婣人人得其歡心德夫分教横浦大振學政撤齋廬而一新之夫人戒勿擾故事集而人不知南安嵗饑勸分平糴鄰境翔踴邑纔半直夫人病中猶朝夕問米價損益以為欣戚愛人恤物天性然也端平改元季夏十八日終于官舍享年九十有二以慈明太后慶夀恩封太孺人三男子長光卿次鹿卿德夫也奉議郎主管官告院季榮卿孫男七人元老南老鼎老端老還老合老申老女三人俱幼諸孤以是年十有一月二十有五日葬夫人于雲嵐之原噫樂莫樂乎榮其親哀莫哀乎喪其親方閩帥李農卿駿有母年九袠燕同寮之將母者二人于眉夀堂夫人預焉閩人作三母歌以紀其事何其樂也德夫宰南安纔七閲月惠汝赤子失我夀母邑人哭之如哭其私親又何哀也哀樂相生而道存焉誰謂夫人之云亡銘曰家庭之言知有西山匪西山之思思母之賢湘潭縣尉趙君墓誌銘余友湯伯紀端介不妄言持其所狀婦翁趙君言行示余曰翁篤厚人也儀榘端嚴行事有典則與人言依于孝悌忠信請子銘其墓余曰趙君能以女妻伯紀鑒裁高矣余何敢辭君諱俾夫字夀翁曽大考和之贈訓武郎大考公彦贈武議郎始寓居饒州餘干縣考彦榛妣張氏夫人君家本北種有直氣不立城府好行義事君蚤失怙恃與伯氏戸曹掾某益自奮問學日廣戸曹取太常第不食一日之禄以歿君痛悼良劇奉嫂如母課猶子以書外祖母年逾八十時時迎養盡歡伯舅病痼且貧敬共資廩終其身不衰聚族衆多且字且誨死者葬埋乏祀者繼之兩以漕貢試春官寶慶初元賜進士第調尉弋陽未上改湘潭西尉廉勤靖共束卒以律而給庸錢以時異時掊取之弊一朝頓革邑有社倉尉實司斂散率常豐取刻與君涖以公清無秋毫私遇嵗歉出已俸以助惠民劉氏二喪久不能舉捐數萬錢俾克葬君勇于義皆此類尉且更俄得疾遽卒享年五十有六端平元年六月七日也喪車之歸闔邑泣送出郭遠焉而後反十二月甲申葬邑西桐江之原先夫人傅氏繼徐氏子男二人時晏保義郎臨賀縣尉時昂四女適姜雋湯謨湯漢洪桂孫男一若潨伯紀之言既信不誣又受知當世名流于越議新邑庠吏部趙公委君度費經工學成壯偉為旁邑冠湘潭西尉創置無官舍連帥余公予之貲未幾牆屋飭備而記其成者實西山真公也諸君子亦可謂知君矣然余又嘗試以事蓋將指東江之日發粟賑饑人縣令屬君分行鄉井凡君所斥散者有實賜無濫予令為余道其事心尤敬焉然則非余誰宜銘銘曰質厚之人今世匪多死于一尉天也如何䝉齋集卷十七
