body:
  text: 蒙齋集巻二宋袁甫撰奏疏正字上殿劄子臣猥以庸愚誤蒙親擢今茲召對獲覲清光臣竊惟陛下聖德淵靜默與天契念慮純一上與天通自臨御以至於今凡幾更變故矣而隨即消弭轉危為安人以為天數之適然而不知皆聖德格天之功近者北朝首開兵端我師既出其兵旋退人以為羣臣禦侮之力而不知皆天佑皇家之驗夫以陛下積平日畏天之誠而天心又有啓佑陛下之實固宜休祥畢至災異盡除而今乃陰陽未調旱魃為虐不亦深可懼歟甚矣君天下者不可一日而無懼心也懼心常存則妖不勝德懼心或亡則德不勝妖陛下如欲因天戒而囘天心變亢陽而致甘澤其道亦無他惟當即陛下畏天之素心愈加警懼而已天理流行隨寓著見善格天者要必事事知懼何也賢才之用舍關天心之向背今也端良者斥諂諛者用盡言者罰蒙蔽者賞邪正易位白黑不分杜忠良敢諫之門孤上天生賢之意是可懼也民生之安危判天命之去畱今也兵戈既興暴露日久餽餉不繼斂將及民根本一虛則岌岌焉有蕭牆之憂國祚脩短實決於此是可懼也廣謀從衆乃合天心今也陛下深居高拱未盡下情羣臣奉行簿書罕接輿議獨運密謀之意勝而虛心諮訪之意微將恐天下迫切之情無由上聞是可懼也君臣一德克享天心今也一人憂勤於上而羣臣逸豫於下外患方弭内患方深而熙熙焉無異平時自謂雅量足以鎭浮而不知宴安乃為鴆毒是可懼也法天行健是謂君德今也陛下恭儉有餘而剛斷不足庸夫憸人茍求富貴而未聞大明黜陟以警動衆心將帥交結而軍旅之政壞州郡賄賂而廉節之風衰此皆自貴近者化之不改其源流弊愈熾是可懼也夫此五可懼者特舉其大端耳其他禍幾亂萌不可悉數其將何以答天譴召和氣哉臣故曰惟當即陛下畏天之素心愈加戒懼而已且臣聞之上有戒懼之君則下無可懼之事懼心不存於我則彼之大可懼者始見此必然之理也陛下誠能繼今以始惕然内省知畏天一念乃我之所固有初無俟乎外求自方寸之清明而推之於朝廷之清明由宮闈之謹肅而達之於政令之謹肅昭公道以破私意之扃鐍擢正人以鍼邪說之膏肓陛下以是率先於上而股肱大臣又能公聽並觀畢志竭忠以體君上之心耳目之官喉舌之司亦皆博采公論盡吐忠赤以掃積年之弊下至羣工百執事無不精白一心公爾忘私以赴國家之急將見天意囘於上災變弭於下豈徒自治吾國而已雖坐制外夷可也何足懼哉不然精神移為怠昬剛强銷為柔懦君臣上下一不知懼而可懼之事衆矣治亂存亡之勢其本在此惟陛下畱神省察取進止入對劄子案宋史本傳由建康判官授袐書省正字此劄追述金陵亦為正字時所上臣竊惟事君之義知無不言臣効官金陵兩淮之事接於見聞者敢為陛下略言之國家平日以禮義待士大夫固望其有仗節死義之風以恩意撫將帥固望其有捐軀報國之忠以民之膏血豢養官兵固望其為一旦緩急之用而以臣愚見乃無一足仗者此甚可痛心也近年以來兩淮城壁大略具矣而守邊之臣務以其說相勝前者以版築䇿勲自支郡而易鎭大邦矣後者欲新其說則必言浚濠之利前者以山城不可移治遷之他郡而且罷黜矣後者欲變其說則必言移治之便方敵未犯淮知朝廷意在安靜則爭進安靜之說及敵入冦知朝廷意在振作則競以振作為言此其意但知迎合取寵而曷嘗以宗社生靈為念一朝有變其能盡忠竭節為國死守哉是士大夫不足仗也將帥之臣稍知徇國而能與士卒同甘苦者亦豈無人然大率得軍士之心者少而斂軍士之怨者多債帥之風蓋有年矣託營運之名行朘削之實軍伍之中怨氣滿腹威足以鉗其口而實不足以服其心至於偏裨稍有寸長專務抑遏不使自申疾之甚於仇讎防之過於寇敵非但御下為然而諸帥之自相與者亦然以勢相軋以計相傾有請於朝則迭為矛盾脫遇緩急則不復救援師克在和古有明訓今乃不相輯睦一至於此何以辦大事立大功哉是將帥不足仗也國家財力盡耗於餉軍而官軍之不可用無愚智皆知之開禧丙寅之事棄甲曳兵而走者皆平日厚廩於縣官者也其間稍以立功自見及控扼關隘之人大抵皆義勇民兵萬弩手雄淮敢死諸軍耳近者調兵分屯遣將四出而卻敵兵於中渡者乃强勇軍之桀黠者也戎帥恥已不如力加沮毁且有節制民兵之請幸賴朝廷堅執弗從又欲自招土豪助已聲勢不知素養官軍將以何為是軍士不足仗也此三者皆國家腹心爪牙之用而無一足倚仗者方且上下相蒙以言為諱國將奈何哉夫欲救三弊必有三䇿一曰嚴帥守之選二曰併大軍之權三曰興屯田之利所謂嚴帥守之選者牧養之責乃其職分而今日事宜軍旅為急宜擇智略過人曉暢軍事赤心體國不敢為欺者假以事權寛其財賦委以軍政責以訓練仍俾久任毋復數易其有職事修明者增秩賜金以激勵其志而不然者責罰隨之能否甄別則士大夫爭於効忠矣所謂併大軍之權者沿江軍帥其習於行陣忠勇可用者宜使守極邊以展盡所長其雖有小材不足倚信者宜以漸汰去毋徒為姑息統兵之政攝官掌之殺其權而損其威行之漸久舉官軍而併隸於帥守無掊克之害無忌嫉之私士氣頓蘇軍心悅服而將帥之弊不復為國家之蠧矣所謂興屯田之利者官軍既不足用則當以民守淮欲民自食其力則當以田給民論者皆謂兩淮在官之田少豪户之田多不知田雖在民力不足耕黄茅白葦極目無際官司若議田租之入彼憚於輸租而輕於棄田則皆官田也然後隨其多寡量以給民而助其耕種之資將見屯田之利興塞下之粟多民兵之食足而轉餉之費省矣此皆今日至急至切之務而三䇿之中其處戎帥行屯田二事節目甚多宜從朝廷行下制置司詳加條陳亟以上聞勿事虛言務求實用誠理内禦外之良圖也臣書生妄論當世利病發於忠誠不能自己惟陛下裁擇取進止輪對劄子案本傳由正字遷校書郎後上此劄臣淺陋書生充員冊府幸叨賜對再覲清光此時不言豈惟有負私心亦且有負陛下請罄愚衷而畢陳之臣聞朝廷諱言邊事非國家之福也士大夫敢言邊事實國家之幸也雖然邊外事也敢言外事而不敢言内事亦豈國家所望於臣子者哉凡今之言邊事者不過曰將未擇兵未練財未豐爾識大體者又不過曰規模未立血脈未通爾獨不思是數端者其病不在外而在内不在四肢而在腹心曷謂腹心之疾規模未立偷安者撓之也血脈未通壅蔽者隔之也將帥未擇忌嫉者沮之也兵財未治欺誕者壞之也陛下端居深宮不能盡知邊事則必委諸二三大臣大臣一耳目之聰明亦不能盡知邊事則必有諮訪之人朝夕相親之素或得以密窺其機優柔浸潤之久或得以巧中其意玩視變故動輒揣摩事雖迫切偷安之說先入為主漸啓荒怠之習而國勢日微稍厭忠直之臣而人才日靡規模若此自謀不給何暇謀人陛下儻慨然覺悟痛懲前失庶幾偷安者無所售其說矣邊塵一起事變萬端自非大開樂告之門何以翕受羣言之入今則猜防已甚情愫難孚邊境之間妄意揣度以為朝廷之上眞偽不分締交先容者有所奏陳則虛事類指為實孤立寡援者或有控請則實事亦指為虛夫朝廷固未必盡然而疑似則亦有可議比者蜀事初若可駭旋以奏報失實斥免帥守漕臣自此相戒言蜀事者少矣臣得之傳聞方敵人徙汴之始倉皇奔逸可謂無措而上下之間相與辨論輸寫眞情有言畢達敵以鼠伏鳥竄之餘尚有博謀並采之意我以朝廷清明之際乃自貽上下間隔之憂此微臣所以痛心也陛下儻大明公道則壅蔽者無所容其姦矣擇一大帥謀一邊守採諸輿議未必乏才而必取夫平居親倚左右薦導之人蓋曰如是而後始可信任耳不知至誠許國者無不可信而平居親倚者未必眞可信也抱負奇偉者無不可任而左右薦導者未必眞可任也謹護風寒之地蓋有舉朝明知用非其人而莫肯為陛下一言者姦雄竊窺有輕我心敵人聞之謂中國何至於夙負物望可當方面者往往忌嫉之說牢不可破雖陛下亦惑之矣臣不知為國擇人何苦沮抑忠賢以快忌嫉者之私乎足食足兵有國所重經理圖維夫豈無䇿今陛下未有弭兵之期而先有厭兵之心好用言利之人而實無理財之術自有厭兵之心先主於胸中是以羣下之言紛然而迎合外飾虛名而内有排正論之實陽言守禦而陰蓄主和議之心茲不謂之欺誕可乎戎帥交賄非無明禁與其懲賄賂之姦不若杜其所從入之門州郡苞苴非無明禁與其革苞苴之弊不若清其所從來之原今不務為此而日求生財之䇿由是括常平之積取州郡之贏曰吾將以供軍也竭彼盈此有同兒戲不謂之欺誕可乎臣是以妄論今日之病雖蔓延於外而實根本於内欲鋤其蔓當除其根偷安之根不去則規模終不可立壅蔽之根不去則血脈終不可通忌嫉之根不去則將帥終不可擇欺誕之根不去則兵財終不可治此斷斷不易之理也陛下何不超然遠覽深思内憂有甚外患而日夜講求消弭之方乎我祖宗之御天下也政事委於中書可謂專矣然必擇公忠鯁切風采著聞者使為臺諫必擇端亮守正敢於論駮者使為給舍天下之事有利有害羣臣之衆有正有邪所當彈者臺諫得以公彈之所當駮者給舍得以公駮之此祖宗戢官邪肅朝綱之大本也今日誠體祖宗之意以行之俾任是職者不捨大而論細不避難而言易紀綱既正百官承休豈復有為偷安為壅蔽為忌嫉為欺誕以惑吾之聽者哉唐太宗英主也魏徵進諫則曰兼聽則明偏聽則闇甚矣聽之易偏而邪之易以害正也臣願陛下垂兼聽之美戒偏聽之私充元氣以禦外邪正内治以安邊境國勢日張基圖日固以綿我宋億萬年無疆之休實天下幸甚知徽州奏便民五事狀臣一介庸虛寸長蔑有濫膺臨遣承乏新安良由聖朝選拔之公但愧微臣叨逾之過欲求報塞罔憚勤勞倏更一朞合條五事學不足以窺體統識不足以達事宜惟以便民為心斯乃守臣之職臣昨塵班列獲覲清光思欲少裨聖聰嘗獻仁之一說即蒙俞允且賜襃嘉況今圖為保障深戒繭絲施行於本州者既以仁為先奏陳於陛下者宜以仁為急條目雖異綱領則同惟欲實惠及民而已伏乞睿慈特加開納豈特愚臣之幸實一州百姓之幸一臣仰惟陛下軫民疾苦切於體膚拯民塗炭急於焚溺所以迓續民命護養國脈為億萬年無窮之基可謂至深且長矣臣竊見近者朝廷行下本州及監司原申休寧縣體究賦稅事亟頒俞音多所蠲減皇乎休哉湛恩汪濊罔間遐邇臣濫綰郡符日與擊壤之民歡欣感戴臣伏覩户部看詳之辭洞見州縣情狀破其私意示以大公其言曰閱繹所申則惟供上窠名裁削不靳若乃畱州送使項目責辦如初是特為私已逭責之謀似非有體國恤民之念今準看詳之旨盍疏均一之恩於是不特將上供數目量行減放併將州郡所得自用者亦行蠲除臣捧誦至此竦然歎服以為聖朝主張公道勤恤民隱如此蕞爾小郡雖甚迫蹙何敢不宣明德音推廣仁聞已即備錄聖旨張榜通衢令深山窮谷之民皆户知之甚盛舉也抑臣又思之徽有六邑俱號鑊湯婺源休寧最當沸處今休寧則被惠矣其獨遺婺源乎況婺源介乎萬山五嶺之間邑最壯民最獷而財計最耗較之休寧殆又甚焉吏部出闕畏卻莫前縣佐攝官茍求免過指正稅以解別色那新錢以掩舊逋措置既無他䇿豫借是為良謀纔一二年不知幾萬豪家富室憑氣勢而不輸官租下户貧民畏追呼而重納産稅加以連嵗不値豐登兼又屢遭囘祿學舍庫務幾無孑遺井里市廛莽為瓦礫挈此蕭條之邑畀諸新辟之官補綻支傾忘寢廢食極疲勞而不憚如醉夢之方醒則夫蠲減之恩豈可斯須少緩雖然蠲減誠是也祈哀於公上屯膏於本州則是猶未能克己私也已私未克自立籓籬是先以婺源休寧為二也而欲朝廷視為一體其可得乎臣今所謂一以休寧為準於本州雖有損於朝廷則甚易從茍可利民臣何愛焉尋常州郡得用之錢往往從來視為已物但知厭足其所欲誰肯瘠已以肥人弊俗既成痼疾難療在州之可蠲者既不忍決舍在上之當除者亦不敢申明由其封閉吝嗇之私執而不通致使周流霶霈之澤格而不下臣之愚陋他無寸長獨於公私義利之間粗知從違取舍之決矧州縣事同一體財賦自合通融今欲稍寛縣道豈可專撓朝廷須先從本州除靳惜之私又乞朝廷減無名之斂然後凋瘵之邑始獲少蘇臣已將十六年婺源拖下紬絹一萬七千餘匹茶租折帛錢一萬五千餘貫月樁板式錢六千餘貫應是婺源積逋一切權行住催本州撙節浮費代為收簇起綱惟是鑿空白撰之賦皆係上供及總所色目額錢太重虐害細民既非本州所可自專必欲朝廷特與減放向使無例可攀尚欲力行陳乞況有休寧近例婺源事體一般俱從朝廷明降指揮並係監司差官講究休寧既先減放亦合例及婺源庶幾可以解倒垂之急矣所以條具婺源減放事件臣今己申監司公共保明同銜申取指揮懷不能已豫此控陳伏望聖慈采納施行一臣竊證本州起發上供絹綱屢言以來左帑卻囘數多臣到官之始積下前政數目動踰萬計督促諸邑晝夜不停追逮榜笞紛然四出又緣向來官吏巧行改移雖有人户姓名往往皆非元物今卻而歸之縣縣果何䇿乎惟有重虐吾民耳臣每執筆行移甚有慙色上下壅塞無由疏通左帑嚴為限期急如星火本州懼無可解凜若淵冰臣區區愚慮深恐今嵗萬匹來嵗倍之不三五年積至數萬百姓受害無有已時於是與民圖新多方曉諭皆令加意織造可保全綱盡收臣粗取信於民民亦遵從其約臣又攷究自來攬户之弊其受於稅户也則昂其價及買諸機户也則損其直以紕疎難售之絹乘綱運正急之時官雖明知其奸每每陰墮其術又專揀等輩相為表裏弊倖多端民户不堪誅求耗用何所從出不過減絲縷之費移以塞無厭之需由是眞偽混淆輻輳交集名虧稅户實則虧官無怪乎左帑之見卻也臣痛懲此弊而一洗之凡攬户盡行罷去專揀悉皆改差所收人户入納之錢僅及則例應於市利縻費之用不取分毫常時所以多取者蓋緣無以飽衆人漁獵之欲耳臣今既剔其蠧復澄其源隸役官場之人並支日食之費在官之所耗者少在民之所利者多又人户歳輸全憑朱鈔即時給付略無淹畱微臣不敢憚勞官吏亦知宣力稍有欺弊斷在不容民皆曰向也官場邀阻乞覓之弊今皆無此患矣絹雖有加於前人自爭先而納未嘗輕用一箠亦不妄追一人諸縣間有過苛本州力行禁約徧散手牓具述臣心萬目觀瞻豈容欺紿雖然察州人之意亦有隱忍而不敢言者夫使民至於不敢言臣獨不愧于心乎何則本州素不産絹大非昇宣之比攷諸新安志國初歙絹止重數兩其後不能盡遵此制然令甲所載江東一路稅絹共重十二兩獨歙州以咸平二年特旨只以十兩為定併下庫務不得退剝每匹折七百三十一錢至紹興十八年户部符每匹估價二貫足乾道三年詔以守臣納絹擾民鐫秩罷之謫辭曰不念繭絲之闕靡思杼軸之空大哉王言為萬世法其後議者又奏以為户部退剝徽絹屢行禁戢深惟列聖之至意顧豈愚臣之能知然觀加意於徽民乃見夫周道之如砥蓋田稅既重則物帛當輕立法公平所宜世守豈虞傳流之既久反謂寛大為不然漸欲求詳寖非初意今來所納稅絹精好委勝常年雖圖逭責於目前安知可保於他日竊慮向後繼之者未必盡革兩場乞取之弊亦未必貼賠專揀日食之費又未必按時給鈔無頃刻停畱之患而徒使徽民入納精好之物則作俑乃自臣始臣之所謂百姓隱忍而不敢言者此也臣因今嵗夏旱禱祈上天有曰咎實在臣民則何罪臣對天而發此言今又對朝廷而啓此奏則夫軫恤徽民其容可緩伏望朝廷證咸平紹興乾道節次寛恤指揮每匹只以十兩為定仍證舊例行下庫藏如及上項兩數特免退剝退剝既免則全綱盡納異時既無卻囘之患徽民遂有蘇醒之期祖宗舊風今日復見顧不休哉且臣之所請者十兩之例退剝之禁皆聖旨也旨由朝廷而頒顧可由朝廷而廢乎況臣非為已計乃為後圖若今年所起絹綱多是臣手自揀委可堪充入納斷無退剝之虞萬一有之皆係佳物民將樂受又何患焉欲望聖慈察臣出於公心徑下所屬檢舉非但使徽民受無窮之賜亦見朝廷取法祖宗愛養基本之厚意若朝廷更欲審訂即乞行下本路監司令取索新安志及節次指揮保明申奏施行一臣聞常平義倉之儲所以備凶荒也平居為有用之備則臨事無缺用之憂今乃不然有儲蓄之名無儲蓄之實臣嵗在己夘贅貳霅川本州常平義倉正隸本㕔掌管閱視簿籍米纔數百斛錢纔數百緡而已臣為之大駭一州倉儲民命所係空竭如此緩急奈何及夷攷其故乃知本州秋苗嵗入止盈五萬正苗既已甚少義倉自應不多其常平坊場等錢率以敗闕為說艱於催促所入微矣而支用何其夥也若胥吏若軍兵若散從直月廩之數取諸常平使其盡出於公固未甚害其間托名差使輒敢旁緣兌支倅㕔自開倖門州郡亦復援例其餘官屬皆有干求由是紛然不勝其衆蓄積本無幾也濫費其可堪乎臣既知其弊遂絶其根率之以身一毫無妄上而州郡下而同官盡裁以公靡容私請日積月累所蓄漸豐始焉僅四百緡今也乃踰萬數幾三十倍於前矣秩滿之日上之倉司故案可覆也臣因此思之使天下諸郡遲之一兩嵗之久皆有三十倍之多何積貯之足憂何水旱之足慮但今之居官者茍求塞責不務恤民常平使者嵗嵗差官州縣寮屬時時覆覈或以虚為實或指東為西上下交欺莫此為甚安在其為儲蓄之實乎臣試郡來此首以是為先但本州土瘠民貧賦煩役重每遇冬春之際或逢霖雨之餘穀價稍增民食稍缺則官開倉廩亟濟貧民蓋不待凶年饑嵗流離餓莩然後為濟糶之舉也故民之所以望於官者甚重而官之所以塞其望者甚難萬口嗷嗷日冀發廩猶賴常平之外又有平糶一倉主於漕臺隸於本郡每欲告急即行飛申臣到任以來請之屢矣今嵗夏無梅潦民户多以旱聞其所望於官司尤非平日之比也畧計六邑之内婺源祁門黟縣雨頗霑足民皆歡呼若歙若休寧若績溪仲秋以後始獲甘霖早禾已不及時中晚庶幾可望臣之愚衷謂除得熟縣分外其旱歉諸鄉若不亟拯困窮將見立塡溝壑為民父母當若之何所合將常平義倉儲蓄之米多行賑糶民方倒垂庶可寛釋本州痛節浮費趲促贏餘選委官寮置局收掌於兩浙豐稔之邦收糴以償元數官無所耗而民得所利直至來春可以接食且散且補循環不窮信乎兩全之䇿矣若目擊民饑積而不散豈不大失置倉之本意若輕於捐廩知散而不知補又何以為國家異時之永圖臣麤知體國之心行愛民之政既申給散之請必為可補之圖非敢徒事空言而已也若夫輕關市之征寛租賦之入權勸分之宜凡可以救荒者臣皆勉而為之惟夫常平一事非臣之所得專所乞從朝廷行下轉運常平兩司勿拘常程多命濟糶下可以副一州徯望之意上可以廣聖朝矜恤之仁伏惟睿慈果斷而亟行之不勝大幸一臣證得本州僻處萬山之間最畏水旱晴稍久則農田已憂枯槁雨稍多則山水便見横流里諺云三日天晴來報旱一聲雷發便撑船言其易盈易涸之甚也故此州農田多藉水利因溪堰水者謂之堨鑿田蓄水者謂之塘興工雖難為利則廣修治不輟灌溉甚多彌望數百頃之禾惟資一塘堨之澤臣嘗詢之長老一一具能言之奈何計近而忘久者乃人之常情趨省而憚費者亦民之通患本州地少下濕滿目皆是高田訪聞舊年嘗憂夏旱偶値數載之内率多霖潦之時小民玩習目前以為嵗嵗如此不思及時瀦水專望雨降自天彼豈不知天時之難必哉蓋修築塘堨為費不貲徽民素貧惜錢如命茍可僥倖得省遽謂卒嵗無憂其愚亦甚矣臣因今年季夏雨澤愆期日夜禱祠靡所不至痛心疾首無地自容因思水利有儲何至煎熬若是雖然水利之廢罪不專在民也向來官司施行以塘堨為大事上而常平使者提其要下而州縣佐令任其詳每遇農隙之時舉行檢視之令縣具圖籍來上於州命官僚躬行阡陌建土埄牌以為標識集大小保以定户名某堨興修某塘湮塞衆目共見不可厚誣然後因其廢興稍加懲勸官既以是為急民亦孰敢弗勤數年以來恬不加察問其主名則含糊難攷按其故籍則散漫罕存茍且如斯可為太息然而墜典未久舊例可尋欲乞朝廷下之倉司倉司下之郡佐時時督促處處舉行若縣道視為常程保甲不加檢舉別委官屬察探以聞慢令之人必罰無赦如此則水利常足農田無虞抑臣又嘗以所聞質之鄉俗皆言堨不可增塘尚可益但開塘費重難以責民莫若刷在官之田或買民家之産多興陂塘之利用濟無力之家官吏為之防閑嵗時加之濬治或遇旱涸放令流通誠大惠也臣偶閱故牘見曩年績溪知縣王柟買田一百五十餘畝開塘六十八所夫縣尚能為何以州反不能為乎伏望朝廷采臣所奏行下本路常平司盡刷沒官田産以充開塘之用臣亦當節縮浮費以助興修之工後人繼之有志民事又將陸續必可有成於朝廷無分毫費用之憂於民間有世世無窮之利顧不韙歟惟聖慈開納幸甚一臣竊證本州從來多有火災雖間出於意慮之所不及然由人事有所未盡臣自到官以來首以是為急務嚴保甲圖籍則擇防虞官正副八人皆鄉之所推重者總之修四隅火備則官多置器用且令各自為備而日命兵隅官察之案兵隅官三字可疑或以兵官監視四隅因創此名或即上文防虞官之訛無别本可校今仍原文置潛火軍卒則籍定姓名每旬番上且給官錢犒之凡此特瑣瑣常行者耳惟是依山為郡號為産木之鄉未聞邃宇高堂盡是竹籬茅舍融風一扇煨燼無餘雖屢挻災莫知改轍臣曲加曉譬幸其樂從然慮貧弱之徒不堪營造之費官給錢本鳩集陶工開其借貸之門寛其責償之限今則棟甍相接氣象一新似可彌患於未形豈徒救災於已著雖然猶未也有所謂至大至急之務衆人皆以為不可緩者惟魚梁乎此梁面挹紫陽山陰陽家曰山之在前者既有崔嵬崒嵂之勢則水之映山者當有淵渟演迤之形清輝相含則鬱攸退避雖一家之學不足深泥然五行之理亦信有之向來草創之初未遑經久之慮捍以柵木壅以囊沙偶値久晴猶云可也霖雨暴漲聲吼如雷溪流激湍勢疾如箭則蕩然一空矣臣去嵗捐金錢因舊址重加修葺頗勝曩時綠波接天澄然無際使常如此寧非大利但堤防不固水勢易陵終非永永之計臣愚以為若欲久而勿壞莫若以石為之夫石之勝於木也人人共曉特不肯為耳一二年來有官守者率多茍且巻官帑以資私藏累千萬而未厭為公家而作好事拔一毛亦不為豈但石梁一事哉臣鄙陋不善生財麤知節用今來痛減浮費趲到錢一萬五千緡見今計度工役鑿山取石俟冬間水落之後方可漸次舉行難者曰嵗非豐稔小民嗷嗷冬春之交正宜賑恤奈何興此役以困民臣應之曰是乃所以救民也獨不觀范仲淹之治杭乎皇祐間吳中大饑殍殣枕路仲淹以為歉嵗工價至賤乃令佛廬興土木之役又新倉厫吏舍民之仰食於公私者日數萬人監司劾之仲淹自陳興造之由正欲發有餘之財以惠貧者荒政之施莫此為大是嵗兩浙惟杭民無一流徙前輩講之熟矣今及小歉之時興石梁之役既可以濟貧民於目前又可以貽利澤於悠久誠一舉而兩得也又何憚而不為乎伏乞聖慈允臣所奏施行蒙齊集巻二
